<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김</title>
<style>
:root{--gold:#e6c88f;--muted:#b7a88f}
*{box-sizing:border-box}
body{margin:0;background:#111;color:var(--muted);font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
.logo{font-family:serif;font-size:36px;letter-spacing:.18em;color:var(--gold);margin-bottom:12px}
.msg{font-size:14px;color:var(--muted);line-height:1.8}
</style>
</head>
<body>
<div>
  <div class="logo">SAEGIM</div>
  <div class="msg" id="msg">QR 코드를 확인하는 중입니다...</div>
</div>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var code=p.get('code')||'';
  var mode=p.get('mode')||'';
  var suffix=code?(mode?'?code='+encodeURIComponent(code)+'&mode='+encodeURIComponent(mode):'?code='+encodeURIComponent(code)):'';

  if(!code){
    document.getElementById('msg').textContent='QR 코드가 없습니다. 제품의 QR을 스캔해 주세요.';
    return;
  }

  var prefix=code.split('-')[0].toUpperCase();
  var routes={'CD':'cd.html','BMT':'bmt.html','TT':'tt.html','WT':'wt.html','GT':'gt.html'};
  var target=routes[prefix];
  if(target){
    location.replace(target+suffix);
  }else{
    document.getElementById('msg').textContent='알 수 없는 태그 코드입니다: '+code;
  }
})();
</script>
</body>
</html>
