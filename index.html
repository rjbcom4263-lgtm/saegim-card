<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 안심 연결</title>
<style>
:root{--bg:#111;--card:#171717;--line:#7a6040;--gold:#e6c88f;--gold2:#c7a05d;--text:#f6ead4;--muted:#b7a88f}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#222 0,#111 42%,#0b0b0b 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
.wrap{max-width:520px;margin:0 auto;padding:28px 18px}
.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#181818,#101010);padding:26px 20px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.brand{text-align:center;margin-bottom:24px}.logo{font-family:serif;font-size:34px;letter-spacing:.18em;color:var(--gold)}.slogan{margin-top:8px;color:var(--muted);font-size:14px}
.main-title{text-align:center;font-size:24px;font-weight:800;line-height:1.35;margin:8px 0}.sub{text-align:center;color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:22px}
.btn,.call-btn{display:block;width:100%;margin-top:12px;padding:18px;border-radius:18px;text-decoration:none;text-align:center;color:#111;background:linear-gradient(135deg,#f0d9a4,#c79a4f);font-weight:800;border:0;font-size:16px;cursor:pointer}
.call-btn.secondary,.btn.sub{color:var(--gold);background:#111;border:1px solid var(--gold2)}
.section-title{display:flex;align-items:center;justify-content:center;gap:12px;color:var(--gold);margin:26px 0 14px;font-weight:800}
.section-title:before,.section-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line))}
.section-title:after{background:linear-gradient(90deg,var(--line),transparent)}
.info{border:1px solid rgba(230,200,143,.35);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.03)}
.row{display:grid;grid-template-columns:115px 1fr;gap:12px;padding:15px;border-bottom:1px solid rgba(230,200,143,.18)}
.row:last-child{border-bottom:0}.label{color:var(--gold);font-weight:700}.value{color:var(--text);line-height:1.55;white-space:pre-line}
.thanks{margin-top:18px;padding:18px;border:1px solid var(--line);border-radius:18px;text-align:center;color:var(--gold);font-size:18px;font-weight:800}.small{margin-top:8px;color:var(--muted);font-size:13px;font-weight:400}
.footer{text-align:center;margin-top:20px;color:var(--muted);font-size:12px;letter-spacing:.18em}.loading,.error{text-align:center;color:var(--muted);padding:70px 20px}
input,textarea,select{width:100%;margin:7px 0 13px;padding:14px;border-radius:14px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:15px}
textarea{min-height:86px;resize:vertical}label{display:block;color:var(--gold);font-size:13px;margin-top:6px}.edit-group{border:1px solid rgba(230,200,143,.25);border-radius:16px;padding:14px;margin-top:12px}
.hidden{display:none}
.bmt-photo{width:100%;height:220px;border-radius:18px;border:1px solid rgba(230,200,143,.35);object-fit:cover;object-position:center;background:#0d0d0d}
.bmt-memory{margin-top:16px;border:1px solid rgba(230,200,143,.35);border-radius:20px;padding:18px;background:rgba(255,255,255,.03)}
.bmt-memory-title{color:var(--gold);font-weight:800;margin-bottom:8px}
.bmt-memory-text{line-height:1.7;white-space:pre-line;color:var(--text)}
.bmt-actions{margin-top:20px}
.bmt-photo-single{margin:18px 0;position:relative}
.bmt-photo-click{cursor:pointer;display:block}
.bmt-photo-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:8px}
.bmt-slider{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;margin:18px -6px;padding:0 6px 12px}
.bmt-slide{min-width:86%;scroll-snap-align:center}
.bmt-slide .bmt-photo{height:220px}
.bmt-dots{display:flex;justify-content:center;gap:7px;margin:-2px 0 18px}
.bmt-dot{width:8px;height:8px;border-radius:50%;background:rgba(122,96,64,.35)}
.bmt-dot:first-child{background:var(--gold2)}
.bmt-date{text-align:center;color:var(--gold);font-size:14px;letter-spacing:.03em;line-height:1.5;margin:-6px 0 16px}
.bmt-audio{margin-top:20px;border:1px solid rgba(230,200,143,.35);border-radius:18px;padding:14px;background:rgba(255,255,255,.03)}
.bmt-audio-title{color:var(--gold);font-weight:800;margin-bottom:10px;font-size:14px}
.bmt-audio audio{width:100%}
.gallery-modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:none;align-items:center;justify-content:center;padding:18px}
.gallery-modal.on{display:flex}
.gallery-box{width:100%;max-width:560px;border:1px solid var(--line);border-radius:24px;background:#111;padding:16px;position:relative}
.gallery-close{position:absolute;right:14px;top:10px;background:transparent;border:0;color:var(--gold);font-size:28px;cursor:pointer}
.gallery-img{width:100%;height:62vh;max-height:520px;object-fit:contain;border-radius:18px;background:#000}
.gallery-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
.gallery-nav button{flex:1;padding:13px;border-radius:14px;border:1px solid var(--gold2);background:#111;color:var(--gold);font-weight:800;cursor:pointer}
.gallery-count{color:var(--muted);font-size:13px;text-align:center;min-width:70px}
.btn.danger{color:#fff;background:linear-gradient(135deg,#c0392b,#922b21)}
.upload-box{border:1px dashed rgba(230,200,143,.4);border-radius:14px;padding:14px;margin:7px 0 13px;background:#0a0a0a}
.upload-label{color:var(--muted);font-size:12px;margin-bottom:8px;display:block}
.upload-progress{height:6px;background:rgba(230,200,143,.15);border-radius:3px;margin:8px 0 4px;overflow:hidden;display:none}
.upload-progress.on{display:block}
.upload-bar{height:100%;background:var(--gold2);border-radius:3px;width:0%;transition:width .3s}
.upload-status{font-size:12px;color:var(--muted);min-height:16px}
.lost-box{border:2px solid #d9534f;border-radius:18px;padding:16px;margin-bottom:18px;background:#2b1010}
.lost-title{color:#ff8c8c;font-weight:800;margin-bottom:8px;text-align:center}
.lost-text{text-align:center;line-height:1.6}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.lang-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:#111;color:var(--muted);font-size:13px;cursor:pointer}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(230,200,143,.1)}
input[type=file]{padding:10px;cursor:pointer}
.chat-messages{max-height:340px;overflow-y:auto;padding:8px 0;margin-bottom:12px}
.chat-msg{margin-bottom:10px;display:flex;flex-direction:column}
.chat-msg.guest{align-items:flex-start}
.chat-msg.owner{align-items:flex-end}
.chat-name{font-size:11px;color:var(--muted);margin-bottom:3px}
.chat-bubble{max-width:82%;padding:10px 14px;border-radius:14px;line-height:1.5;font-size:14px;word-break:break-word}
.chat-msg.guest .chat-bubble{background:#1e1e1e;border:1px solid rgba(230,200,143,.25);border-radius:14px 14px 14px 2px}
.chat-msg.owner .chat-bubble{background:linear-gradient(135deg,#3a2a0d,#2a1d08);border:1px solid var(--gold2);border-radius:14px 14px 2px 14px;color:var(--gold)}
.chat-time{font-size:10px;color:var(--muted);margin-top:3px}
.chat-input-row{display:flex;gap:8px;align-items:center;margin-top:10px}
.chat-input-row input{margin:0;flex:1}
.btn.chat-send{width:auto;padding:14px 20px;margin:0;flex-shrink:0;font-size:14px}
.chat-empty{text-align:center;color:var(--muted);font-size:13px;padding:24px 0}
.chat-box{border:1px solid rgba(230,200,143,.25);border-radius:18px;padding:14px;margin-top:16px;background:rgba(255,255,255,.02)}
.msg-badge{display:inline-block;background:#c0392b;color:#fff;border-radius:10px;font-size:11px;padding:1px 7px;margin-left:6px;vertical-align:middle}
/* TT Travel Tag */
.tt-header{text-align:center;margin-bottom:20px}
.tt-tagline{color:var(--gold);font-size:13px;letter-spacing:.12em;margin-bottom:6px}
.tt-question{font-size:20px;font-weight:800;line-height:1.35}
.tt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:18px 0 6px}
.tt-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:20px 10px;border-radius:18px;border:1px solid rgba(230,200,143,.3);background:rgba(255,255,255,.04);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;width:100%}
.tt-btn:active{background:rgba(230,200,143,.12);border-color:var(--gold)}
.tt-btn-icon{font-size:26px}
.tt-divider{border:0;border-top:1px solid rgba(122,96,64,.3);margin:22px 0}
.tt-loc-status{text-align:center;color:var(--muted);font-size:12px;min-height:18px;margin:6px 0}
.tt-lost-title{color:var(--gold);font-weight:800;font-size:15px;text-align:center;margin-bottom:6px}
.tt-lost-sub{color:var(--muted);font-size:13px;text-align:center;line-height:1.6;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap"><div id="app" class="card"><div class="loading">불러오는 중입니다...</div></div></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbyhOt-UJ_lZ8Upyw9ZvGKCNT0B2BEM3asnwOuI9_q7GsHHCYglWkPYmgPoz7FvNcNua/exec';
const params=new URLSearchParams(location.search);
const CODE=params.get('code')||'CD-0001';
const MODE=params.get('mode')||'view';
let QR_DATA=null;
let currentLang=localStorage.getItem('saegim_lang')||'ko';
let CHAT_UNSUBSCRIBE=null;
let OWNER_CHAT_UNSUBSCRIBE=null;
let CHAT_NICKNAME=localStorage.getItem('bmt_chat_nick')||'';
loadData();
async function apiGet(action, extra={}){
  const q=new URLSearchParams({action, ...extra});
  const res=await fetch(API_URL+'?'+q.toString());
  return await res.json();
}
async function apiPost(payload){
  const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
  return await res.json();
}
async function loadData(){
  try{
    const data=await apiGet('getQrData',{code:CODE});
    if(!data.success){renderError(data.message||'QR 정보를 불러오지 못했습니다.');return}
    QR_DATA=data;
    MODE==='edit'?renderPassword():renderView(data);
  }catch(e){renderError('서버 연결 중 오류가 발생했습니다.')}
}
function brand(){
  return `<div class="brand"><div class="logo">SAEGIM</div><div class="slogan">기억을 새기다 · 마음을 잇다</div></div>`;
}
function renderView(data){
  if(data.status==='미등록'){renderInactive(data);return;}
  if(data.status==='판매완료'){renderRegister(data);return;}
  if(data.status==='중지'){renderStopped(data);return;}
  if(data.product_code==='BMT'){renderBmt(data);return;}
  if(data.product_code==='CD'){renderCare(data);return;}
  if(data.product_code==='TT'){renderTT(data);return;}
  renderDefault(data);
}
function renderCare(data){
  app.innerHTML=`
    ${brand()}
    <div class="main-title">보호 중인 분을 발견하셨나요?</div>
    <div class="sub">아래 연결 항목으로 연락 부탁드립니다.</div>
    ${renderLinkButtons(data.links||[])}
    <div class="section-title">정보</div>
    <div class="info">
      ${infoRow('이름',data.child_name||data.owner||'-')}
      ${infoRow('보호자',data.guardian_name||'-')}
      ${infoRow('특이사항',data.child_note||'-')}
      ${infoRow('알레르기·질환',data.child_allergy||'-')}
      ${infoRow('혈액형',data.blood_type||'-')}
      ${infoRow('안내 메시지',data.child_message||'-')}
    </div>
    ${thanks()}
    ${editBtn()}
    <div class="footer">SAEGIM · ANSIM QR</div>`;
}
function renderTT(data){
  const lang=currentLang;
  const t=I18N[lang]||I18N.ko;
  const tt=t.tt||I18N.ko.tt;
  const facilities=[
    {icon:'🚻',key:'restroom'},
    {icon:'☕',key:'cafe'},
    {icon:'🏪',key:'convenience'},
    {icon:'🚌',key:'bus'},
    {icon:'🚇',key:'subway'},
    {icon:'🏥',key:'hospital'},
    {icon:'🏧',key:'atm'},
    {icon:'📍',key:'tourist'},
  ];
  const gridHtml=facilities.map(f=>`
    <button class="tt-btn" onclick="findNearby('${f.key}')">
      <span class="tt-btn-icon">${f.icon}</span>
      <span>${esc(tt.facilities[f.key])}</span>
    </button>`).join('');
  const phoneBtn=data.owner_phone?`<a class="btn sub" href="tel:${esc(data.owner_phone)}">📞 ${esc(tt.call)}</a>`:'';
  const emailBtn=data.owner_email?`<a class="btn sub" href="mailto:${esc(data.owner_email)}">✉️ ${esc(tt.email_contact)}</a>`:'';
  app.innerHTML=`
    ${brand()}
    <div class="lang-bar">
      ${['ko','en','ja','zh'].map(l=>`<button class="lang-btn${lang===l?' active':''}" onclick="setLang('${l}')">${l==='ko'?'한국어':l==='en'?'English':l==='ja'?'日本語':'中文'}</button>`).join('')}
    </div>
    <div class="tt-header">
      <div class="tt-tagline">✈️ Travel Tag</div>
      <div class="tt-question">${esc(tt.find_question)}</div>
    </div>
    <div class="tt-grid">${gridHtml}</div>
    <div id="ttLocStatus" class="tt-loc-status"></div>
    <hr class="tt-divider">
    <div class="tt-lost-title">${esc(tt.lost_title)}</div>
    <div class="tt-lost-sub">${esc(tt.lost_sub)}</div>
    <button class="btn" onclick="showChat()">💬 ${esc(tt.chat)}</button>
    ${phoneBtn}${emailBtn}
    ${editBtn()}
    <div class="footer">SAEGIM · TRAVEL TAG</div>`;
}
function findNearby(facilityKey){
  const lang=currentLang;
  const tt=(I18N[lang]||I18N.ko).tt||(I18N.ko.tt);
  const query=tt.facilities[facilityKey]||(I18N.ko.tt.facilities[facilityKey]);
  const statusEl=document.getElementById('ttLocStatus');
  const baseUrl='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(query);
  if(statusEl)statusEl.textContent=tt.locating;
  if(!navigator.geolocation){
    window.open(baseUrl,'_blank');
    if(statusEl)statusEl.textContent='';
    return;
  }
  navigator.geolocation.getCurrentPosition(
    pos=>{
      if(statusEl)statusEl.textContent='';
      window.open(baseUrl+'&location='+pos.coords.latitude+','+pos.coords.longitude,'_blank');
    },
    ()=>{
      if(statusEl){statusEl.textContent=tt.loc_fail;setTimeout(()=>{statusEl.textContent='';},3000);}
      window.open(baseUrl,'_blank');
    },
    {timeout:8000,enableHighAccuracy:false}
  );
}
function renderBmtPrivate(data){
  const lang=currentLang;
  const t=I18N[lang]||I18N.ko;
  const photos=[data.bmt_photo1,data.bmt_photo2,data.bmt_photo3,data.bmt_photo4,data.bmt_photo5].filter(Boolean);
  let photoMode=data.bmt_photo_fit||'single';
  if(photoMode!=='single'&&photoMode!=='slider') photoMode='single';
  const pos=data.bmt_photo_position||'center';
  let photoHtml='';
  if(photos.length){
    if(photoMode==='slider'){
      photoHtml=`
        <div class="bmt-slider">
          ${photos.map(src=>`<div class="bmt-slide"><img class="bmt-photo" src="${esc(src)}" style="object-fit:cover;object-position:${esc(pos)}"></div>`).join('')}
        </div>
        <div class="bmt-dots">${photos.map(()=>`<span class="bmt-dot"></span>`).join('')}</div>`;
    }else{
      photoHtml=`
        <div class="bmt-photo-single">
          <img class="bmt-photo bmt-photo-click" src="${esc(photos[0])}" style="object-fit:cover;object-position:${esc(pos)}" onclick="openGallery(0)">
          ${photos.length>1?`<div class="bmt-photo-hint">${t.photo_hint.replace('{n}',photos.length)}</div>`:''}
        </div>`;
    }
  }
  app.innerHTML=`
    ${brand()}
    <div class="lang-bar">
      ${['ko','en','ja','zh'].map(l=>`<button class="lang-btn${lang===l?' active':''}" onclick="setLang('${l}')">${l==='ko'?'한국어':l==='en'?'English':l==='ja'?'日本語':'中文'}</button>`).join('')}
    </div>
    <div class="main-title">${esc(data.owner||'부산 메모리 태그')}</div>
    <div class="sub">${t.sub}</div>
    ${photoHtml}
    <div class="section-title">${t.section}</div>
    ${data.bmt_travel_memo?`<div class="bmt-memory"><div class="bmt-memory-title">${t.memo}</div><div class="bmt-memory-text">${esc(data.bmt_travel_memo)}</div></div>`:''}
    ${data.bmt_places?`<div class="bmt-memory"><div class="bmt-memory-title">${t.places}</div><div class="bmt-memory-text">${esc(data.bmt_places)}</div></div>`:''}
    ${data.bmt_voice?`<div class="bmt-audio"><div class="bmt-audio-title">${t.voice}</div><audio controls src="${esc(data.bmt_voice)}"></audio></div>`:''}
    <div class="bmt-actions">${renderLinkButtons(data.links||[])}</div>
    <div class="section-title" id="inboxTitle">📩 ${t.inbox_title}</div>
    <div class="chat-box">
      <div id="ownerChatMessages" class="chat-messages"><div class="chat-empty">${t.inbox_empty}</div></div>
      <div class="chat-input-row">
        <input id="owner_reply" placeholder="${t.reply_placeholder}" maxlength="300" onkeydown="if(event.key==='Enter')sendOwnerReply()">
        <button class="btn chat-send" onclick="sendOwnerReply()">${t.send}</button>
      </div>
    </div>
    <button id="pushBtn" class="btn sub" onclick="enablePushNotification()">${t.push_enable}</button>
    ${editBtn()}
    <div class="footer">SAEGIM · MEMORY QR</div>
    ${galleryModalHtml(photos,pos)}`;
  startOwnerChatListener(t);
}
function renderBmt(data){
  const lang=currentLang;
  const t=I18N[lang]||I18N.ko;
  const noticeBox=`<div class="lost-box"><div class="lost-title">${t.notice_title}</div><div class="lost-text">${t.notice_text}</div></div>`;
  const contactButton=data.lost_contact_url
    ? `<a class="btn danger" href="${esc(normalizeLostUrl_(data.lost_contact_type,data.lost_contact_url))}">${esc(data.lost_contact_label||t.contact)}</a>`
    : '';
  app.innerHTML=`
    ${brand()}
    <div class="lang-bar">
      ${['ko','en','ja','zh'].map(l=>`<button class="lang-btn${lang===l?' active':''}" onclick="setLang('${l}')">${l==='ko'?'한국어':l==='en'?'English':l==='ja'?'日本語':'中文'}</button>`).join('')}
    </div>
    ${noticeBox}
    <div class="main-title">${esc(data.owner||t.bmt_title)}</div>
    <div class="sub">${t.public_sub}</div>
    <div class="bmt-actions">
      ${contactButton}
      <button class="btn" onclick="showChat()">💬 ${t.send_message}</button>
      <button class="btn sub" onclick="showMemoryPassword()">🗂 ${t.memory_view}</button>
      ${editBtn()}
    </div>
    <div class="footer">SAEGIM · MEMORY QR</div>`;
}
let GALLERY_PHOTOS=[];
let GALLERY_INDEX=0;
function galleryModalHtml(photos,pos){
  GALLERY_PHOTOS=photos||[];
  GALLERY_INDEX=0;
  if(!GALLERY_PHOTOS.length) return '';
  return `
    <div id="galleryModal" class="gallery-modal" onclick="closeGallery(event)">
      <div class="gallery-box" onclick="event.stopPropagation()">
        <button class="gallery-close" onclick="closeGallery()">×</button>
        <img id="galleryImg" class="gallery-img" src="${esc(GALLERY_PHOTOS[0])}" style="object-position:${esc(pos||'center')}">
        <div class="gallery-nav">
          <button onclick="moveGallery(-1)">${(I18N[currentLang]||I18N.ko).prev}</button>
          <div id="galleryCount" class="gallery-count">1 / ${GALLERY_PHOTOS.length}</div>
          <button onclick="moveGallery(1)">${(I18N[currentLang]||I18N.ko).next}</button>
        </div>
      </div>
    </div>`;
}
function openGallery(index){
  if(!GALLERY_PHOTOS.length) return;
  GALLERY_INDEX=index||0;
  updateGallery();
  const modal=document.getElementById('galleryModal');
  if(modal) modal.classList.add('on');
}
function closeGallery(e){
  const modal=document.getElementById('galleryModal');
  if(modal) modal.classList.remove('on');
}
function moveGallery(step){
  if(!GALLERY_PHOTOS.length) return;
  GALLERY_INDEX=(GALLERY_INDEX+step+GALLERY_PHOTOS.length)%GALLERY_PHOTOS.length;
  updateGallery();
}
function updateGallery(){
  const img=document.getElementById('galleryImg');
  const count=document.getElementById('galleryCount');
  if(img) img.src=GALLERY_PHOTOS[GALLERY_INDEX];
  if(count) count.textContent=(GALLERY_INDEX+1)+' / '+GALLERY_PHOTOS.length;
}

function renderDefault(data){
  app.innerHTML=`
    ${brand()}
    <div class="main-title">${esc(data.owner||data.product||'새김 연결 태그')}</div>
    <div class="sub">아래 연결 항목을 확인해주세요.</div>
    ${renderLinkButtons(data.links||[])}
    ${editBtn()}
    <div class="footer">SAEGIM QR</div>`;
}
function renderInactive(data){
  app.innerHTML=`
    ${brand()}

// ── 연결 항목 편집 (patch v1) ─────────────────────────────
const LINK_TYPES=['전화','카카오','인스타그램','이메일','홈페이지','지도','왓츠앱','라인','텔레그램','기타'];

function editLinks(links){
  const t=I18N[currentLang]||I18N.ko;
  let arr=(links||[]).filter(l=>l&&(l.label||l.url||l.type));
  if(!arr.length){arr=[{type:'전화',label:'',url:''}];}
  arr=arr.slice(0,5);
  return `
    ${arr.map((l,i)=>linkEditBox(l,i,arr.length)).join('')}
    ${arr.length<5?`<button class="btn sub" onclick="addLinkItem()">${t.add_item}</button>`:''}
  `;
}

function linkEditBox(l,i,total){
  const t=I18N[currentLang]||I18N.ko;
  return `
    <div class="edit-group link-edit">
      <label>${t.type}</label>
      <select id="link${i}_type">
        ${LINK_TYPES.map(type=>`<option value="${esc(type)}" ${String(l.type||'전화')===type?'selected':''}>${esc(type)}</option>`).join('')}
      </select>
      <label>${t.button_name}</label>
      <input id="link${i}_label" value="${esc(l.label||'')}">
      <label>${t.link_url}</label>
      <input id="link${i}_url" value="${esc(String(l.url||'').replace(/^tel:/,''))}">
      ${total>1?`<button class="btn sub" onclick="removeLinkItem(${i})">${t.remove_item}</button>`:''}
    </div>
  `;
}

function collectLinksRaw(){
  const groups=document.querySelectorAll('.link-edit');
  return Array.from(groups).map((g,i)=>({
    type:val('link'+i+'_type')||'전화',
    label:val('link'+i+'_label'),
    url:val('link'+i+'_url')
  }));
}

function collectLinks(){
  return collectLinksRaw()
    .filter(l=>l.url)
    .map(l=>{
      if(l.type==='지도'&&!l.url.startsWith('http')){
        return{...l,label:l.label||l.url,url:'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(l.url)};
      }
      return l;
    })
    .slice(0,5);
}

function addLinkItem(){
  const links=collectLinksRaw();
  if(links.length>=5){alert('연결 항목은 최대 5개까지 가능합니다.');return;}
  links.push({type:'전화',label:'',url:''});
  document.getElementById('linksEdit').innerHTML=editLinks(links);
}

function removeLinkItem(index){
  const links=collectLinksRaw();
  links.splice(index,1);
  document.getElementById('linksEdit').innerHTML=editLinks(links.length?links:[{type:'전화',label:'',url:''}]);
}

// ── Firebase Storage 업로드 UI ────────────────────────────
function uploadBox(key,label,currentUrl,type='image'){
  const t=I18N[currentLang]||I18N.ko;
  const accept=type==='audio'?'audio/*':'image/*';
  const onchange=type==='audio'?`previewAudio(this,'prev_${key}')`:`previewPhoto(this,'prev_${key}')`;
  const hasUrl=!!currentUrl;
  const preview=type==='audio'
    ?`<audio id="prev_${key}" controls style="display:${hasUrl?'block':'none'};width:100%;margin-bottom:8px"${hasUrl?` src="${esc(currentUrl)}"`:''} ></audio>`
    :`<img id="prev_${key}" style="display:${hasUrl?'block':'none'};width:100%;max-height:180px;object-fit:cover;border-radius:10px;margin-bottom:8px"${hasUrl?` src="${esc(currentUrl)}"`:''}>`;
  return `<div class="upload-box">
    <span class="upload-label">${label}${hasUrl?' ('+t.replace_file+')':' ('+t.choose_file+')'}</span>
    ${preview}
    <input type="file" id="file_${key}" accept="${accept}" onchange="${onchange}">
    <input type="hidden" id="${key}" value="${esc(currentUrl)}">
    <div id="prog_${key}" class="upload-progress"><div id="bar_${key}" class="upload-bar"></div></div>
    <div id="stat_${key}" class="upload-status"></div>
  </div>`;
}
function previewPhoto(input,previewId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{const img=document.getElementById(previewId);if(img){img.src=e.target.result;img.style.display='block';}};
  reader.readAsDataURL(file);
}
function previewAudio(input,previewId){
  const file=input.files[0];if(!file)return;
  const audio=document.getElementById(previewId);
  if(audio){audio.src=URL.createObjectURL(file);audio.style.display='block';}
}
function setUploadProgress(key,pct){
  const prog=document.getElementById('prog_'+key);
  const bar=document.getElementById('bar_'+key);
  if(prog)prog.classList.add('on');
  if(bar)bar.style.width=pct+'%';
}
function setUploadStatus(key,msg){
  const el=document.getElementById('stat_'+key);
  if(el)el.textContent=msg;
}
async function uploadBmtFiles(){
  if(!window.uploadToFirebase){alert('Firebase가 초기화되지 않았습니다. 잠시 후 다시 시도해주세요.');return false;}
  const slots=[
    {key:'bmt_photo1',path:`bmt/${CODE}/cover`},
    {key:'bmt_photo2',path:`bmt/${CODE}/photo2`},
    {key:'bmt_photo3',path:`bmt/${CODE}/photo3`},
    {key:'bmt_photo4',path:`bmt/${CODE}/photo4`},
    {key:'bmt_photo5',path:`bmt/${CODE}/photo5`},
  ];
  for(const {key,path} of slots){
    const fileEl=document.getElementById('file_'+key);
    if(fileEl&&fileEl.files[0]){
      const ext=fileEl.files[0].name.split('.').pop().toLowerCase();
      const t=I18N[currentLang]||I18N.ko;
      setUploadStatus(key,t.uploading);
      try{
        const url=await window.uploadToFirebase(fileEl.files[0],`${path}.${ext}`,pct=>setUploadProgress(key,pct));
        document.getElementById(key).value=url;
        setUploadStatus(key,t.upload_done);
      }catch(e){alert(key+' 업로드 실패: '+e.message);return false;}
    }
  }
  const voiceEl=document.getElementById('file_bmt_voice');
  if(voiceEl&&voiceEl.files[0]){
    const ext=voiceEl.files[0].name.split('.').pop().toLowerCase();
    const tv=I18N[currentLang]||I18N.ko;
    setUploadStatus('bmt_voice',tv.uploading);
    try{
      const url=await window.uploadToFirebase(voiceEl.files[0],`bmt/${CODE}/voice.${ext}`,pct=>setUploadProgress('bmt_voice',pct));
      document.getElementById('bmt_voice').value=url;
      setUploadStatus('bmt_voice',tv.upload_done);
    }catch(e){alert('음성 업로드 실패: '+e.message);return false;}
  }
  return true;
}

  const pw=val('new_password');

  const pc=QR_DATA.product_code||'';
  const isBmt=(pc==='BMT');
  const isTT=(pc==='TT');
  if(isBmt){const ok=await uploadBmtFiles();if(!ok)return;}
  const links=isTT?[]:collectLinks();
  const base={action:'registerSoldQr',code:CODE,password:pw,owner:val('owner'),links:JSON.stringify(links)};

function setChatNickname(){

function startGuestChatListener(t){
  if(!window.firestoreDb)return;
  const {collection,query,orderBy,onSnapshot}=window.firestoreApi;
  const colRef=collection(window.firestoreDb,'chats',CODE,'messages');
  const q=query(colRef,orderBy('createdAt','asc'));
  CHAT_UNSUBSCRIBE=onSnapshot(q,snapshot=>{
    const box=document.getElementById('chatMessages');
    if(!box){if(CHAT_UNSUBSCRIBE)CHAT_UNSUBSCRIBE();return;}
    if(snapshot.empty){box.innerHTML=`<div class="chat-empty">${t.chat_empty}</div>`;return;}
    box.innerHTML=snapshot.docs.map(doc=>{
      const d=doc.data();
      const isOwner=d.user==='owner';
      const name=isOwner?(t.owner_label||'주인'):(d.nickname||'발견자');
      const time=d.createdAt?d.createdAt.slice(11,16):'';
      return `<div class="chat-msg ${isOwner?'owner':'guest'}">
        <div class="chat-name">${esc(name)}</div>
        <div class="chat-bubble">${esc(d.message)}</div>
        <div class="chat-time">${time}</div>
      </div>`;
    }).join('');
    box.scrollTop=box.scrollHeight;
  });
}
async function sendChatMessage(){
  const t=I18N[currentLang]||I18N.ko;
  if(!window.firestoreDb){alert('Firestore 연결 중입니다. 잠시 후 다시 시도해주세요.');return;}
  const msg=val('chat_msg');
  if(!msg){return;}
  const {collection,addDoc}=window.firestoreApi;
  const input=document.getElementById('chat_msg');
  input.disabled=true;
  try{
    await addDoc(collection(window.firestoreDb,'chats',CODE,'messages'),{
      user:'guest',
      nickname:CHAT_NICKNAME,
      message:msg,
      createdAt:new Date().toISOString(),
      lang:currentLang
    });
    apiPost({
      action:'sendOwnerEmailAlert',
      code:CODE,
      nickname:CHAT_NICKNAME,
      message:msg
    }).catch(function(e){console.log('email alert failed',e);});
    apiPost({
      action:'sendOwnerPushAlert',
      code:CODE,
      nickname:CHAT_NICKNAME,
      message:msg
    }).catch(function(e){console.log('push alert failed',e);});
    input.value='';
  }catch(e){alert(t.send_fail+': '+e.message);}
  finally{input.disabled=false;input.focus();}
}
function startOwnerChatListener(t){
  if(!window.firestoreDb)return;
  const {collection,query,orderBy,onSnapshot}=window.firestoreApi;
  const colRef=collection(window.firestoreDb,'chats',CODE,'messages');
  const q=query(colRef,orderBy('createdAt','asc'));
  if(OWNER_CHAT_UNSUBSCRIBE){OWNER_CHAT_UNSUBSCRIBE();OWNER_CHAT_UNSUBSCRIBE=null;}
  OWNER_CHAT_UNSUBSCRIBE=onSnapshot(q,snapshot=>{
    const box=document.getElementById('ownerChatMessages');
    if(!box){if(OWNER_CHAT_UNSUBSCRIBE)OWNER_CHAT_UNSUBSCRIBE();return;}
    if(snapshot.empty){box.innerHTML=`<div class="chat-empty">${t.inbox_empty}</div>`;return;}
    box.innerHTML=snapshot.docs.map(doc=>{
      const d=doc.data();
      const isOwner=d.user==='owner';
      const name=isOwner?(t.owner_label||'주인'):(d.nickname||'발견자');
      const time=d.createdAt?d.createdAt.slice(11,16):'';
      return `<div class="chat-msg ${isOwner?'owner':'guest'}">
        <div class="chat-name">${esc(name)}</div>
        <div class="chat-bubble">${esc(d.message)}</div>

async function enablePushNotification(){
  const t=I18N[currentLang]||I18N.ko;
  try{
    // 이미 subscription ID 있으면 바로 저장
    let id=OneSignal?.User?.PushSubscription?.id;
    if(!id){
      // 권한 없으면 요청
      if(Notification.permission!=='granted'){
        const perm=await Notification.requestPermission();
        if(perm!=='granted'){alert('알림 권한을 허용해주세요.');return;}
      }
      // opt-in 후 ID 대기 (최대 5초)
      OneSignal.User.PushSubscription.optIn();
      for(let i=0;i<10&&!id;i++){
        await new Promise(r=>setTimeout(r,500));
        id=OneSignal?.User?.PushSubscription?.id;
      }
    }
    if(!id){alert('알림 설정 실패. 다시 시도해주세요.');return;}
    const saveResult=await apiPost({action:'savePushToken',code:CODE,token:id});
    if(!saveResult||!saveResult.success){alert('토큰 저장 실패: '+(saveResult&&saveResult.message||'오류'));return;}
    const btn=document.getElementById('pushBtn');
    if(btn){btn.textContent=t.push_enabled;btn.disabled=true;}
  }catch(e){console.error('OneSignal error',e);alert('알림 설정 실패: '+e.message);}
}
function normalizeLostUrl_(type,url){
  const v=String(url||'').trim();
  if(!v)return'';
  if(type==='전화')return v.startsWith('tel:')?v:'tel:'+v.replace(/[^0-9+]/g,'');
  if(type==='이메일')return v.startsWith('mailto:')?v:'mailto:'+v;
  return v;
}

const fbApp=initializeApp(firebaseConfig);
const storage=getStorage(fbApp);
const db=getFirestore(fbApp);
window.firestoreDb=db;
window.firestoreApi={collection,addDoc,query,orderBy,onSnapshot};
window.uploadToFirebase=function(file,path,onProgress){
  return new Promise((resolve,reject)=>{
    const storageRef=ref(storage,path);
    const task=uploadBytesResumable(storageRef,file);
    task.on('state_changed',
      snap=>{if(onProgress)onProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100));},
      err=>reject(err),
      async()=>{resolve(await getDownloadURL(task.snapshot.ref));}
    );
  });
};
</script>
