name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SA_KEY }}
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json

          firebase deploy --only hosting --project saegim-memory 2>&1 | tee /tmp/deploy.log
          EXIT=${PIPESTATUS[0]}

          if [ $EXIT -ne 0 ]; then
            if grep -q "is the current active version" /tmp/deploy.log; then
              echo "✓ 콘텐츠 변경 없음 — 이미 최신 버전입니다."
              exit 0
            fi
            cat /tmp/deploy.log
            exit $EXIT
          fi
