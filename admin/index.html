<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 QR 관리자</title>
<style>
:root{--bg:#0f0f0f;--card:#181818;--line:#3a3020;--gold:#e6c88f;--gold2:#c7a05d;--text:#f0e6d0;--muted:#8a7a68;--red:#e06060;--green:#6abe78;--blue:#6aabe6}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Noto Sans KR',sans-serif;min-height:100vh}

/* ── 로그인 ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{text-align:center;padding:48px 36px;border:1px solid var(--line);border-radius:24px;background:var(--card);max-width:380px;width:100%}
.logo{font-family:serif;font-size:40px;letter-spacing:.2em;color:var(--gold);margin-bottom:8px}
.login-sub{color:var(--muted);font-size:14px;margin-bottom:32px}
.google-btn{display:inline-flex;align-items:center;gap:12px;padding:14px 28px;background:#fff;color:#333;border:0;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;justify-content:center}
.google-btn:hover{background:#f5f5f5}
.google-btn img{width:20px;height:20px}
.login-err{margin-top:14px;color:var(--red);font-size:13px}

/* ── 레이아웃 ── */
#adminScreen{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--card)}
.topbar-title{font-size:18px;font-weight:800;color:var(--gold)}
.topbar-email{font-size:13px;color:var(--muted)}
.logout-btn{padding:7px 16px;border:1px solid var(--line);border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:13px}
.logout-btn:hover{color:var(--gold);border-color:var(--gold2)}

.main{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:200px;border-right:1px solid var(--line);padding:20px 0;flex-shrink:0}
.nav-item{display:block;padding:11px 20px;color:var(--muted);cursor:pointer;font-size:14px;border-left:3px solid transparent}
.nav-item:hover,.nav-item.active{color:var(--gold);border-left-color:var(--gold2);background:rgba(230,200,143,.05)}
.content{flex:1;padding:28px;overflow-y:auto}

/* ── 공통 컴포넌트 ── */
.page{display:none}.page.active{display:block}
h2{font-size:20px;font-weight:800;color:var(--gold);margin-bottom:20px}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center}
.stat-num{font-size:32px;font-weight:800;color:var(--gold)}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}

.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:#111;color:var(--text);font-size:14px}
.search-bar input{flex:1;min-width:180px}
#filterType{min-width:190px}
#sortType{min-width:150px}
#filterBackup{min-width:150px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;color:var(--muted);border-bottom:1px solid var(--line);font-weight:600;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.03)}

.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-미등록{background:#222;color:var(--muted)}
.badge-판매완료{background:#2a2000;color:#e6c020}
.badge-사용중{background:#0d2a1a;color:var(--green)}
.badge-중지{background:#2a0d0d;color:var(--red)}
.badge-분실{background:#2a1a00;color:#e6a020}

.btn{padding:7px 16px;border-radius:8px;border:0;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary{background:linear-gradient(135deg,#f0d9a4,#c79a4f);color:#111}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
.btn-ghost:hover{border-color:var(--gold2);color:var(--gold)}
.btn-danger{background:#3a1010;color:var(--red);border:1px solid #5a2020}

.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}

/* ── 모달 ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto}
.modal h3{color:var(--gold);font-size:18px;margin-bottom:16px}
.field-row{margin-bottom:12px}
.field-row label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field-row input,.field-row select,.field-row textarea{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:14px}
.field-row textarea{min-height:70px;resize:vertical}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.backup-badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,.12)}
.backup-ok{color:#8ff0a4;background:rgba(40,180,90,.16);border-color:rgba(40,180,90,.45)}
.backup-warn{color:#ffd36b;background:rgba(255,190,70,.14);border-color:rgba(255,190,70,.45)}
.backup-bad{color:#ff8f8f;background:rgba(255,80,80,.14);border-color:rgba(255,80,80,.45)}
.detail-grid{display:grid;grid-template-columns:140px 1fr;gap:0;border:1px solid var(--line);border-radius:16px;overflow:hidden;margin-top:14px}
.detail-label,.detail-value{padding:12px 14px;border-bottom:1px solid rgba(122,96,64,.35);font-size:13px}
.detail-label{color:var(--gold);background:rgba(230,200,143,.05);font-weight:700}
.detail-value{color:var(--text);word-break:break-all}
.detail-grid .detail-label:nth-last-child(2),.detail-grid .detail-value:last-child{border-bottom:0}
.detail-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.detail-actions a,.detail-actions button{text-decoration:none}
.detail-section-title{margin-top:22px;margin-bottom:8px;color:var(--gold);font-size:14px;font-weight:800}

.loading-msg{color:var(--muted);text-align:center;padding:40px;font-size:14px}
.error-msg{color:var(--red);text-align:center;padding:40px;font-size:14px}
.product-stat-table th,
.product-stat-table td{text-align:center}
.product-stat-table th:first-child,
.product-stat-table td:first-child{text-align:left}
.product-name-main{font-weight:800;color:var(--text)}
.product-name-sub{display:block;margin-top:3px;color:var(--muted);font-size:12px}
.inventory-toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:12px 0 14px}
.inventory-count{color:var(--muted);font-size:13px}
@media(max-width:720px){.inventory-toolbar{align-items:flex-start;flex-direction:column}}
.collapsible-head{display:flex;justify-content:space-between;align-items:center;gap:12px;cursor:pointer}
.collapse-summary{margin-top:8px;color:var(--muted);font-size:13px}
.collapsible-card.collapsed #productStatsContent{display:none}
.collapsible-card.collapsed{padding-bottom:18px}
@media(max-width:720px){.collapsible-head{align-items:flex-start}}

.quick-edit-box{margin-top:18px;padding:16px;border:1px solid rgba(122,96,64,.55);border-radius:16px;background:rgba(255,255,255,.025)}
.quick-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.quick-field-wrap label{display:block;margin-bottom:6px;color:var(--gold);font-size:12px;font-weight:700}
.quick-field,.quick-textarea{width:100%;border:1px solid var(--line);border-radius:12px;background:#0d0d0d;color:var(--text);padding:10px 12px;font-size:13px;outline:none}
.quick-textarea{min-height:74px;resize:vertical}
.quick-field:focus,.quick-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(230,200,143,.12)}
.quick-edit-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
@media(max-width:720px){.quick-edit-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="logo">SAEGIM</div>
    <div class="login-sub">QR 통합 관리자</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Google 계정으로 로그인
    </button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="adminScreen">
  <div class="topbar">
    <div class="topbar-title">새김 QR 관리자</div>
    <div style="display:flex;align-items:center;gap:14px">
      <span class="topbar-email" id="adminEmail"></span>
      <button class="logout-btn" onclick="signOutAdmin()">로그아웃</button>
    </div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="nav-item active" onclick="showPage('dashboard',this)">대시보드</div>
      <div class="nav-item" onclick="showPage('inventory',this)">QR 재고</div>
      <div class="nav-item" onclick="showPage('create',this)">QR 생성</div>
    </div>
    <div class="content">
      <!-- 대시보드 -->
      <div class="page active" id="page-dashboard">
        <h2>대시보드</h2>
        <div class="stat-row" id="statRow"><div class="loading-msg">로딩 중...</div></div>
        <div class="card">
          <div style="color:var(--gold);font-weight:700;margin-bottom:12px">최근 등록</div>
          <div id="recentList"><div class="loading-msg">로딩 중...</div></div>
        </div>
      </div>

      <div class="card collapsible-card" id="productStatsCard" style="margin-top:22px">
        <div class="collapsible-head" onclick="toggleProductStats()">
          <div>
            <h3 style="margin:0;color:var(--gold)">제품별 현황</h3>
            <div id="productStatsSummary" class="collapse-summary">전체 0개</div>
          </div>
          <button id="productStatsToggle" class="btn btn-ghost" type="button">접기</button>
        </div>
        <div id="productStatsContent">
          <table class="admin-table product-stat-table" style="margin-top:14px">
            <thead>
              <tr>
                <th>제품</th><th>전체</th><th>사용중</th>
                <th>판매완료</th><th>미등록</th><th>중지</th><th>분실</th>
              </tr>
            </thead>
            <tbody id="productStatsBody">
              <tr><td colspan="7" class="loading-msg">불러오는 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- QR 재고 -->
      <div class="page" id="page-inventory">
        <h2>QR 재고</h2>
        <div class="search-bar">
          <input id="searchCode" placeholder="코드 검색 (예: CD-0024)" oninput="filterTable()" onkeydown="handleSearchKey(event)">
          <select id="filterStatus" onchange="filterTable()">
            <option value="">전체 상태</option>
            <option>미등록</option>
            <option>판매완료</option>
            <option>사용중</option>
            <option>중지</option>
            <option>분실</option>
          </select>
          <select id="filterType" onchange="filterTable()">
            <option value="">전체 제품</option>
            <option value="CD">CD · 안심태그</option>
            <option value="BMT">BMT · 부산 메모리 태그</option>
            <option value="GT">GT · 가든 태그</option>
            <option value="WT">WT · 바램태그</option>
            <option value="TT">TT · 길동무 태그</option>
          </select>
          <select id="sortType" onchange="filterTable()">
            <option value="updated_desc">최신 수정순</option>
            <option value="code_asc">코드순</option>
            <option value="scan_desc">조회수 많은순</option>
            <option value="registered_desc">등록일 최신순</option>
            <option value="status_asc">상태순</option>
          </select>
          <select id="filterBackup" onchange="filterTable()">
            <option value="">전체 백업상태</option>
            <option value="정상">정상</option>
            <option value="QR 없음">QR 없음</option>
            <option value="백업시간 없음">백업시간 없음</option>
            <option value="점검필요">점검필요</option>
          </select>
        </div>
        <div class="inventory-toolbar">
          <div id="inventoryCount" class="inventory-count">전체 0개</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-ghost" onclick="checkAdminFeatureReady()">기능 점검</button>
            <button class="btn btn-ghost" onclick="resetInventoryFilters()">필터 초기화</button>
            <button class="btn btn-ghost" onclick="clearSelection()">선택 해제</button>
            <button class="btn btn-ghost" onclick="refreshInventory()">새로고침</button>
            <button class="btn btn-ghost" onclick="regenerateMissingQrImages()">QR 없음 일괄 재생성</button>
          </div>
        </div>
        <div style="margin-bottom:16px">
          <button class="btn btn-ghost" onclick="normalizeFirestoreCards()">Firestore 데이터 보정</button>
        </div>
        <div style="overflow-x:auto">
          <table id="inventoryTable">
            <thead>
              <tr>
                <th>코드</th><th>제품</th><th>상태</th><th>소유자</th>
                <th>스캔</th><th>등록일</th><th>백업</th><th>관리</th>
              </tr>
            </thead>
            <tbody id="inventoryBody"><tr><td colspan="8" class="loading-msg">로딩 중...</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- QR 생성 -->
      <div class="page" id="page-create">
        <h2>QR 생성</h2>
        <div class="card">
          <div class="field-row">
            <label>제품</label>
            <select id="createType">
              <option value="">제품 선택</option>
              <option value="CD">CD · 미아방지</option>
              <option value="BMT">BMT · 부산 메모리 태그</option>
              <option value="GT">GT · 가든 태그</option>
              <option value="WT">WT · 바램태그</option>
              <option value="TT">TT · 길동무 태그</option>
            </select>
          </div>
          <div class="field-row">
            <label>생성 수량 (1~20)</label>
            <input type="number" id="createQty" min="1" max="20" value="1">
          </div>
          <div style="margin-top:16px">
            <button class="btn btn-primary" onclick="createQrCardsViaApi()">QR 생성</button>
            <button class="btn btn-ghost" onclick="resetAdminApiKey()" style="margin-left:10px">API 키 재입력</button>
          </div>
          <div id="createResult" style="margin-top:16px;font-size:13px;line-height:1.8"></div>
        </div>
        <div class="card" style="margin-top:0">
          <div style="color:var(--muted);font-size:12px;line-height:1.8">
            처음 실행 시 Apps Script 관리자 API 키 입력 팝업이 뜹니다.<br>
            키는 세션 동안 유지됩니다. 키를 바꾸려면 "API 키 재입력" 버튼을 누르세요.
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 상세 정보 모달 -->
<div class="modal-bg" id="detailModal">
  <div class="modal" style="max-width:620px">
    <h3 id="detailTitle">QR 상세 정보</h3>
    <div id="detailContent"><div class="loading-msg">불러오는 중...</div></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('detailModal')">닫기</button>
    </div>
  </div>
</div>

<!-- 상태 변경 모달 -->
<div class="modal-bg" id="statusModal">
  <div class="modal">
    <h3>상태 변경</h3>
    <div class="field-row">
      <label>코드</label>
      <input id="modalCode" readonly style="opacity:.6">
    </div>
    <div class="field-row">
      <label>상태</label>
      <select id="modalStatus">
        <option>미등록</option>
        <option>판매완료</option>
        <option>사용중</option>
        <option>중지</option>
        <option>분실</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('statusModal')">취소</button>
      <button class="btn btn-primary" onclick="saveStatus()">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp }          from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                   from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, serverTimestamp, query, orderBy }
                                   from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyA8uBfMGkg9gLiHiqnFh_Klmd0etvk0qQg',
  authDomain:        'saegim-memory.firebaseapp.com',
  projectId:         'saegim-memory',
  storageBucket:     'saegim-memory.firebasestorage.app',
  messagingSenderId: '888229102391',
  appId:             '1:888229102391:web:f4fe41ece07ddacd2a10b2'
};

const ADMIN_EMAILS = ['rjbcom4263@gmail.com'];

const app  = initializeApp(FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

let allItems = [];
let currentShownItems = [];

// ── 인증 ──────────────────────────────────────────
window.signInWithGoogle = async function() {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) {
    document.getElementById('loginErr').textContent = '로그인 실패: ' + e.message;
  }
};

window.signOutAdmin = function() { signOut(auth); };

onAuthStateChanged(auth, user => {
  if (user && ADMIN_EMAILS.includes(user.email)) {
    document.getElementById('loginScreen').style.display  = 'none';
    document.getElementById('adminScreen').style.display  = 'block';
    document.getElementById('adminEmail').textContent     = user.email;
    loadDashboard();
    loadInventory();
  } else if (user) {
    signOut(auth);
    document.getElementById('loginErr').textContent = '관리자 권한이 없습니다: ' + user.email;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminScreen').style.display = 'none';
  }
});

// ── 페이지 전환 ───────────────────────────────────
window.showPage = function(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  el.classList.add('active');
};

// ── 데이터 로드 ───────────────────────────────────
async function loadInventory() {
  try {
    const snap = await getDocs(collection(db, 'qr_cards'));
    allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const sorted = sortInventoryItems(allItems);
    renderTable(sorted);
    updateInventoryCount(sorted.length, allItems.length);
  } catch(e) {
    document.getElementById('inventoryBody').innerHTML =
      '<tr><td colspan="8" class="error-msg">로드 실패: ' + e.message + '</td></tr>';
  }
}

async function loadDashboard() {
  try {
    const snap = await getDocs(collection(db, 'qr_cards'));
    const items = snap.docs.map(d => d.data());

    const counts = { total: items.length, 미등록:0, 판매완료:0, 사용중:0, 중지:0, 분실:0 };
    items.forEach(i => { if (counts[i.status] !== undefined) counts[i.status]++; });

    document.getElementById('statRow').innerHTML = [
      ['전체', counts.total, ''],
      ['사용중', counts['사용중'], 'color:var(--green)'],
      ['판매완료', counts['판매완료'], 'color:#e6c020'],
      ['미등록', counts['미등록'], ''],
      ['중지', counts['중지'], 'color:var(--red)'],
      ['분실', counts['분실'], 'color:#e6a020'],
    ].map(([label, num, style]) =>
      '<div class="stat"><div class="stat-num" style="' + style + '">' + num + '</div>'
      + '<div class="stat-label">' + label + '</div></div>'
    ).join('');

    const recent = items
      .filter(i => i.registered_at)

const PRODUCT_LABELS = {
  CD:'안심태그', BMT:'부산 메모리 태그', GT:'가든 태그', WT:'바램태그', TT:'길동무 태그'
};

window.toggleProductStats = function() {

  const btn = document.getElementById('productStatsToggle');
  if (!card || !btn) return;
  const collapsed = card.classList.toggle('collapsed');
  btn.textContent = collapsed ? '펼치기' : '접기';
  localStorage.setItem('SAEGIM_PRODUCT_STATS_COLLAPSED', collapsed ? '1' : '0');
};

function restoreProductStatsCollapsed() {
  const saved = localStorage.getItem('SAEGIM_PRODUCT_STATS_COLLAPSED');
  const card = document.getElementById('productStatsCard');
  const btn = document.getElementById('productStatsToggle');
  if (!card || !btn) return;
  if (saved === '1') { card.classList.add('collapsed'); btn.textContent = '펼치기'; }
  else { card.classList.remove('collapsed'); btn.textContent = '접기'; }
}

function renderProductStats(items) {
  const tbody = document.getElementById('productStatsBody');
  if (!tbody) return;
  const types = ['CD','BMT','GT','WT','TT'];
  const stats = {};
  types.forEach(function(t) {
    stats[t] = {total:0, using:0, sold:0, unused:0, stopped:0, lost:0};
  });
  items.forEach(function(item) {
    const t = getItemType(item);
    if (!stats[t]) return;
    const st = String(item.status || '').trim();
    stats[t].total++;
    if (st === '사용중')      stats[t].using++;
    else if (st === '판매완료') stats[t].sold++;
    else if (st === '미등록' || st === '') stats[t].unused++;
    else if (st === '중지')   stats[t].stopped++;
    else if (st === '분실')   stats[t].lost++;
  });
  const summaryEl = document.getElementById('productStatsSummary');
  if (summaryEl) {
    let total=0, using=0, sold=0, unused=0;
    Object.keys(stats).forEach(function(t) {
      total+=stats[t].total; using+=stats[t].using;
      sold+=stats[t].sold; unused+=stats[t].unused;
    });
    summaryEl.textContent = '전체 '+total+'개 · 사용중 '+using+'개 · 판매완료 '+sold+'개 · 미등록 '+unused+'개';
  }
  tbody.innerHTML = types.map(function(t) {
    const s = stats[t];
    return '<tr>'
      + '<td><span class="product-name-main">'+t+'</span>'
      + '<span class="product-name-sub">'+( PRODUCT_LABELS[t]||'')+'</span></td>'
      + '<td>'+s.total+'</td><td>'+s.using+'</td><td>'+s.sold+'</td>'
      + '<td>'+s.unused+'</td><td>'+s.stopped+'</td><td>'+s.lost+'</td>'
      + '</tr>';
  }).join('');
}

// ── 테이블 ────────────────────────────────────────
function getItemType(item) {
  var type = String(item.product_type || '').trim().toUpperCase();
  if (type) return type;
  var code = String(item.code || item.id || '').trim().toUpperCase();
  if (code.indexOf('-') > -1) return code.split('-')[0];
  return '';
}

function getProductNameByType(type) {
  var names = { CD:'미아방지', BMT:'부산 메모리 태그', GT:'가든 태그', WT:'바램태그', TT:'길동무 태그' };
  return names[type] || '';
}

function getProductLabel(item) {
  var type = getItemType(item);
  var name = String(item.product || '').trim();
  if (!name) name = getProductNameByType(type);
  if (type && name) return type + ' · ' + name;
  return type || name || '-';
}

function renderTable(items) {
  currentShownItems = items || [];
  const tbody = document.getElementById('inventoryBody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="loading-msg">항목 없음</td></tr>';
    return;
  }
  tbody.innerHTML = items.map(item => {
    const status  = item.status || '-';
    const code    = item.code || item.id || '-';
    return '<tr>'
      + '<td style="font-weight:700">' + code + '</td>'
      + '<td>' + getProductLabel(item) + '</td>'
      + '<td><span class="badge badge-' + status + '">' + status + '</span></td>'
      + '<td>' + (item.owner||item.child_name||'-') + '</td>'
      + '<td style="text-align:center">' + (item.scan_count||0) + '</td>'
      + '<td style="color:var(--muted)">' + (item.registered_at||item.sold_at||item.updated_at||'-') + '</td>'
      + '<td>' + renderBackupBadge(item) + '</td>'
      + '<td>'
      + '<button class="btn btn-ghost" onclick="openDetailModal(\'' + code + '\')" style="margin-right:4px">상세</button>'
      + '<button class="btn btn-ghost" onclick="openStatusModal(\'' + code + '\',\'' + status + '\')">상태변경</button>'
      + '</td>'
      + '</tr>';
  }).join('');
}

function getDateValue(v) {
  if (!v) return 0;
  if (typeof v === 'object' && v.seconds) return v.seconds * 1000;
  const t = new Date(String(v).trim().replace(' ','T')).getTime();
  return isNaN(t) ? 0 : t;
}

function sortInventoryItems(items) {
  const el = document.getElementById('sortType');
  const sort = el ? el.value : 'updated_desc';
  const statusOrder = {'미등록':1,'판매완료':2,'사용중':3,'중지':4,'분실':5};
  return items.slice().sort(function(a,b) {
    const ca = String(a.code||a.id||''), cb = String(b.code||b.id||'');
    if (sort === 'code_asc') return ca.localeCompare(cb);
    if (sort === 'scan_desc') return Number(b.scan_count||0) - Number(a.scan_count||0);
    if (sort === 'registered_desc')
      return getDateValue(b.registered_at||b.sold_at||b.created_at)
           - getDateValue(a.registered_at||a.sold_at||a.created_at);
    if (sort === 'status_asc') {
      const sa = statusOrder[String(a.status||'').trim()]||99;
      const sb = statusOrder[String(b.status||'').trim()]||99;
      return sa !== sb ? sa - sb : ca.localeCompare(cb);
    }
    return getDateValue(b.updated_at||b.registered_at||b.sold_at||b.created_at)
         - getDateValue(a.updated_at||a.registered_at||a.sold_at||a.created_at);
  });
}

function updateInventoryCount(shown, total) {
  const el = document.getElementById('inventoryCount');
  if (!el) return;
  shown = Number(shown||0); total = Number(total||0);
  el.textContent = shown === total
    ? '전체 ' + total + '개'
    : '전체 ' + total + '개 중 ' + shown + '개 표시';
}

window.filterTable = function() {
  const code   = document.getElementById('searchCode').value.trim().toUpperCase();
  const status = document.getElementById('filterStatus').value;
  const type   = document.getElementById('filterType').value;
  const backup = document.getElementById('filterBackup') ? document.getElementById('filterBackup').value : '';

  const filtered = allItems.filter(function(item) {
    const itemCode = String(item.code || item.id || '').toUpperCase();
    const itemType = getItemType(item);
    const owner    = String(item.owner || item.child_name || '').toUpperCase();
    const product  = String(item.product || getProductNameByType(itemType) || '').toUpperCase();
    const backupStatus = getBackupStatus(item).label;

    return (!code   || itemCode.includes(code) || owner.includes(code) || product.includes(code))
        && (!status || item.status === status)
        && (!type   || itemType === type)
        && (!backup || backupStatus === backup);
  });
  const sorted = sortInventoryItems(filtered);
  renderTable(sorted);
  updateInventoryCount(sorted.length, allItems.length);
};

function safeText(v){
  if(v===undefined||v===null||v==='') return '-';
  if(typeof v==='object'){
    if(v.seconds){try{return new Date(v.seconds*1000).toLocaleString('ko-KR');}catch(e){return '-';}}
    try{return JSON.stringify(v);}catch(e){return String(v);}
  }
  return String(v);
}
function escHtml(v){
  return safeText(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ── QR 다운로드 URL ────────────────────────────────────
function getQrDownloadUrl(qrFile) {
  qrFile = String(qrFile || '').trim();
  if (!qrFile || qrFile === '-') return '';
  let match = qrFile.match(/\/d\/([^/]+)/);
  if (!match) match = qrFile.match(/[?&]id=([^&]+)/);
  if (!match) match = qrFile.match(/open\?id=([^&]+)/);
  if (match && match[1]) return 'https://drive.google.com/uc?export=download&id=' + encodeURIComponent(match[1]);
  return qrFile;
}

function escapeAttr(v) { return escHtml(v); }

function quickInput(label, field, value) {

    + '<label>' + escHtml(label) + '</label>'
    + '<input class="quick-field" data-field="' + escapeAttr(field) + '" value="' + escapeAttr(value) + '">'
    + '</div>';
}

function quickTextarea(label, field, value) {
  return '<div class="quick-field-wrap" style="grid-column:1/-1">'
    + '<label>' + escHtml(label) + '</label>'
    + '<textarea class="quick-textarea" data-field="' + escapeAttr(field) + '">' + escHtml(value) + '</textarea>'
    + '</div>';
}

function quickSelect(label, field, value, options) {
  let html = '<div class="quick-field-wrap">'
    + '<label>' + escHtml(label) + '</label>'
    + '<select class="quick-field" data-field="' + escapeAttr(field) + '">';
  options.forEach(function(opt) {
    const sel = String(value || '') === String(opt.value || '') ? ' selected' : '';
    html += '<option value="' + escapeAttr(opt.value) + '"' + sel + '>' + escHtml(opt.label) + '</option>';
  });
  html += '</select></div>';
  return html;
}

    html += quickInput('정원 이름', 'gt_garden_name', item.gt_garden_name || '');
  }

  html += quickSelect('분실 모드', 'lost_mode', item.lost_mode || '', [
    {value:'',label:'꺼짐'},{value:'on',label:'켜짐'}
  ]);
  html += quickInput('연락 유형', 'lost_contact_type', item.lost_contact_type || '');
  html += quickInput('연락 라벨', 'lost_contact_label', item.lost_contact_label || '');
  html += quickInput('연락 URL', 'lost_contact_url', item.lost_contact_url || '');

  html += '</div>';
  html += '<div class="quick-edit-actions">';
  html += '<button class="btn btn-ghost" onclick="saveQuickEdit(\'' + escapeAttr(code) + '\')">빠른 수정 저장</button>';
  html += '<button class="btn btn-ghost" onclick="openDetailModal(\'' + escapeAttr(code) + '\')">되돌리기</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

// ── 빠른 수정 저장 ─────────────────────────────────────
window.saveQuickEdit = async function(code) {
  code = String(code || '').trim().toUpperCase();
  if (!code) { alert('QR 코드가 없습니다.'); return; }

  const modal = document.getElementById('detailModal');
  if (!modal) { alert('상세 모달을 찾을 수 없습니다.'); return; }

  const fields = {};
  modal.querySelectorAll('[data-field]').forEach(function(el) {
    const key = el.getAttribute('data-field');
    if (key) fields[key] = el.value || '';
  });

  if (!confirm(code + ' 정보를 빠른 수정으로 저장할까요?')) return;

  const adminKey = getAdminApiKey();
  if (!adminKey) { alert('관리자 API 키가 필요합니다.'); return; }

  try {
    const res = await fetch(ADMIN_APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'updateQrQuickFieldsFromAdmin', admin_key: adminKey, code: code, fields: fields }),
      redirect: 'follow'
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message || '빠른 수정 실패');
    alert(data.message || '빠른 수정 완료');
    await loadInventory();
    await loadDashboard();
    openDetailModal(code);
  } catch(e) {
    alert('빠른 수정 실패: ' + e.message);
  }
};

function getDefaultProductName(type) {
  const names = { CD:'미아방지', BMT:'부산 메모리 태그', GT:'가든 태그', WT:'바램태그', TT:'길동무 태그' };
  return names[type] || '';
}

window.normalizeFirestoreCards = async function() {
  if (!confirm('qr_cards 전체 문서의 product_type / product 누락값을 보정할까요?')) return;
  try {
    let fixedCount = 0;
    let skipCount  = 0;

    for (const item of allItems) {
      const code = String(item.code || item.id || '').trim().toUpperCase();
      if (!code || code.indexOf('-') < 0) { skipCount++; continue; }

      const inferredType    = code.split('-')[0];
      const inferredProduct = getDefaultProductName(inferredType);
      const updateData      = {};
      let needUpdate        = false;

      if (!item.product_type)              { updateData.product_type = inferredType;    needUpdate = true; }
      if (!item.product && inferredProduct){ updateData.product      = inferredProduct; needUpdate = true; }
      if (!item.code)                      { updateData.code         = code;            needUpdate = true; }

      if (!needUpdate) { skipCount++; continue; }

      updateData.updated_at = new Date().toISOString().replace('T',' ').slice(0,19);
      await updateDoc(doc(db, 'qr_cards', code), updateData);
      fixedCount++;
    }

    alert('Firestore 데이터 보정 완료\n수정: ' + fixedCount + '건\n건너뜀: ' + skipCount + '건');
    await loadInventory();
    await loadDashboard();
  } catch(e) {
    alert('Firestore 데이터 보정 실패: ' + e.message);
  }
};

// ── QR 생성 (Apps Script API 연동) ────────────────────
// admin_Code.gs 새 버전 배포 후 실제 URL로 교체
const ADMIN_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwR_8KPD5aj3TmfM1GBIcdKUKhOryONAxei6wvJgDgl6LXhow97X72aIrBPtAC3HYFt6g/exec';

function getAdminApiKey() {
  let key = sessionStorage.getItem('admin_api_key');
  if (!key) {
    key = prompt('Apps Script 관리자 API 키를 입력하세요:');
    if (!key) return null;
    sessionStorage.setItem('admin_api_key', key.trim());
  }
  return key;
}

window.resetAdminApiKey = function() {
  sessionStorage.removeItem('admin_api_key');
  alert('API 키가 초기화되었습니다. 다음 생성 시 다시 입력하세요.');
};

window.createQrCardsViaApi = async function() {
  const type    = document.getElementById('createType').value;
  const qty     = Number(document.getElementById('createQty').value);
  const resultEl = document.getElementById('createResult');

  if (!type) { alert('제품을 선택하세요.'); return; }
  if (!qty || qty < 1 || qty > 20) { alert('수량은 1~20 사이로 입력하세요.'); return; }

  if (!ADMIN_APPS_SCRIPT_URL) {
    resultEl.innerHTML = '<span style="color:var(--red)">❌ ADMIN_APPS_SCRIPT_URL이 설정되지 않았습니다.<br>admin/index.html의 ADMIN_APPS_SCRIPT_URL 상수를 채워주세요.</span>';
    return;
  }

  const key = getAdminApiKey();
  if (!key) return;

  resultEl.innerHTML = '<span style="color:var(--muted)">생성 중... (약 10~30초 소요)</span>';

  try {
    const res = await fetch(ADMIN_APPS_SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ action: 'createQrInventoryFromAdmin', admin_key: key, product_type: type, quantity: qty }),
      redirect: 'follow'
    });
    const data = await res.json();
    if (data.success) {
      resultEl.innerHTML = '<span style="color:var(--green)">✅ ' + data.message + '</span>'
        + '<br><a href="' + data.folderUrl + '" target="_blank" style="color:var(--gold)">Google Drive 폴더 열기</a>';
      await loadInventory();
      await loadDashboard();
    } else {
      if (data.message && data.message.indexOf('관리자 키') > -1) {
        sessionStorage.removeItem('admin_api_key');
      }
      resultEl.innerHTML = '<span style="color:var(--red)">❌ ' + data.message + '</span>';
    }
  } catch(e) {
    resultEl.innerHTML = '<span style="color:var(--red)">오류: ' + e.message + '</span>';
  }
};

window.saveStatus = async function() {
  const code   = document.getElementById('modalCode').value;
  const status = document.getElementById('modalStatus').value;

  if (!code)   { alert('코드가 없습니다.'); return; }
  if (!status) { alert('상태값이 없습니다.'); return; }

  if (!confirm(code + ' 상태를 [' + status + ']로 변경할까요?')) return;

  const adminKey = getAdminApiKey();
  if (!adminKey) return;

  try {
    const res = await fetch(ADMIN_APPS_SCRIPT_URL, {
      method:   'POST',
      headers:  { 'Content-Type': 'text/plain' },
      body:     JSON.stringify({ action: 'updateQrStatusFromAdmin', admin_key: adminKey, code: code, status: status }),
      redirect: 'follow'
    });

    const data = await res.json();
    if (!data.success) throw new Error(data.message || '상태 변경 실패');

    closeModal('statusModal');
    await loadInventory();
    await loadDashboard();
    alert(data.message || code + ' 상태를 [' + status + ']로 변경했습니다.');
  } catch(e) {
    alert('저장 실패: ' + e.message);
  }
};

window.regenerateQrImage = async function(code) {
  code = String(code || '').trim().toUpperCase();
  if (!code) { alert('QR 코드가 없습니다.'); return; }

  if (!confirm(code + ' QR 이미지를 다시 생성할까요?\n기존 Drive QR 파일은 휴지통으로 이동되고 새 파일 링크로 갱신됩니다.')) return;

  const adminKey = getAdminApiKey();
  if (!adminKey) { alert('관리자 API 키가 필요합니다.'); return; }

  try {
    const res = await fetch(ADMIN_APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'regenerateQrImageFromAdmin', admin_key: adminKey, code: code }),
      redirect: 'follow'
    });

    const data = await res.json();
    if (!data.success) throw new Error(data.message || 'QR 재생성 실패');

    alert(data.message || 'QR 이미지를 재생성했습니다.');
    await loadInventory();
    await loadDashboard();
    if (typeof closeModal === 'function') closeModal('detailModal');
  } catch(e) {
    alert('QR 재생성 실패: ' + e.message);
  }
};

window.regenerateMissingQrImages = async function() {
  const targets = (currentShownItems || []).filter(function(item) {
    const label = getBackupStatus(item).label;
    return label === 'QR 없음' || label === '점검필요';
  });

  if (!targets.length) {
    alert('현재 표시 목록에 QR 재생성이 필요한 항목이 없습니다.');
    return;
  }

  if (targets.length > 20) {
    alert('한 번에 최대 20개까지만 재생성하세요.\n현재 대상: ' + targets.length + '개');
    return;
  }

  const codes = targets.map(function(item) {
    return String(item.code || item.id || '').trim().toUpperCase();
  }).filter(Boolean);

  if (!codes.length) { alert('재생성할 QR 코드가 없습니다.'); return; }

  if (!confirm('현재 표시 목록 중 QR 이미지가 없는 항목 ' + codes.length + '개를 재생성할까요?\n\n' + codes.join(', '))) return;

  const adminKey = getAdminApiKey();
  if (!adminKey) { alert('관리자 API 키가 필요합니다.'); return; }

  let successCount = 0;
  const failList = [];

  for (let i = 0; i < codes.length; i++) {
    const code = codes[i];
    try {
      const res = await fetch(ADMIN_APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'regenerateQrImageFromAdmin', admin_key: adminKey, code: code }),
        redirect: 'follow'
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.message || 'QR 재생성 실패');
      successCount++;
    } catch(e) {
      failList.push(code + ': ' + e.message);
    }
  }

  await loadInventory();
  await loadDashboard();

  let msg = 'QR 일괄 재생성 완료\n성공: ' + successCount + '개';
  if (failList.length) msg += '\n실패: ' + failList.length + '개\n\n' + failList.join('\n');
  alert(msg);
};
