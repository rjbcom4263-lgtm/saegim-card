<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 뱃지 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--bg:#0d0d0d;--card:#171717;--gold:#e6c88f;--gold2:#c7a05d;--line:#7a6040;--text:#f6ead4;--muted:#b7a88f}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',system-ui,sans-serif;min-height:100vh}

.header{text-align:center;padding:22px 20px 18px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#141008,#0d0d0d)}
.logo{font-family:serif;font-size:26px;letter-spacing:.2em;color:var(--gold)}
.logo-sub{color:var(--muted);font-size:12px;margin-top:4px;letter-spacing:.15em}

.container{display:grid;grid-template-columns:320px 1fr;gap:20px;max-width:1180px;margin:0 auto;padding:20px}
@media(max-width:860px){.container{grid-template-columns:1fr}}

/* ─── Left Panel ─── */
.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px}
.sec{margin-bottom:18px}
.sec-title{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid rgba(122,96,64,.3)}

label{color:var(--muted);font-size:12px;display:block;margin-bottom:4px;margin-top:10px}
input,select,textarea{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:13px;font-family:inherit}
input[type=password]{font-family:monospace;letter-spacing:.08em}
input::placeholder{color:#5a4d3a}
textarea{min-height:60px;resize:vertical}

/* ─── 접기/펴기 ─── */
details.sec>summary{color:var(--gold);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding-bottom:7px;border-bottom:1px solid rgba(122,96,64,.3);cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center;margin-bottom:0}
details.sec>summary::-webkit-details-marker{display:none}
details.sec>summary .arr{font-size:9px;opacity:.5;transition:transform .2s;display:inline-block}
details[open].sec>summary .arr{transform:rotate(180deg)}
details.sec>summary .sel-name{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none;margin-right:6px;max-width:90px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.style-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}
.scard{border:1px solid var(--line);border-radius:10px;padding:8px 4px;cursor:pointer;text-align:center;background:#0d0d0d;transition:all .18s}
.scard:hover{border-color:var(--gold2);background:rgba(199,160,93,.07)}
.scard.on{border-color:var(--gold);background:rgba(230,200,143,.1)}
.scard .icon{font-size:22px;display:block;margin-bottom:3px}
.scard .name{font-size:10px;color:var(--muted);line-height:1.3}
.scard.on .name{color:var(--gold)}

.btn{display:block;width:100%;padding:13px;border-radius:13px;border:0;font-weight:700;cursor:pointer;font-size:14px;margin-top:10px;font-family:inherit;transition:opacity .15s}
.btn-gold{background:linear-gradient(135deg,#f0d9a4,#c79a4f);color:#111}
.btn-gold:disabled{opacity:.4;cursor:not-allowed}
.btn-outline{background:transparent;border:1px solid var(--gold2);color:var(--gold)}
.btn-dl{background:linear-gradient(135deg,#2a6f2a,#1a4f1a);color:#fff;display:none}

/* ─── Right Panel ─── */
.preview{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:560px}
.ph{width:480px;height:480px;max-width:100%;border:2px dashed var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center;padding:30px}
canvas{border-radius:50%;max-width:100%;max-height:520px;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.status{text-align:center;margin-top:14px;color:var(--muted);font-size:13px;min-height:18px}
.prog{width:260px;height:4px;background:rgba(122,96,64,.25);border-radius:2px;margin:8px auto 0;overflow:hidden;display:none}
.prog-bar{height:100%;background:var(--gold2);border-radius:2px;transition:width .3s;width:0%}

.err{color:#e07070;font-size:12px;margin-top:6px;padding:8px 12px;background:rgba(200,50,50,.1);border-radius:8px;border:1px solid rgba(200,50,50,.25);display:none}

.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:7px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.tab.on{border-color:var(--gold);color:var(--gold);background:rgba(230,200,143,.08)}

.tip{font-size:11px;color:#6a5a42;margin-top:6px;line-height:1.5}
</style>
</head>
<body>

<div class="header">
  <div class="logo">SAEGIM</div>
  <div class="logo-sub">뱃지 AI 생성기</div>
</div>

<div class="container">
  <!-- ─── 설정 패널 ─── -->
  <div class="panel">

    <div class="sec" style="background:rgba(100,180,100,.06);border:1px solid rgba(100,180,100,.2);border-radius:12px;padding:10px 12px">
      <div style="color:#90c890;font-size:11px;font-weight:700;margin-bottom:4px">✓ 무료 · API 키 없음 · Pollinations.ai</div>
      <div class="tip">FLUX 이미지 생성 — 완전 무료, 무제한</div>
    </div>

    <div class="sec">
      <div class="sec-title">🎨 모델</div>
      <select id="modelSel">
        <option value="flux-schnell">FLUX Schnell (빠름·권장)</option>
        <option value="flux">FLUX (고품질)</option>
        <option value="flux-realism">FLUX Realism (사실적)</option>
        <option value="turbo">SDXL Turbo (빠름)</option>
      </select>
    </div>

    <details class="sec" id="styleSection" open>
      <summary>🖼 도안 스타일 <span><span class="sel-name" id="selStyleName">고양이 도시 🐱</span><span class="arr">▼</span></span></summary>
      <div class="style-grid" id="styleGrid"></div>
    </details>

    <div class="sec">
      <div class="sec-title">📝 프롬프트 (직접 수정)</div>
      <textarea id="promptText" rows="4" placeholder="스타일 선택 시 자동 입력됩니다..."></textarea>
      <button class="btn btn-outline" onclick="resetPrompt()" style="padding:6px 10px;font-size:11px;margin-top:6px">↺ 스타일 기본값으로</button>
    </div>

    <div class="sec">
      <div class="sec-title">✏️ 텍스트 & 옵션</div>
      <div class="tabs">
        <button class="tab on" onclick="setType('cd')" id="tab-cd">안심태그</button>
        <button class="tab" onclick="setType('bmt')" id="tab-bmt">메모리태그</button>
        <button class="tab" onclick="setType('custom')" id="tab-custom">직접입력</button>
      </div>
      <input id="titleText" value="안심 연결" placeholder="상단 제목">
      <input id="subText" value="보호자 연결을 위해" placeholder="하단 안내문" style="margin-top:6px">
    </div>

    <div class="sec">
      <div class="sec-title">📱 QR 코드 (선택)</div>
      <input id="qrUrl" placeholder="https://saegim-memory.web.app/cd.html?code=CD-0001">
      <div class="tip">비워두면 QR 없이 빈 프레임만 생성됩니다.</div>
    </div>

    <div class="sec">
      <div class="sec-title">⚙️ 생성 옵션</div>
      <label>시드 (0=랜덤)</label>
      <input id="seedVal" type="number" value="0" min="0" max="999999">
      <label>스텝 수</label>
      <select id="stepsVal">
        <option value="25">25 (빠름)</option>
        <option value="40" selected>40 (보통)</option>
        <option value="50">50 (고품질)</option>
      </select>
    </div>

    <button class="btn btn-gold" id="genBtn" onclick="generate()">✨ 이미지 생성</button>
    <button class="btn btn-dl" id="dlBtn" onclick="download()">⬇️ PNG 다운로드 (300dpi)</button>
    <div id="errBox" class="err"></div>
  </div>

  <!-- ─── 미리보기 ─── -->
  <div class="preview">
    <div id="ph" class="ph">스타일을 선택하고<br>API 키를 입력한 뒤<br>생성 버튼을 누르세요</div>
    <canvas id="cvs" width="1024" height="1024" style="display:none"></canvas>
    <div class="status" id="status"></div>
    <div class="prog" id="prog"><div class="prog-bar" id="progBar"></div></div>
  </div>
</div>

<!-- hidden QR div -->
<div id="qrDiv" style="display:none;position:absolute;left:-9999px"></div>

<script>
// ─── 스타일 프리셋 ────────────────────────────────────────────────
const BASE_NEG = 'text, letters, words, numbers, watermark, signature, blurry, low quality, dark background, busy center area, cluttered middle';
const BASE_POS = 'circular sticker design with decorative circular border, open clear space in the upper center for title text, empty square area in the lower center for QR code, open bottom area for instruction text, cream beige background, highly detailed, professional print quality, no text no letters';

const STYLES = [
  {id:'cat-city',   name:'고양이\n도시',     icon:'🐱', p:'cute calico cat sitting on a stone wall, colorful Korean hillside neighborhood with tiled rooftops and pastel buildings, soft clouds, warm sunshine'},
  {id:'bamboo',     name:'대나무\n제비',     icon:'🎋', p:'green bamboo stalks on sides, graceful swallow bird flying, traditional Korean ink wash painting, delicate brushstrokes, light artistic style'},
  {id:'magnolia',   name:'목련\n파랑새',     icon:'🌸', p:'white magnolia flowers on branches surrounding the frame, small blue bird perched at top right, golden cloud motifs, traditional Korean botanical illustration'},
  {id:'cherry',     name:'벚꽃\n나비',       icon:'🌸', p:'pink cherry blossom branches with falling petals surrounding, delicate pink butterflies, spring atmosphere, soft watercolor, traditional Asian art'},
  {id:'crane-pine', name:'학·솔',           icon:'🦢', p:'ancient twisted pine tree on left, red-crowned crane flying on right, golden cloud decorations, traditional Korean watercolor painting, elegant classical style'},
  {id:'camellia',   name:'동백\n나비',       icon:'🌺', p:'red camellia flowers on left side, white butterfly on right, cloud motifs, traditional Korean ink painting style'},
  {id:'grand-crane',name:'황동\n모란·학',    icon:'🦅', p:'grand red-crowned crane flying at top, pink and coral peony flowers on both sides, teal and golden auspicious cloud motifs, ornate traditional painting, rich colorful'},
  {id:'lotus',      name:'연꽃\n학',         icon:'🪷', p:'pink lotus flowers and large green leaves at bottom, red-crowned crane flying at top, golden cloud motifs, traditional Korean watercolor painting'},
  {id:'mandarin',   name:'원앙\n모란',       icon:'🦆', p:'pair of colorful mandarin ducks at bottom, pink and red peony flowers surrounding, golden cloud decorations, traditional Korean watercolor'},
  {id:'magpie',     name:'까치\n매화',       icon:'🐦', p:'pink plum blossom branches, black and white magpie bird perched, traditional Korean ink painting, cloud motifs, delicate artistic style'},
  {id:'moon-plum',  name:'달\n매화',         icon:'🌙', p:'full golden moon at top, pink plum blossom branches surrounding, falling petals, clouds, traditional Korean moonlit night watercolor, warm tones'},
  {id:'rainbow',    name:'가족\n무지개',     icon:'🌈', p:'rainbow arching at top, grandmother and mother standing on sides, children at bottom holding hands forming a circle, small hearts and flowers, cute watercolor illustration'},
  {id:'family3',    name:'3대\n가족',        icon:'👨‍👩‍👧‍👦', p:'six family members forming a circle grandparents parents two children smiling and holding hands, small houses flowers hearts, cute watercolor illustration'},
  {id:'puppy',      name:'강아지\n꽃길',     icon:'🐶', p:'cute fluffy shih tzu puppy sitting on right side, stone path with wildflowers and roses, wooden fence, spring garden atmosphere, cute watercolor illustration'},
];

let selectedStyle = STYLES[0];
let generatedCanvas = null;

// ─── 스타일 그리드 렌더 ─────────────────────────────────────────
function renderStyleGrid() {
  const grid = document.getElementById('styleGrid');
  grid.innerHTML = STYLES.map((s, i) => `
    <div class="scard${i===0?' on':''}" onclick="selectStyle(${i})">
      <span class="icon">${s.icon}</span>
      <span class="name">${s.name.replace('\n','<br>')}</span>
    </div>
  `).join('');
}
function buildPrompt() {
  return `${selectedStyle.p}, ${BASE_POS}`;
}
function updatePromptText() {
  document.getElementById('promptText').value = buildPrompt();
  document.getElementById('selStyleName').textContent = selectedStyle.name.replace('\n',' ') + ' ' + selectedStyle.icon;
}
function resetPrompt() {
  updatePromptText();
}
function selectStyle(i) {
  selectedStyle = STYLES[i];
  document.querySelectorAll('.scard').forEach((el, j) => el.classList.toggle('on', j===i));
  updatePromptText();
  // 선택 후 스타일 섹션 접기
  document.getElementById('styleSection').open = false;
}
renderStyleGrid();
updatePromptText();

// ─── 탭 ────────────────────────────────────────────────────────
function setType(type) {
  ['cd','bmt','custom'].forEach(t => document.getElementById('tab-'+t).classList.toggle('on', t===type));
  const titles = {cd:'안심 연결', bmt:'부산 메모리 태그', custom:''};
  const subs   = {cd:'보호자 연결을 위해', bmt:'여행의 기억을 담다', custom:''};
  if (type !== 'custom') {
    document.getElementById('titleText').value = titles[type];
    document.getElementById('subText').value = subs[type];
  }
}

// ─── API 키 저장 ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Pollinations — API 키 불필요
});

// ─── 오류 표시 ─────────────────────────────────────────────────
function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = msg; el.style.display = 'block';
}
function hideErr() { document.getElementById('errBox').style.display = 'none'; }

// ─── 진행 표시 ─────────────────────────────────────────────────
function setStatus(msg, pct) {
  document.getElementById('status').textContent = msg;
  const prog = document.getElementById('prog');
  const bar = document.getElementById('progBar');
  if (pct === null) { prog.style.display = 'none'; return; }
  prog.style.display = 'block';
  bar.style.width = pct + '%';
}

// ─── Pollinations.ai 이미지 생성 (무료·CORS 지원) ────────────────
async function callImageAPI(model, prompt, seed) {
  const s = seed && seed !== 0 ? seed : Math.floor(Math.random() * 999999);
  const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}`
            + `?width=1024&height=1024&model=${model}&seed=${s}&nologo=true&enhance=false`;

  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('이미지 로드 실패 — 잠시 후 다시 시도'));
    img.src = url;
  });
}

// ─── QR 코드 생성 ───────────────────────────────────────────────
function generateQR(url) {
  return new Promise((resolve) => {
    const div = document.getElementById('qrDiv');
    div.innerHTML = '';
    new QRCode(div, {
      text: url,
      width: 260, height: 260,
      colorDark: '#000000',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
    setTimeout(() => resolve(div.querySelector('canvas')), 300);
  });
}

// ─── Canvas 합성 ────────────────────────────────────────────────
function composeSticker(bgImg, qrCanvas, title, subtitle) {
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const S = 1024, cx = 512, cy = 512, R = 490;

  ctx.clearRect(0, 0, S, S);

  // 1. 원형 배경 이미지 클립
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(bgImg, 0, 0, S, S);
  ctx.restore();

  // 2. 외곽 테두리
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = '#1a1208';
  ctx.lineWidth = 6;
  ctx.stroke();

  // 3. 금색 내부 링
  ctx.beginPath();
  ctx.arc(cx, cy, R - 14, 0, Math.PI * 2);
  ctx.strokeStyle = '#c7a05d';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 4. 상단 제목 텍스트
  ctx.shadowColor = 'rgba(255,252,240,0.9)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#1a1208';
  ctx.font = `bold 70px 'Noto Sans KR', 'Malgun Gothic', '맑은 고딕', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(title, cx, 296);
  ctx.shadowBlur = 0;

  // 5. 장식 요소 (제목 아래)
  ctx.fillStyle = '#a07830';
  ctx.font = '22px serif';
  ctx.fillText('❀', cx, 350);

  // 6. QR 프레임 배경
  const fx = 356, fy = 385, fw = 312, fh = 272;
  ctx.fillStyle = 'rgba(255, 252, 244, 0.96)';
  ctx.fillRect(fx, fy, fw, fh);

  // 7. 프레임 이중 테두리
  ctx.strokeStyle = '#b8862a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(fx, fy, fw, fh);
  ctx.strokeRect(fx + 5, fy + 5, fw - 10, fh - 10);

  // 8. QR 코드 삽입
  if (qrCanvas) {
    const qSize = 218;
    const qx = cx - qSize / 2;
    const qy = fy + (fh - qSize) / 2;
    ctx.drawImage(qrCanvas, qx, qy, qSize, qSize);
  } else {
    ctx.fillStyle = 'rgba(160,120,48,0.15)';
    ctx.fillRect(fx + 30, fy + 30, fw - 60, fh - 60);
    ctx.fillStyle = '#a07830';
    ctx.font = '13px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('QR 코드 영역', cx, fy + fh / 2);
  }

  // 9. 하단 안내 텍스트
  ctx.shadowColor = 'rgba(255,252,240,0.85)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#1a1208';
  ctx.font = `27px 'Noto Sans KR', 'Malgun Gothic', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(subtitle, cx, 703);

  // 10. "QR코드를 스캔해주세요" — 빨간 QR코드 부분
  ctx.font = `bold 29px 'Noto Sans KR', 'Malgun Gothic', sans-serif`;
  const redPart = 'QR코드';
  const restPart = '를 스캔해주세요';
  const rw = ctx.measureText(redPart).width;
  const ew = ctx.measureText(restPart).width;
  const startX = cx - (rw + ew) / 2;

  ctx.textAlign = 'left';
  ctx.fillStyle = '#cc1111';
  ctx.shadowColor = 'rgba(255,252,240,0.85)';
  ctx.fillText(redPart, startX, 752);
  ctx.fillStyle = '#1a1208';
  ctx.fillText(restPart, startX + rw, 752);
  ctx.shadowBlur = 0;
}

// ─── 메인 생성 함수 ─────────────────────────────────────────────
async function generate() {
  hideErr();
  const model   = document.getElementById('modelSel').value;
  const title   = document.getElementById('titleText').value.trim() || '안심 연결';
  const sub     = document.getElementById('subText').value.trim()   || '보호자 연결을 위해';
  const qrUrl   = document.getElementById('qrUrl').value.trim();
  const seed    = parseInt(document.getElementById('seedVal').value) || 0;
  const steps   = parseInt(document.getElementById('stepsVal').value) || 40;

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  document.getElementById('ph').style.display = 'none';
  document.getElementById('cvs').style.display = 'none';
  document.getElementById('dlBtn').style.display = 'none';

  const fullPrompt = document.getElementById('promptText').value.trim() || buildPrompt();

  try {
    // ① 이미지 생성 + 로드 (Pollinations는 URL → img 직접)
    setStatus('🎨 AI 이미지 생성 중... (15~30초)', 20);
    const bgImg = await callImageAPI(model, fullPrompt, seed);
    setStatus('📐 Canvas 합성 중...', 80);

    // ③ QR 생성 (선택)
    let qrCanvas = null;
    if (qrUrl) {
      setStatus('📱 QR 코드 생성 중...', 85);
      qrCanvas = await generateQR(qrUrl);
    }

    // ④ 합성
    setStatus('✨ 합성 중...', 95);
    composeSticker(bgImg, qrCanvas, title, sub);

    document.getElementById('cvs').style.display = 'block';
    document.getElementById('dlBtn').style.display = 'block';
    generatedCanvas = document.getElementById('cvs');
    setStatus('✅ 완료!', null);

  } catch (e) {
    setStatus('', null);
    showErr('생성 실패: ' + e.message);
    document.getElementById('ph').style.display = 'flex';
  } finally {
    btn.disabled = false;
  }
}

// ─── 다운로드 ────────────────────────────────────────────────────
function download() {
  if (!generatedCanvas) return;
  const title = document.getElementById('titleText').value.trim().replace(/\s+/g, '_') || '새김_스티커';
  const style = selectedStyle.id;
  const link = document.createElement('a');
  link.download = `새김뱃지_${style}_${title}_${Date.now()}.png`;
  link.href = generatedCanvas.toDataURL('image/png');
  link.click();
}
</script>
