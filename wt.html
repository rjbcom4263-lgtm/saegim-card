:root{--bg:#111;--card:#171717;--line:#7a6040;--gold:#e6c88f;--gold2:#c7a05d;--text:#f6ead4;--muted:#b7a88f}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#222 0,#111 42%,#0b0b0b 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
.wrap{max-width:520px;margin:0 auto;padding:28px 18px}
.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#181818,#101010);padding:26px 20px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.brand{text-align:center;margin-bottom:24px}.logo{font-family:serif;font-size:34px;letter-spacing:.18em;color:var(--gold)}.slogan{margin-top:8px;color:var(--muted);font-size:14px}
.loading,.error{text-align:center;color:var(--muted);padding:70px 20px}
.footer{text-align:center;margin-top:20px;color:var(--muted);font-size:12px;letter-spacing:.18em}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.lang-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:#111;color:var(--muted);font-size:13px;cursor:pointer}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(230,200,143,.1)}
/* WT */
.wt-wrap{padding:10px 0}
.wt-label{text-align:center;color:var(--gold);font-size:13px;letter-spacing:.18em;font-weight:800;margin-bottom:8px}
.wt-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6}
.wt-card{border:1px solid rgba(230,200,143,.35);border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01));padding:34px 24px;margin-bottom:22px;box-shadow:0 4px 32px rgba(0,0,0,.28)}
.wt-sentence{text-align:center;font-size:18px;line-height:1.8;font-weight:500;color:var(--text);white-space:pre-line;letter-spacing:.03em}
.wt-sentence.fade{opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s}
.wt-again{display:block;width:100%;margin-top:0;padding:18px;border-radius:18px;text-align:center;color:#111;background:linear-gradient(135deg,#f0d9a4,#c79a4f);font-weight:800;border:0;font-size:16px;cursor:pointer}
.wt-form{width:100%;max-width:360px;margin:0 auto}
.form-label{display:block;color:var(--gold);font-size:13px;margin-top:10px;margin-bottom:7px}
.form-input,.form-select{display:block;width:100%;height:46px;margin:0 0 13px;padding:0 14px;border-radius:14px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:15px;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(230,200,143,.12)}
.date-row{display:flex;gap:8px;align-items:center;margin-bottom:13px}
.date-row .form-input{margin:0;flex:1;min-width:0}
.date-btn{height:46px;white-space:nowrap;padding:0 12px;border-radius:14px;border:1px solid var(--line);background:#151515;color:var(--gold);cursor:pointer;font-size:13px}
.wt-sub-btn{display:block;margin:14px auto 0;padding:10px 18px;border-radius:18px;border:1px solid var(--line);background:#111;color:var(--muted);font-size:13px;cursor:pointer}
input[type="date"]{color-scheme:dark}
</style>
</head>

function getRegLabels(){
  const base=WT_REGISTER_LABELS.ko||{};

  return {...base,...cur,themes:{...(base.themes||{}),...(cur.themes||{})}};
}
let _wtLastIdx=-1;
let currentLang=localStorage.getItem('saegim_lang')||'ko';
let WT_DATA=null;
const app=document.getElementById('app');

function wtRandomSentence(){
  const list=WT_SENTENCES[currentLang]||WT_SENTENCES.ko;
  let idx;
  do{idx=Math.floor(Math.random()*list.length);}while(list.length>1&&idx===_wtLastIdx);
  _wtLastIdx=idx;return list[idx];
}
function setLang(lang){
  currentLang=lang;
  localStorage.setItem('saegim_lang',lang);
  renderWishTag(WT_DATA);
}
function langBar(){return`<div class="lang-bar">${['ko','en','ja','zh'].map(l=>`<button class="lang-btn${currentLang===l?' active':''}" onclick="setLang('${l}')">${l==='ko'?'한국어':l==='en'?'English':l==='ja'?'日本語':'中文'}</button>`).join('')}</div>`;}
function brand(){return`<div class="brand"><div class="logo">SAEGIM</div><div class="slogan">기억을 새기다 · 마음을 잇다</div></div>`;}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

function todayKey(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+day;
}
function hashString(str){
  let h=0;
  for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}
  return Math.abs(h);
}
function getThemeLabel(theme){
  const map={
    luck:{ko:'행운',en:'Luck',ja:'幸運',zh:'幸运'},
    health:{ko:'건강',en:'Health',ja:'健康',zh:'健康'},
    money:{ko:'재물',en:'Wealth',ja:'財運',zh:'财运'},
    exam:{ko:'합격',en:'Success',ja:'合格',zh:'成功'},
    love:{ko:'사랑',en:'Love',ja:'愛',zh:'爱情'},
    general:{ko:'일반',en:'General',ja:'一般',zh:'普通'}
  };
  const item=map[theme||'general']||map.general;
  return item[currentLang]||item.ko;
}
function wtDailySentence(data){
  const list=WT_SENTENCES[currentLang]||WT_SENTENCES.ko;
  const theme=(data&&data.wt_theme)||'general';
  const seed=CODE+'|'+todayKey()+'|'+currentLang+'|'+theme;
  const idx=hashString(seed)%list.length;
  _wtLastIdx=idx;
  return list[idx];
}
function wtMetaText(data){
  if(!data)return '';
  const parts=[];
  if(data.wt_theme){parts.push(getThemeLabel(data.wt_theme));}
  if(data.wt_birth_date){parts.push(String(data.wt_birth_date));}
  if(!parts.length)return '';
  return parts.join(' · ');
}
function renderWishTag(data){
  const sentence=wtDailySentence(data||WT_DATA);
  const wtLabels={
    ko:['오늘의 바램','마음속 질문을 떠올려 보세요','다른 바램 보기','오늘 고정 문장'],

  const meta=wtMetaText(data||WT_DATA);
  app.innerHTML=`

    <div class="wt-wrap">
      <div class="wt-label">${lbl[0]}</div>
      <div class="wt-sub">${lbl[1]}</div>

      </div>

    <div class="footer">SAEGIM WT</div>`;
}
function wtAgain(){
  const el=document.getElementById('wtSentence');
  if(!el)return;
  el.style.opacity='0';el.style.transform='translateY(6px)';el.style.transition='opacity .3s,transform .3s';
  setTimeout(()=>{
    el.innerHTML=esc(wtRandomSentence()).replace(/\n/g,'<br>');

  },330);
}

  if(!WT_DATA)WT_DATA={};
  const birth=document.getElementById('wt_edit_birth')?.value||'';
  const theme=document.getElementById('wt_edit_theme')?.value||'general';
  WT_DATA.wt_lang=lang;
  WT_DATA.wt_birth_date=birth;

  renderWtSettings();
}
function openEditBirthPicker(){
  const el=document.getElementById('wt_edit_birth');
  if(!el)return;
  if(typeof el.showPicker==='function'){el.showPicker();}else{el.focus();el.click();}
}
async function wtSaveSettings(){
  const l=getRegLabels();
  const pw=document.getElementById('wt_edit_pw').value.trim();
  const lang=document.getElementById('wt_edit_lang').value;
  const theme=document.getElementById('wt_edit_theme').value;
  const birth=document.getElementById('wt_edit_birth').value;
  if(!pw){alert(l.passwordCheck);return;}
  try{
    const r=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'updateCustomerData',code:CODE,password:pw,wt_lang:lang,wt_theme:theme,wt_birth_date:birth}),
      redirect:'follow'
    });
    const d=await r.json();
    if(!d.success){alert(d.message||l.fail);return;}
    currentLang=lang;
    localStorage.setItem('saegim_lang',lang);
    if(!WT_DATA)WT_DATA={};
    WT_DATA.wt_lang=lang;
    WT_DATA.wt_theme=theme;
    WT_DATA.wt_birth_date=birth;
    alert(l.done);
    location.href='?code='+encodeURIComponent(CODE)+'&v='+Date.now();
  }catch(e){alert(l.error+e.message);}
}

function setRegisterLang(lang){
  currentLang=lang;
  localStorage.setItem('saegim_lang',lang);
  const birth=document.getElementById('wt_birth')?.value||'';
  const pw=document.getElementById('wt_pw')?.value||'';
  const theme=document.getElementById('wt_theme_sel')?.value||'general';
  renderRegister();
  const birthEl=document.getElementById('wt_birth');
  const pwEl=document.getElementById('wt_pw');
  const themeEl=document.getElementById('wt_theme_sel');
  if(birthEl)birthEl.value=birth;
  if(pwEl)pwEl.value=pw;
  if(themeEl)themeEl.value=theme;
}

async function wtSaveFirst(){
  const l=getRegLabels();

  if(!pw||pw.length<4){alert(l.pwAlert);return;}
  const lang=document.getElementById('wt_lang_sel').value;
  const theme=document.getElementById('wt_theme_sel').value;
  const birth=document.getElementById('wt_birth').value;
  try{
    const r=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'registerSoldQr',code:CODE,password:pw,owner:'바램태그',wt_lang:lang,wt_theme:theme,wt_birth_date:birth}),
      redirect:'follow'
    });
    const d=await r.json();
    if(!d.success){alert(d.message||l.fail);return;}
    alert(l.done);
    location.href='?code='+encodeURIComponent(CODE)+'&v='+(Date.now());
  }catch(e){alert(l.error+e.message);}
}
async function recordScanCount(code){

      body:JSON.stringify({action:'recordScan',code:code}),redirect:'follow'});
  }catch(e){console.warn('scan count 기록 실패:',e);}
}

const db=getFirestore(fbApp);
(async function(){
  try{
    if(!CODE){renderError('QR 코드가 없습니다.');return;}
    const snap=await getDoc(doc(db,'qr_cards',CODE));
    if(!snap.exists()){renderError('등록되지 않은 QR 코드입니다. ('+CODE+')');return;}
    const d=snap.data();
    WT_DATA=d;
    const status=String(d.status||'').trim();
    if(status==='미등록'){renderInactive();return;}
    if(status==='중지'){renderStopped();return;}
    if(status==='판매완료'){renderRegister();return;}
    // 사용중 / 분실 → 바램 문장 표시
    if(d.wt_lang&&['ko','en','ja','zh'].includes(d.wt_lang)){
      currentLang=d.wt_lang;
      localStorage.setItem('saegim_lang',d.wt_lang);
    }
    renderWishTag(d);
    recordScanCount(CODE);
  }catch(e){renderError('데이터를 불러오지 못했습니다: '+e.message);}
})();
</script>
