<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 사주 AI 상담</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d12;--card:#14141e;--gold:#c8964a;--gold2:#e6c88f;--line:#2a2a3a;--text:#f0ead4;--muted:#8a8299;--ai:#1a1a2e;--user:#1a2a1a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',system-ui,sans-serif;height:100vh;display:flex;flex-direction:column}

.header{padding:14px 20px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0e0e18,var(--bg));display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-icon{font-size:24px}
.header-title{font-size:17px;font-weight:700;color:var(--gold2);letter-spacing:.05em}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}

.setup{flex:1;display:flex;align-items:center;justify-content:center;padding:20px}
.setup-card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px 24px;width:100%;max-width:420px}
.setup-title{font-size:15px;font-weight:700;color:var(--gold2);margin-bottom:20px;text-align:center}

.field{margin-bottom:14px}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 13px;background:#0a0a14;border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,#c8964a,#a07030);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;letter-spacing:.03em}
.btn-start:disabled{opacity:.4;cursor:not-allowed}

.chat-wrap{flex:1;display:none;flex-direction:column;min-height:0}
.chat-info{padding:10px 16px;background:rgba(200,150,74,.07);border-bottom:1px solid var(--line);font-size:12px;color:var(--muted);flex-shrink:0}
.chat-info b{color:var(--gold)}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

.msg{max-width:82%;border-radius:16px;padding:12px 15px;font-size:13px;line-height:1.75;word-break:keep-all}
.msg.ai{background:var(--ai);border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:var(--user);border:1px solid rgba(80,140,80,.3);align-self:flex-end;border-bottom-right-radius:4px;color:#d0f0d0}
.msg.thinking{opacity:.55;font-style:italic;border-style:dashed}
.msg-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.msg.ai .msg-label{color:var(--gold)}

.input-area{padding:12px 16px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0;background:var(--bg)}
.input-area textarea{flex:1;background:#0a0a14;border:1px solid var(--line);border-radius:12px;padding:10px 13px;color:var(--text);font-size:13px;font-family:inherit;resize:none;max-height:120px;line-height:1.5}
.input-area textarea:focus{outline:none;border-color:var(--gold)}
.btn-send{padding:10px 16px;background:linear-gradient(135deg,#c8964a,#a07030);color:#fff;border:none;border-radius:12px;font-size:20px;cursor:pointer;flex-shrink:0;align-self:flex-end}
.btn-send:disabled{opacity:.35;cursor:not-allowed}

.quick-btns{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 8px}
.qb{padding:5px 11px;border:1px solid var(--line);border-radius:20px;background:transparent;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.qb:hover{border-color:var(--gold);color:var(--gold)}

.key-row{display:flex;gap:8px;align-items:center;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.key-row input{flex:1;padding:8px 11px;background:#0a0a14;border:1px solid var(--line);border-radius:8px;color:var(--text);font-size:11px;font-family:monospace}
.key-row span{font-size:11px;color:var(--muted);white-space:nowrap}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🔮</div>
  <div>
    <div class="header-title">새김 사주 AI 상담</div>
    <div class="header-sub">DeepSeek V4 Pro · NVIDIA NIM</div>
  </div>
</div>

<!-- 초기 설정 -->
<div class="setup" id="setupView">
  <div class="setup-card">
    <div class="setup-title">🔮 사주 정보 입력</div>

    <div class="key-row">
      <span>NVIDIA 키</span>
      <input type="password" id="apiKey" placeholder="nvapi-..." autocomplete="off">
    </div>

    <div class="field">
      <label>이름 (선택)</label>
      <input type="text" id="userName" placeholder="홍길동">
    </div>
    <div class="row2">
      <div class="field">
        <label>성별</label>
        <select id="userGender">
          <option value="남">남성</option>
          <option value="여">여성</option>
        </select>
      </div>
      <div class="field">
        <label>양력/음력</label>
        <select id="calType">
          <option value="양력">양력</option>
          <option value="음력">음력</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>생년월일</label>
      <input type="date" id="birthDate">
    </div>
    <div class="field">
      <label>태어난 시간 (모르면 비워두세요)</label>
      <select id="birthTime">
        <option value="">모름</option>
        <option value="자시(23~01시)">자시 (23~01시)</option>
        <option value="축시(01~03시)">축시 (01~03시)</option>
        <option value="인시(03~05시)">인시 (03~05시)</option>
        <option value="묘시(05~07시)">묘시 (05~07시)</option>
        <option value="진시(07~09시)">진시 (07~09시)</option>
        <option value="사시(09~11시)">사시 (09~11시)</option>
        <option value="오시(11~13시)">오시 (11~13시)</option>
        <option value="미시(13~15시)">미시 (13~15시)</option>
        <option value="신시(15~17시)">신시 (15~17시)</option>
        <option value="유시(17~19시)">유시 (17~19시)</option>
        <option value="술시(19~21시)">술시 (19~21시)</option>
        <option value="해시(21~23시)">해시 (21~23시)</option>
      </select>
    </div>

    <button class="btn-start" id="startBtn" onclick="startChat()">상담 시작하기 →</button>
  </div>
</div>

<!-- 채팅 -->
<div class="chat-wrap" id="chatView">
  <div class="chat-info" id="chatInfo"></div>
  <div class="messages" id="messages"></div>
  <div class="quick-btns" id="quickBtns"></div>
  <div class="input-area">
    <textarea id="userInput" placeholder="궁금한 점을 물어보세요..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMsg()">↑</button>
  </div>
</div>

<script>
const PROXY_URL = 'https://script.google.com/macros/s/AKfycbzzML_hRx1SgWjUhFf5jaktLqj5EmJMdveHkGb0T5-6nog6yHpAOjPfeN_w5-wgQ-wj/exec';

const QUICK = ['올해 운세는?','직업·재물운','연애·결혼운','건강운','이달의 운세','좋은 방향·색깔'];

let messages = [];
let userInfo = {};
let isLoading = false;

// API 키 복원
window.addEventListener('DOMContentLoaded', () => {
  const k = localStorage.getItem('saegim_nvidia_key');
  if (k) document.getElementById('apiKey').value = k;
});

function startChat() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('NVIDIA API 키를 입력해주세요.'); return; }
  const birth  = document.getElementById('birthDate').value;
  if (!birth) { alert('생년월일을 입력해주세요.'); return; }

  localStorage.setItem('saegim_nvidia_key', apiKey);

  userInfo = {
    apiKey,
    name:    document.getElementById('userName').value.trim() || '내담자',
    gender:  document.getElementById('userGender').value,
    cal:     document.getElementById('calType').value,
    birth,
    time:    document.getElementById('birthTime').value
  };

  const systemPrompt = `당신은 한국의 전통 사주명리학 전문가입니다. 사주팔자, 오행, 십신, 대운, 세운을 깊이 이해하고 있으며 따뜻하고 명쾌하게 풀이합니다.

내담자 정보:
- 이름: ${userInfo.name}
- 성별: ${userInfo.gender}성
- 생년월일: ${userInfo.cal} ${userInfo.birth}
${userInfo.time ? `- 태어난 시: ${userInfo.time}` : '- 태어난 시: 미상'}

규칙:
1. 사주 관련 질문에 진지하고 구체적으로 답하세요.
2. 불확실한 것은 "~로 보입니다" 형태로 완곡히 표현하세요.
3. 부정적인 내용도 극복 방법과 함께 알려주세요.
4. 답변은 읽기 쉽게 단락을 나눠주세요.
5. 한국어로만 답하세요.`;

  messages = [{ role: 'system', content: systemPrompt }];

  document.getElementById('setupView').style.display = 'none';
  const chatView = document.getElementById('chatView');
  chatView.style.display = 'flex';

  document.getElementById('chatInfo').innerHTML =
    `<b>${userInfo.name}</b> · ${userInfo.gender}성 · ${userInfo.cal} ${userInfo.birth}${userInfo.time ? ' · ' + userInfo.time : ''}`;

  // 빠른 질문 버튼
  const qb = document.getElementById('quickBtns');
  qb.innerHTML = QUICK.map(q => `<button class="qb" onclick="quickAsk('${q}')">${q}</button>`).join('');

  // 첫 인사
  addMsg('ai', `안녕하세요, ${userInfo.name}님 🙏\n\n${userInfo.birth} 생 ${userInfo.gender}성의 사주를 살펴보겠습니다. 궁금하신 점을 편하게 물어보세요.\n\n전반적인 사주 풀이를 원하시면 "전체 사주 풀이해줘"라고 말씀해 주세요.`);
}

function addMsg(role, text) {
  const wrap = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="msg-label">${role === 'ai' ? '🔮 사주 AI' : '👤 나'}</div>`
    + text.replace(/\n/g, '<br>');
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

function quickAsk(q) {
  document.getElementById('userInput').value = q;
  sendMsg();
}

async function sendMsg() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  addMsg('user', text);
  messages.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const thinking = addMsg('ai thinking', '생각하는 중...');

  try {
    const res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:   'chat',
        apiKey:   userInfo.apiKey,
        messages: messages
      })
    });
    const data = await res.json();

    thinking.remove();

    if (data.success) {
      addMsg('ai', data.content);
      messages.push({ role: 'assistant', content: data.content });
    } else {
      addMsg('ai', '⚠️ 오류: ' + (data.message || '알 수 없는 오류'));
    }
  } catch(e) {
    thinking.remove();
    addMsg('ai', '⚠️ 연결 오류: ' + e.message);
  }

  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('userInput').focus();
}

// textarea 자동 높이
document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('userInput');
  if (ta) ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  });
});
</script>
</body>
</html>
