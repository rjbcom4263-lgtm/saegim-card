<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 가든태그</title>
<style>
:root{--bg:#111;--card:#171717;--line:#7a6040;--gold:#e6c88f;--gold2:#c7a05d;--text:#f6ead4;--muted:#b7a88f}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#222 0,#111 42%,#0b0b0b 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
.wrap{max-width:540px;margin:0 auto;padding:20px 14px}
.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#181818,#101010);padding:22px 18px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.brand{text-align:center;margin-bottom:18px}.logo{font-family:serif;font-size:30px;letter-spacing:.18em;color:var(--gold)}.slogan{margin-top:6px;color:var(--muted);font-size:13px}
.main-title{text-align:center;font-size:22px;font-weight:800;line-height:1.35;margin:8px 0}.sub{text-align:center;color:var(--muted);font-size:14px;line-height:1.6;margin-bottom:18px}
.btn{display:block;width:100%;margin-top:10px;padding:16px;border-radius:16px;text-decoration:none;text-align:center;color:#111;background:linear-gradient(135deg,#f0d9a4,#c79a4f);font-weight:800;border:0;font-size:15px;cursor:pointer}
.btn.sub{color:var(--gold);background:#111;border:1px solid var(--gold2)}
.btn.danger{color:#fff;background:linear-gradient(135deg,#c0392b,#922b21)}
.btn.sm{padding:10px;font-size:13px;margin-top:8px}
.section-title{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--gold);margin:20px 0 12px;font-weight:800;font-size:14px}
.section-title:before,.section-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line))}
.section-title:after{background:linear-gradient(90deg,var(--line),transparent)}
.footer{text-align:center;margin-top:16px;color:var(--muted);font-size:11px;letter-spacing:.18em}
.loading,.error{text-align:center;color:var(--muted);padding:60px 20px}
input,textarea,select{width:100%;margin:6px 0 12px;padding:13px;border-radius:13px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:14px}
label{display:block;color:var(--gold);font-size:13px;margin-top:5px}
.info{border:1px solid rgba(230,200,143,.25);border-radius:16px;padding:14px;margin-top:14px}
.row{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid rgba(230,200,143,.1)}
.row:last-child{border-bottom:0}
.label{color:var(--muted);font-size:13px;min-width:110px}
.value{color:var(--text);font-size:13px;flex:1;word-break:break-all}

/* ── GT 정원 ── */
.gt-header{text-align:center;margin-bottom:10px}
.gt-title{font-size:20px;font-weight:800;color:var(--gold);letter-spacing:.06em}
.gt-garden-name{color:var(--muted);font-size:13px;margin-top:4px}
.gt-resource-bar{display:flex;justify-content:center;gap:8px;margin:10px 0}
.gt-resource{min-width:80px;padding:8px 10px;border-radius:12px;border:1px solid rgba(230,200,143,.2);background:rgba(255,255,255,.04);font-size:16px;text-align:center}
.gt-resource-label{display:block;font-size:10px;color:var(--muted);margin-top:2px}
.gt-growth-bar-wrap{margin:8px 0 12px}
.gt-growth-bar{height:8px;background:#222;border-radius:999px;overflow:hidden;margin:6px 0}
.gt-growth-bar-fill{height:100%;background:linear-gradient(90deg,var(--gold2),var(--gold));border-radius:999px;transition:width .4s}
.gt-growth-label{display:flex;justify-content:space-between;color:var(--muted);font-size:11px}

/* canvas 영역 */
.gt-canvas-wrap{position:relative;margin:0 -4px;background:rgba(0,0,0,.15);border-radius:16px;overflow:hidden;border:1px solid rgba(230,200,143,.1)}
#gtCanvas{display:block;max-width:100%;margin:0 auto;cursor:pointer;touch-action:none}
.gt-canvas-overlay{position:absolute;top:8px;right:8px;display:flex;gap:6px}
.gt-canvas-btn{padding:6px 12px;border-radius:10px;border:1px solid rgba(230,200,143,.4);background:rgba(0,0,0,.6);color:var(--gold);font-size:12px;font-weight:700;cursor:pointer;backdrop-filter:blur(4px)}
.gt-canvas-btn.active{background:rgba(230,200,143,.2);border-color:var(--gold)}

/* 타일 피커 */
.gt-picker{margin-top:10px;display:none}
.gt-picker.on{display:block}
.gt-picker-tabs{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:4px}
.gt-picker-tab{flex-shrink:0;padding:6px 12px;border-radius:10px;border:1px solid rgba(230,200,143,.25);background:rgba(255,255,255,.03);color:var(--muted);font-size:12px;cursor:pointer;white-space:nowrap}
.gt-picker-tab.active{border-color:var(--gold2);color:var(--gold);background:rgba(230,200,143,.1)}
.gt-picker-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.gt-picker-item{border:2px solid rgba(230,200,143,.2);border-radius:10px;background:rgba(255,255,255,.03);cursor:pointer;overflow:hidden;text-align:center;padding:4px 2px}
.gt-picker-item.selected{border-color:var(--gold);background:rgba(230,200,143,.12)}
.gt-picker-item img{width:100%;height:auto;display:block;image-rendering:auto}
.gt-picker-item-name{font-size:10px;color:var(--muted);margin-top:3px;padding-bottom:2px}

/* 액션 버튼 행 */
.gt-action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}

/* 통계 소형 */
.gt-stats{display:flex;justify-content:space-around;padding:10px;border:1px solid rgba(230,200,143,.15);border-radius:14px;background:rgba(255,255,255,.02);margin-top:10px}
.gt-stat{text-align:center}
.gt-stat-val{font-size:17px;font-weight:800;color:var(--gold)}
.gt-stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}

/* 로딩 */
.gt-loading-inner{text-align:center;padding:40px 0 20px}
.gt-loading-plant{font-size:40px;animation:gtWiggle 1.4s ease-in-out infinite;margin-bottom:8px}
.gt-loading-dots{color:var(--muted);font-size:12px;margin-top:6px;animation:gtFade 1.6s ease-in-out infinite}
@keyframes gtWiggle{0%{transform:rotate(0deg)}25%{transform:rotate(-3deg)}50%{transform:rotate(0deg)}75%{transform:rotate(3deg)}100%{transform:rotate(0deg)}}
@keyframes gtFade{0%,100%{opacity:.35}50%{opacity:1}}

/* 어드민 */
.gt-admin-growth{display:flex;justify-content:center;gap:8px;margin:10px 0 14px}
.gt-admin-stage{width:34px;height:34px;border:1px solid rgba(230,200,143,.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;opacity:.45;background:rgba(255,255,255,.03)}
.gt-admin-stage.active{opacity:1;border-color:var(--gold);background:rgba(230,200,143,.13);transform:scale(1.08)}

/* 도감/씨앗 (MVP) */
.gt-tabs{display:flex;gap:6px;justify-content:center;margin:6px 0 12px}
.gt-tab{padding:7px 16px;border-radius:12px;border:1px solid rgba(230,200,143,.25);background:rgba(255,255,255,.03);color:var(--muted);font-size:13px;cursor:pointer;font-weight:700}
.gt-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(230,200,143,.1)}
.gt-seed-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;min-height:52px}
.gt-seed{position:relative;width:58px;padding:6px 2px;border:2px solid rgba(230,200,143,.25);border-radius:12px;background:rgba(255,255,255,.03);text-align:center;cursor:pointer}
.gt-seed.sel{border-color:var(--gold);background:rgba(230,200,143,.14)}
.gt-seed .ico{font-size:22px}.gt-seed .nm{font-size:10px;color:var(--muted);margin-top:2px}
.gt-seed .ct{position:absolute;top:-6px;right:-6px;background:var(--gold);color:#111;font-size:10px;font-weight:800;border-radius:999px;min-width:16px;padding:0 4px}
.gt-seed-empty{color:var(--muted);font-size:12px;align-self:center;padding:14px}
.gt-codex-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gt-cx{border:1px solid rgba(230,200,143,.2);border-radius:12px;background:rgba(255,255,255,.03);text-align:center;padding:8px 2px}
.gt-cx img{width:46px;height:auto;display:block;margin:0 auto}
.gt-cx.locked img{filter:brightness(0) invert(.18);opacity:.7}
.gt-cx .nm{font-size:10px;margin-top:4px;color:var(--muted)}.gt-cx.owned .nm{color:var(--gold)}
.gt-cx .rare{font-size:9px;color:#E2B6FF}
.gt-toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);background:rgba(20,20,20,.95);border:1px solid var(--gold2);color:var(--text);padding:11px 18px;border-radius:14px;font-size:13px;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9}
.gt-toast.on{opacity:1;transform:translateX(-50%) translateY(-6px)}
</style>
</head>
<body>
<div class="wrap"><div id="app" class="card"><div class="loading">불러오는 중입니다...</div></div></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbzX4RVLu3xrotlGqybBEazPOzPgErK3M0XYSTarLynkoqczmdWXQ-XuEyz-RCUIoxft/exec';
const params=new URLSearchParams(location.search);
const CODE=params.get('code')||'GT-0001';
const MODE=params.get('mode')||'view';
let QR_DATA=null;
const app=document.getElementById('app');

async function apiGet(action,extra={}){
  const url=API_URL+'?action='+action+'&code='+encodeURIComponent(CODE)+Object.entries(extra).map(([k,v])=>'&'+k+'='+encodeURIComponent(v)).join('');
  const r=await fetch(url);return r.json();
}
async function apiPost(payload){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});return r.json();
}

function brand(){return`<div class="brand"><div class="logo">SAEGIM</div><div class="slogan">기억을 새기다 · 마음을 잇다</div></div>`;}
function editBtn(){return`<a class="btn sub" href="?code=${encodeURIComponent(CODE)}&mode=admin" style="margin-top:14px">🌿 운영자 모드</a>`;}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function infoRow(label,value){return`<div class="row"><div class="label">${esc(label)}</div><div class="value">${esc(value)}</div></div>`;}
function renderError(msg){app.innerHTML=`<div class="error">${esc(msg)}</div>`;}
function renderInactive(){app.innerHTML=`${brand()}<div class="main-title">아직 등록되지 않은 QR입니다</div><div class="sub">제품 구매 또는 판매처 등록 후 사용할 수 있어요.</div><div class="footer">SAEGIM GT</div>`;}
function renderStopped(){app.innerHTML=`${brand()}<div class="main-title">사용이 중지된 QR입니다</div><div class="sub">현재 이 QR은 비활성화 상태입니다.</div><div class="footer">SAEGIM GT</div>`;}

function renderView(data){
  if(!data||data.status==='미등록'){renderInactive();return;}
  if(data.status==='판매완료'&&!data.owner){renderRegister(data);return;}
  if(data.status==='중지'){renderStopped();return;}
  renderGardenTag(data);
}

/* ══ 아이소메트릭 정원 ══ */
const GT_TW=128,GT_TH=64,GT_SW=130,GT_SH=230;
const GT_GRID=5;
const GT_CW=(GT_GRID+1)*GT_TW;     // 768
const GT_CH=GT_GRID*GT_TH+GT_SH;   // 550
const GT_OX=GT_CW/2;               // 384
const GT_OY=GT_TH*2;               // 128

let GT_TILE_CACHE={};
let GT_MAP=null;   // [GT_GRID][GT_GRID] of [row,col]
let GT_ACTIVE_TILE={row:0,col:0,name:'잔디'};
let GT_EDIT_MODE=false;
let GT_HOVER={i:-1,j:-1};
let GT_LAST_GARDEN=null;
let GT_SAVING=false;
/* 도감 상태 */
let GT_SEEDS={};
let GT_GROWING={};
let GT_CODEX=[];
let GT_SEL_SEED=null;
let GT_SEL_CELL=null;
let GT_VIEW='garden';
let GT_MAP_DIRTY=false;
let GT_DAILY_SEED=null;

/* ── 성장 단계 ── */
const GT_STAGES=[
  {key:'seedling', label:'🌱 새싹 정원',   min:0,   unlock:1},
  {key:'growing',  label:'🌿 자라는 정원', min:50,  unlock:2},
  {key:'lush',     label:'🌳 무성한 정원', min:150, unlock:3},
  {key:'complete', label:'🏡 완성된 정원', min:350, unlock:3},
];
function getGtStage(pt){
  for(let i=GT_STAGES.length-1;i>=0;i--){if(pt>=GT_STAGES[i].min)return GT_STAGES[i];}
  return GT_STAGES[0];
}
let GT_CUR_STAGE=null;

const GT_TILES=[
  {cat:'🌿 땅',tiles:[
    {row:0,col:0,name:'잔디'},{row:0,col:1,name:'키 큰 풀'},{row:0,col:2,name:'야생화'},
    {row:0,col:3,name:'밭'},{row:0,col:4,name:'밀밭'},{row:0,col:5,name:'호박밭'},
    {row:0,col:7,name:'흙길'},{row:0,col:10,name:'돌길'},
  ]},
  {cat:'💧 물',tiles:[
    {row:1,col:0,name:'연못'},{row:1,col:1,name:'강'},
    {row:1,col:4,name:'나무다리'},{row:1,col:5,name:'돌다리'},{row:1,col:6,name:'연꽃연못'},
  ]},
  {cat:'🏡 장식',tiles:[
    {row:4,col:4,name:'우물'},{row:4,col:5,name:'목책'},{row:4,col:7,name:'가로등'},
    {row:5,col:0,name:'문'},{row:5,col:2,name:'벤치'},{row:5,col:5,name:'모닥불'},{row:5,col:7,name:'피크닉'},
  ]},
];

function gtTilePath(row,col){return`/gt-tiles/shire/r${row}-c${col}.png`;}

/* 도감 종 마스터 (식물은 씨앗으로만 획득) */
const GT_SPECIES={
  oak:    {name:'참나무',  tile:[2,0], rarity:'common', need:8,  ico:'🌰'},
  birch:  {name:'자작나무', tile:[2,1], rarity:'common', need:8,  ico:'🌿'},
  veggie: {name:'채소밭',  tile:[2,5], rarity:'common', need:8,  ico:'🥬'},
  hedge:  {name:'생울타리', tile:[2,4], rarity:'common', need:8,  ico:'🌳'},
  apple:  {name:'사과나무', tile:[2,3], rarity:'rare',   need:16, ico:'🍎'},
  flower: {name:'꽃나무',  tile:[2,6], rarity:'rare',   need:16, ico:'🌸'},
  willow: {name:'수양버들', tile:[2,7], rarity:'rare',   need:16, ico:'🌾'},
  mush:   {name:'버섯밭',  tile:[2,9], rarity:'rare',   need:16, ico:'🍄'},
};
const GT_COMMON=Object.keys(GT_SPECIES).filter(k=>GT_SPECIES[k].rarity==='common');
const GT_RARE=Object.keys(GT_SPECIES).filter(k=>GT_SPECIES[k].rarity==='rare');
const GT_SPECIES_COUNT=Object.keys(GT_SPECIES).length;
function gtSpeciesByTile(r,c){return Object.keys(GT_SPECIES).find(k=>GT_SPECIES[k].tile[0]===r&&GT_SPECIES[k].tile[1]===c);}

function initGardenMap(flatArr){
  GT_MAP=Array.from({length:GT_GRID},(_,i)=>
    Array.from({length:GT_GRID},(_,j)=>{
      const t=flatArr&&flatArr[i*GT_GRID+j];
      return Array.isArray(t)?t:[0,0];
    })
  );
}

async function loadTileImages(){
  const keys=new Set(['0-0']);
  if(GT_MAP)GT_MAP.forEach(row=>row.forEach(t=>keys.add(`${t[0]}-${t[1]}`)));
  GT_TILES.forEach(cat=>cat.tiles.forEach(t=>keys.add(`${t.row}-${t.col}`)));
  Object.values(GT_SPECIES).forEach(s=>keys.add(`${s.tile[0]}-${s.tile[1]}`));
  await Promise.all([...keys].map(key=>new Promise(res=>{
    if(GT_TILE_CACHE[key]){res();return;}
    const[r,c]=key.split('-').map(Number);
    const img=new Image();
    img.src=gtTilePath(r,c);
    img.onload=()=>{GT_TILE_CACHE[key]=img;res();};
    img.onerror=res;
  })));
}

function drawIsoMap(){
  const canvas=document.getElementById('gtCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,GT_CW,GT_CH);
  if(!GT_MAP)return;
  for(let i=0;i<GT_GRID;i++){
    for(let j=0;j<GT_GRID;j++){
      const[r,c]=GT_MAP[i][j]||[0,0];
      const key=`${r}-${c}`;
      const img=GT_TILE_CACHE[key]||GT_TILE_CACHE['0-0'];
      if(!img)continue;
      const sx=GT_OX+(j-i)*(GT_TW/2);
      const sy=GT_OY+(i+j)*(GT_TH/2);
      ctx.drawImage(img,sx-GT_SW/2,sy-130,GT_SW,GT_SH);
      const g=GT_GROWING[i+'-'+j];
      if(g){
        const pct=g.point/(GT_SPECIES[g.species]?GT_SPECIES[g.species].need:8);
        const emoji=pct<0.25?'🌱':(pct<0.6?'🌿':'🌾');
        ctx.font='36px serif';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(emoji,sx,sy+GT_TH*0.3);
      }
      if(GT_SEL_CELL&&GT_SEL_CELL.i===i&&GT_SEL_CELL.j===j){
        ctx.save();ctx.translate(sx,sy);ctx.beginPath();
        ctx.moveTo(0,0);ctx.lineTo(GT_TW/2,GT_TH/2);ctx.lineTo(0,GT_TH);ctx.lineTo(-GT_TW/2,GT_TH/2);ctx.closePath();
        ctx.strokeStyle='rgba(230,200,143,0.95)';ctx.lineWidth=3;ctx.stroke();ctx.restore();
      }
    }
  }
  // hover diamond
  if(GT_EDIT_MODE&&GT_HOVER.i>=0){
    const{i,j}=GT_HOVER;
    const sx=GT_OX+(j-i)*(GT_TW/2);
    const sy=GT_OY+(i+j)*(GT_TH/2);
    ctx.save();
    ctx.translate(sx,sy);
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(GT_TW/2,GT_TH/2);
    ctx.lineTo(0,GT_TH);
    ctx.lineTo(-GT_TW/2,GT_TH/2);
    ctx.closePath();
    ctx.fillStyle='rgba(230,200,143,0.25)';
    ctx.strokeStyle='rgba(230,200,143,0.7)';
    ctx.lineWidth=2;
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

function getGridPos(canvas,clientX,clientY){
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  const offsetX=(clientX-rect.left)*scaleX;
  const offsetY=(clientY-rect.top)*scaleY;
  const relX=offsetX-GT_OX;
  const relY=offsetY-GT_OY;
  const _x=relX/GT_TW;
  const _y=relY/GT_TH;
  const i=Math.floor(_y-_x);
  const j=Math.floor(_x+_y);
  return{i,j};
}

function setupCanvasEvents(){
  const canvas=document.getElementById('gtCanvas');
  if(!canvas)return;
  function placeTile(clientX,clientY){
    if(!GT_EDIT_MODE||!GT_ACTIVE_TILE)return;
    const{i,j}=getGridPos(canvas,clientX,clientY);
    if(i>=0&&i<GT_GRID&&j>=0&&j<GT_GRID){
      GT_MAP[i][j]=[GT_ACTIVE_TILE.row,GT_ACTIVE_TILE.col];
      GT_MAP_DIRTY=true;
      drawIsoMap();
    }
  }
  function gardenTap(clientX,clientY){
    const{i,j}=getGridPos(canvas,clientX,clientY);
    if(i<0||i>=GT_GRID||j<0||j>=GT_GRID)return;
    const key=i+'-'+j;
    if(GT_GROWING[key]){GT_SEL_CELL={i,j};drawIsoMap();updateGrowthHud();gtHint('💧 이 새싹에 물·비료를 주세요');return;}
    const[r,c]=GT_MAP[i][j]||[0,0];
    if(gtSpeciesByTile(r,c)){gtHint('🌸 이미 다 자란 식물이에요');GT_SEL_CELL=null;drawIsoMap();return;}
    if(!GT_SEL_SEED){gtHint('아래 보유 씨앗을 골라 빈 칸을 탭하세요');return;}
    plantSeed(i,j);
  }
  function handleTap(x,y){ if(GT_EDIT_MODE)placeTile(x,y); else gardenTap(x,y); }
  function hoverUpdate(clientX,clientY){
    if(!GT_EDIT_MODE)return;
    const{i,j}=getGridPos(canvas,clientX,clientY);
    if(i>=0&&i<GT_GRID&&j>=0&&j<GT_GRID){
      if(GT_HOVER.i!==i||GT_HOVER.j!==j){GT_HOVER={i,j};drawIsoMap();}
    }else{
      if(GT_HOVER.i>=0){GT_HOVER={i:-1,j:-1};drawIsoMap();}
    }
  }
  canvas.addEventListener('click',e=>{handleTap(e.clientX,e.clientY);});
  canvas.addEventListener('mousemove',e=>{hoverUpdate(e.clientX,e.clientY);});
  canvas.addEventListener('mouseleave',()=>{if(GT_HOVER.i>=0){GT_HOVER={i:-1,j:-1};drawIsoMap();}});
  let touching=false;
  canvas.addEventListener('touchstart',e=>{e.preventDefault();touching=true;const t=e.touches[0];handleTap(t.clientX,t.clientY);},{passive:false});
  canvas.addEventListener('touchmove',e=>{e.preventDefault();if(touching&&GT_EDIT_MODE){const t=e.touches[0];placeTile(t.clientX,t.clientY);}},{passive:false});
  canvas.addEventListener('touchend',()=>{touching=false;});
}

  };

async function refreshDailyResources(garden){
  const{doc,getDoc,updateDoc}=window.firestoreApi;
  const ref=doc(window.firestoreDb,'garden_tags',CODE);
  const today=new Date().toISOString().slice(0,10);
  if((garden.resource_date||'')===today)return garden;
  const inv={water:3,fertilizer:1};
  await updateDoc(ref,{inventory:inv,resource_date:today});
  const snap=await getDoc(ref);return snap.data();
}

async function applyDailyVisitBonus(garden){
  const{doc,getDoc,updateDoc}=window.firestoreApi;
  const ref=doc(window.firestoreDb,'garden_tags',CODE);
  const today=new Date().toISOString().slice(0,10);
  if((garden.last_visit_at||'').slice(0,10)===today)return garden;
  const pool=Math.random()<0.3?GT_RARE:GT_COMMON;
  const got=pool[Math.floor(Math.random()*pool.length)];
  const sinv={...(garden.seed_inventory||{})};
  sinv[got]=(sinv[got]||0)+1;
  GT_DAILY_SEED=got;
  await updateDoc(ref,{
    visit_count:(garden.visit_count||0)+1,
    total_growth_point:(garden.total_growth_point||0)+1,
    last_visit_at:new Date().toISOString(),
    seed_inventory:sinv, seed_date:today
  });
  const snap=await getDoc(ref);return snap.data();
}

async function growSelected(kind){
  const garden=GT_LAST_GARDEN; if(!garden)return;
  if(!GT_SEL_CELL){gtHint('키울 새싹을 캔버스에서 먼저 탭하세요');return;}
  const key=GT_SEL_CELL.i+'-'+GT_SEL_CELL.j; const g=GT_GROWING[key];
  if(!g){gtHint('키울 새싹을 먼저 골라주세요 (씨앗을 심거나 새싹을 탭)');return;}
  const inv={...(garden.inventory||{water:0,fertilizer:0})};
  const amount=kind==='water'?1:3;
  if(kind==='water'){if((inv.water||0)<=0){gtToast('오늘의 물을 다 썼어요 💧 (내일 충전)');return;}inv.water--;}
  else{if((inv.fertilizer||0)<=0){gtToast('오늘의 비료를 다 썼어요 🌾 (내일 충전)');return;}inv.fertilizer--;}
  g.point+=amount;
  garden.inventory=inv;
  garden.total_growth_point=(garden.total_growth_point||0)+amount;
  if(kind==='water')garden.water_count=(garden.water_count||0)+1; else garden.fertilizer_count=(garden.fertilizer_count||0)+1;
  const sp=GT_SPECIES[g.species]; let fields;
  if(g.point>=sp.need){
    GT_MAP[GT_SEL_CELL.i][GT_SEL_CELL.j]=[sp.tile[0],sp.tile[1]];
    delete GT_GROWING[key];
    const isNew=!GT_CODEX.includes(g.species); if(isNew)GT_CODEX.push(g.species);
    GT_SEL_CELL=null;
    gtToast((isNew?'✨ 도감 등록! ':'🌸 개화! ')+sp.name);
    fields={inventory:inv,total_growth_point:garden.total_growth_point,water_count:garden.water_count,fertilizer_count:garden.fertilizer_count,growing:GT_GROWING,codex:GT_CODEX,garden_map:GT_MAP.flat()};
    await ensureTile(sp.tile[0],sp.tile[1]);
    updateTabCount();
  }else{
    gtToast((kind==='water'?'💧':'🌾')+' +'+amount+' 성장');
    fields={inventory:inv,total_growth_point:garden.total_growth_point,water_count:garden.water_count,fertilizer_count:garden.fertilizer_count,growing:GT_GROWING};
  }
  gtPersist(fields).catch(e=>gtToast('저장 실패: '+e.message));
  checkStageUp(garden.total_growth_point);
  drawIsoMap(); updateResourceHud(); updateGrowthHud(); updateStatsHud();
}

  const r=await apiPost({action:'registerSoldQr',code:CODE,password:pw,owner:val('owner'),links:JSON.stringify([])});
  if(!r.success){alert(r.message||'등록 실패');return;}
  location.href='?code='+encodeURIComponent(CODE);
}
window.registerFirst=registerFirst;

async function checkGardenAdminPassword(){
  const pw=document.getElementById('gt_admin_pw').value.trim();

  const r=await apiGet('verifyPassword',{password:pw});
  if(!r.success){alert(r.message||'비밀번호가 일치하지 않습니다.');return;}
  renderGardenAdmin();

  await updateDoc(doc(window.firestoreDb,'garden_tags',CODE),{total_growth_point:(g.total_growth_point||0)+10});

}
