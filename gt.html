<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3f6547" />
  <title>가든태그 MVP</title>
  <style>
    :root {
      --ink: #243027;
      --muted: #6f7c71;
      --paper: #f7f3e8;
      --card: #fffdf7;
      --green: #3f6547;
      --green-2: #6f9274;
      --green-3: #dbe8d7;
      --gold: #c79a45;
      --orange: #d9763e;
      --red: #bb584d;
      --blue: #5e8694;
      --line: #d8d3c5;
      --shadow: 0 12px 32px rgba(46, 57, 48, .12);
      --radius: 22px;
      --pixel: "Courier New", monospace;
    }
    * { box-sizing: border-box; }
    html { background: #dfe8dd; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 5%, rgba(255,255,255,.72), transparent 34%),
        linear-gradient(180deg, #dfe8dd 0, #f1eddf 42%, #eee7d6 100%);
      font-family: Pretendard, "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: .5; }
    .app-shell { min-height: 100vh; max-width: 1180px; margin: 0 auto; padding: 18px 18px 104px; }
    body.theme-basic { --green: #3f6547; --green-2: #6f9274; --green-3: #dbe8d7; --gold: #c79a45; --paper: #f7f3e8; }
    body.theme-gamcheon { --green: #356f78; --green-2: #5e94a1; --green-3: #d8edf0; --gold: #d48a56; --paper: #f5efe3; }
    body.theme-artist { --green: #6b4f7d; --green-2: #9272a5; --green-3: #eadff0; --gold: #d7b85e; --paper: #f8f1eb; }
    .theme-card { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 12px; align-items: center; padding: 13px; border: 1px solid var(--line); border-radius: 16px; background: #fffef9; }
    .theme-swatch { display: flex; gap: 4px; margin-top: 8px; }
    .theme-swatch span { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,.08); }
    .theme-card.active { outline: 3px solid rgba(63,101,71,.18); }
    .demo-start-card { display: grid; gap: 10px; padding: 14px; border-radius: 16px; background: #edf5e9; border: 1px solid #d1e2cf; }
    .demo-start-card strong { font-size: 15px; }
    .story-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
    .story-card { padding: 13px; border: 1px solid var(--line); border-radius: 15px; background: #fffef9; }
    .story-card strong { display: block; margin-bottom: 4px; }
    .category-tabs { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 8px; margin-bottom: 14px; }
    .category-tab { border: 1px solid var(--line); border-radius: 15px; background: #fffef9; color: var(--muted); padding: 11px 10px; text-align: left; display: grid; gap: 4px; }
    .category-tab strong { color: var(--ink); font-size: 13px; }
    .category-tab span { font-size: 11px; }
    .category-tab.active { background: var(--green); border-color: var(--green); color: white; }
    .category-tab.active strong { color: white; }
    .topbar {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin: -18px -18px 18px; padding: 14px 20px;
      backdrop-filter: blur(16px);
      background: rgba(247,243,232,.86);
      border-bottom: 1px solid rgba(63,101,71,.15);
    }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      width: 40px; height: 40px; flex: 0 0 auto;
      display: grid; place-items: center;
      background: var(--green); color: #fff8d8; border-radius: 13px;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,.14);
      font-family: var(--pixel); font-weight: 900;
    }
    .brand-copy { min-width: 0; }
    .brand-copy strong { display: block; font-size: 17px; letter-spacing: -.4px; }
    .brand-copy small { display: block; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .top-actions { display: flex; align-items: center; gap: 8px; }
    .mode-pill, .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--line); background: rgba(255,255,255,.7); border-radius: 999px;
      padding: 7px 10px; font-size: 12px; color: var(--muted);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-2); box-shadow: 0 0 0 3px rgba(111,146,116,.15); }
    .status-dot.view { background: var(--gold); box-shadow: 0 0 0 3px rgba(199,154,69,.15); }
    .icon-btn {
      border: 1px solid var(--line); background: var(--card); color: var(--ink);
      width: 40px; height: 40px; border-radius: 13px; display: grid; place-items: center;
    }
    .screen { display: none; animation: fadeIn .22s ease; }
    .screen.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .hero {
      padding: 28px; border-radius: 30px; color: #f9f7e9;
      background:
        linear-gradient(135deg, rgba(255,255,255,.1), transparent 40%),
        var(--green);
      box-shadow: var(--shadow); overflow: hidden; position: relative;
    }
    .hero:after {
      content: ""; position: absolute; width: 220px; height: 220px; right: -80px; bottom: -110px;
      border-radius: 50%; border: 28px solid rgba(255,255,255,.08);
    }
    .hero h1 { margin: 0 0 10px; font-size: clamp(28px, 5vw, 46px); letter-spacing: -1.6px; line-height: 1.08; }
    .hero p { margin: 0; max-width: 690px; color: rgba(255,255,255,.82); line-height: 1.65; }
    .hero .eyebrow { color: #e5ce86; font-weight: 800; font-size: 12px; letter-spacing: .12em; margin-bottom: 12px; }
    .panel { background: rgba(255,253,247,.94); border: 1px solid rgba(63,101,71,.13); border-radius: var(--radius); box-shadow: var(--shadow); }
    .section { padding: 20px; }
    .section-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .section-head h2, .section-head h3 { margin: 0; letter-spacing: -.6px; }
    .section-head p { margin: 5px 0 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .stack { display: grid; gap: 14px; }
    .form-grid { display: grid; gap: 13px; }
    label.field { display: grid; gap: 7px; font-size: 13px; font-weight: 700; }
    input, textarea, select {
      width: 100%; border: 1px solid var(--line); background: #fffef9; color: var(--ink);
      padding: 12px 13px; border-radius: 13px; outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--green-2); box-shadow: 0 0 0 3px rgba(111,146,116,.13); }
    textarea { resize: vertical; min-height: 88px; line-height: 1.5; }
    .btn {
      border: 0; border-radius: 14px; padding: 12px 15px; font-weight: 800;
      background: var(--green); color: white; box-shadow: inset 0 -3px 0 rgba(0,0,0,.15);
      transition: .16s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.secondary { background: #e9efe5; color: var(--green); box-shadow: none; border: 1px solid #cbd9c8; }
    .btn.ghost { background: transparent; color: var(--ink); box-shadow: none; border: 1px solid var(--line); }
    .btn.warn { background: var(--orange); }
    .btn.danger { background: var(--red); }
    .btn.small { padding: 8px 11px; border-radius: 11px; font-size: 12px; }
    .button-row { display: flex; flex-wrap: wrap; gap: 9px; }
    .helper { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .notice { padding: 12px 14px; border-radius: 14px; background: #f2eddc; color: #665f48; font-size: 12px; line-height: 1.55; border: 1px solid #e4dcc3; }
    .notice.green { background: #edf5e9; color: #3e6044; border-color: #d1e2cf; }
    .notice.red { background: #f8e9e6; color: #85493f; border-color: #edcbc5; }
    .registration-wrap { max-width: 930px; margin: 34px auto; display: grid; grid-template-columns: 1.12fr .88fr; gap: 18px; }
    .registration-card { padding: 26px; }
    .demo-code { display: inline-flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 10px; background: #263b2b; color: #fff2bd; font-family: var(--pixel); font-weight: 800; letter-spacing: .08em; }
    .seed-preview { display: grid; grid-template-columns: 74px 1fr; gap: 14px; align-items: center; padding: 13px; border-radius: 16px; background: #f2f0e6; }
    .pixel-canvas { image-rendering: pixelated; image-rendering: crisp-edges; width: 64px; height: 64px; }
    .garden-layout { display: grid; grid-template-columns: minmax(0, 1.38fr) minmax(270px, .62fr); gap: 16px; align-items: start; }
    .garden-board-wrap { padding: 16px; background: #c9d8bf; border: 1px solid #b2c4aa; border-radius: 24px; box-shadow: inset 0 -8px 0 rgba(64,92,66,.08); }
    .garden-board { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 8px; aspect-ratio: 1 / 1; }
    .plot {
      position: relative; min-width: 0; border: 0; padding: 0; border-radius: 16px;
      background: #ece6ce; box-shadow: inset 0 -5px 0 rgba(100,80,42,.1); overflow: hidden;
      display: grid; place-items: center; color: var(--ink);
    }
    .plot:hover:not(:disabled) { outline: 3px solid rgba(255,255,255,.72); transform: translateY(-1px); }
    .plot.locked { background: #aeb6a5; color: #677064; box-shadow: inset 0 -5px 0 rgba(0,0,0,.08); }
    .plot.empty { background: repeating-linear-gradient(135deg,#e7dfc5,#e7dfc5 8px,#eee8d3 8px,#eee8d3 16px); }
    .plot.needs-water { box-shadow: inset 0 -5px 0 rgba(63,101,71,.11), 0 0 0 3px rgba(94,134,148,.45); }
    .plot.complete { box-shadow: inset 0 -5px 0 rgba(63,101,71,.11), 0 0 0 3px rgba(199,154,69,.65); }
    .plot .pixel-canvas { width: 78%; height: 78%; max-width: 100px; max-height: 100px; }
    .plot-label { position: absolute; left: 6px; right: 6px; bottom: 5px; font-size: 10px; padding: 3px 5px; border-radius: 7px; background: rgba(255,253,247,.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .plot-badge { position: absolute; top: 6px; right: 6px; width: 22px; height: 22px; border-radius: 8px; display: grid; place-items: center; background: rgba(255,255,255,.85); font-size: 12px; }
    .garden-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 9px; }
    .stat { background: #f0eee3; border-radius: 14px; padding: 12px; text-align: center; }
    .stat strong { display: block; font-size: 20px; color: var(--green); }
    .stat small { color: var(--muted); font-size: 11px; }
    .progress { height: 9px; background: #e0dfd5; border-radius: 999px; overflow: hidden; }
    .progress > span { display: block; height: 100%; background: var(--green-2); border-radius: inherit; transition: width .3s ease; }
    .card-list { display: grid; gap: 10px; }
    .item-card { display: grid; grid-template-columns: 62px minmax(0,1fr) auto; gap: 12px; align-items: center; padding: 12px; border-radius: 16px; border: 1px solid var(--line); background: #fffef9; }
    .item-card .pixel-canvas { width: 58px; height: 58px; }
    .item-card h4 { margin: 0 0 4px; font-size: 14px; }
    .item-card p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .item-card.empty-inventory { opacity: .56; }
    .qty { min-width: 42px; min-height: 34px; border-radius: 12px; display: grid; place-items: center; background: #e7eee3; color: var(--green); font-size: 12px; font-weight: 900; padding: 0 8px; white-space: nowrap; }
    .inventory-summary { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 9px; margin-bottom: 14px; }
    .inventory-group { display: grid; gap: 9px; }
    .inventory-group + .inventory-group { margin-top: 16px; }
    .inventory-group-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 12px; font-weight: 900; }
    .inventory-group-title span:first-child { color: var(--ink); }
    .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip { display: inline-flex; align-items: center; gap: 4px; border-radius: 999px; padding: 5px 8px; font-size: 10px; font-weight: 800; background: #ecebe2; color: #5f695f; }
    .chip.rare { background: #e4edf0; color: #4c7480; }
    .chip.special { background: #f2e8c8; color: #896b2f; }
    .chip.legend { background: #efe0e8; color: #8a4e70; }
    .shop-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .shop-card { padding: 16px; border: 1px solid var(--line); border-radius: 18px; background: #fffef9; display: grid; gap: 12px; }
    .shop-card.paused { opacity: .6; filter: grayscale(.5); }
    .seed-map { position: relative; min-height: 360px; overflow: hidden; border-radius: 22px; background: linear-gradient(160deg,#e3ecd9,#f7f1dc 56%,#d9e7e8); border: 1px solid #c8d4bf; box-shadow: inset 0 -8px 0 rgba(63,101,71,.06); }
    .seed-map:before { content: ""; position: absolute; inset: 11% 8%; border-radius: 42% 55% 36% 48%; border: 18px solid rgba(255,253,247,.62); transform: rotate(-9deg); }
    .seed-map:after { content: ""; position: absolute; left: 5%; right: 5%; top: 48%; height: 32px; border-radius: 999px; background: rgba(214,188,128,.38); transform: rotate(-7deg); box-shadow: 0 74px 0 rgba(214,188,128,.28), 0 -82px 0 rgba(255,253,247,.34); }
    .map-lane { position: absolute; left: 11%; right: 14%; height: 12px; border-radius: 999px; background: rgba(88,118,85,.18); transform: rotate(18deg); }
    .map-lane.one { top: 28%; }
    .map-lane.two { top: 66%; transform: rotate(-17deg); }
    .map-label { position: absolute; z-index: 2; left: 18px; top: 16px; padding: 7px 10px; border-radius: 999px; background: rgba(255,253,247,.82); color: var(--green); font-size: 12px; font-weight: 900; }
    .map-pin { position: absolute; z-index: 4; width: 74px; min-height: 86px; border: 0; border-radius: 18px; background: rgba(255,253,247,.92); color: var(--ink); box-shadow: 0 10px 24px rgba(46,57,48,.16); display: grid; justify-items: center; gap: 4px; padding: 8px 7px; transform: translate(-50%,-50%); }
    .map-pin:hover { transform: translate(-50%,-54%); }
    .map-pin .pixel-canvas { width: 38px; height: 38px; }
    .map-pin strong { width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
    .map-pin small { color: var(--muted); font-size: 9px; }
    .map-pin.visited { outline: 3px solid rgba(63,101,71,.22); }
    .map-pin.paused { opacity: .55; filter: grayscale(.6); }
    .map-pin .pin-check { position: absolute; right: -5px; top: -5px; display: grid; place-items: center; width: 23px; height: 23px; border-radius: 50%; background: var(--green); color: white; font-size: 12px; }
    .shop-title { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .shop-title h3 { margin: 0; font-size: 16px; }
    .shop-title p { margin: 5px 0 0; color: var(--muted); font-size: 12px; }
    .shop-seed { display: flex; gap: 10px; align-items: center; padding: 9px; border-radius: 13px; background: #f1efe4; }
    .shop-seed .pixel-canvas { width: 46px; height: 46px; }
    .mission-strip { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
    .mission { padding: 13px; background: #f4f0e2; border-radius: 15px; border: 1px solid #e1dbc9; }
    .mission.done { background: #e7f0e3; border-color: #c8dcc5; }
    .mission strong { display: block; margin-bottom: 4px; }
    .collection-grid { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 12px; }
    .collection-card { position: relative; padding: 12px; border-radius: 17px; background: #fffef9; border: 1px solid var(--line); min-width: 0; }
    .collection-card.unknown { background: #d7d8d1; color: #777d76; }
    .collection-card .pixel-canvas { width: 100%; height: auto; aspect-ratio: 1; }
    .collection-card h4 { margin: 7px 0 3px; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .collection-card p { margin: 0; color: var(--muted); font-size: 10px; }
    .record-thumb { width: 100%; aspect-ratio: 16/10; object-fit: cover; border-radius: 11px; margin-top: 9px; background: #e8e5da; }
    .settings-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 14px; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--line); }
    .settings-row:last-child { border-bottom: 0; }
    .settings-row strong { display: block; font-size: 14px; }
    .settings-row p { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 15px; }
    table { border-collapse: collapse; width: 100%; min-width: 620px; background: #fffef9; }
    th, td { padding: 11px 12px; border-bottom: 1px solid var(--line); text-align: left; font-size: 12px; }
    th { background: #eeece1; color: #5d675d; }
    tr:last-child td { border-bottom: 0; }
    .bottom-nav {
      position: fixed; left: 50%; transform: translateX(-50%); bottom: 14px; z-index: 30;
      width: min(calc(100% - 24px), 780px); display: grid; grid-template-columns: repeat(6,1fr); gap: 6px;
      padding: 7px; background: rgba(255,253,247,.94); border: 1px solid rgba(63,101,71,.18);
      border-radius: 22px; box-shadow: 0 14px 44px rgba(33,47,37,.2); backdrop-filter: blur(18px);
    }
    .nav-btn { border: 0; background: transparent; color: var(--muted); padding: 8px 4px; border-radius: 15px; display: grid; justify-items: center; gap: 4px; font-size: 10px; }
    .nav-btn span:first-child { font-size: 20px; line-height: 1; }
    .nav-btn.active { background: var(--green); color: white; }
    .modal-backdrop { position: fixed; inset: 0; z-index: 100; display: none; place-items: center; padding: 18px; background: rgba(24,34,27,.54); backdrop-filter: blur(5px); }
    .modal-backdrop.open { display: grid; }
    .modal { width: min(100%, 560px); max-height: min(88vh, 760px); overflow-y: auto; background: var(--paper); border-radius: 24px; box-shadow: 0 25px 80px rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.5); }
    .modal-head { position: sticky; top: 0; z-index: 2; padding: 17px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; background: rgba(247,243,232,.96); border-bottom: 1px solid var(--line); }
    .modal-head h3 { margin: 0; }
    .modal-body { padding: 18px; }
    .toast-wrap { position: fixed; right: 16px; top: 74px; z-index: 200; display: grid; gap: 8px; width: min(calc(100% - 32px), 360px); }
    .toast { padding: 12px 14px; border-radius: 14px; background: #263b2b; color: white; box-shadow: var(--shadow); font-size: 13px; animation: slideIn .2s ease; }
    .toast.error { background: #8b453d; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } }
    .empty-state { text-align: center; padding: 30px 15px; color: var(--muted); }
    .empty-state strong { display: block; color: var(--ink); margin-bottom: 7px; }
    .admin-lock { max-width: 460px; margin: 34px auto; }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .registration-wrap, .garden-layout, .grid-2 { grid-template-columns: 1fr; }
      .collection-grid { grid-template-columns: repeat(3,minmax(0,1fr)); }
      .grid-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .app-shell { padding: 12px 12px 98px; }
      .topbar { margin: -12px -12px 14px; padding: 10px 12px; }
      .brand-copy small, .mode-pill { display: none; }
      .hero { padding: 22px 18px; border-radius: 23px; }
      .section { padding: 15px; }
      .registration-wrap { margin: 16px auto; }
      .registration-card { padding: 19px; }
      .garden-board-wrap { padding: 9px; border-radius: 19px; }
      .garden-board { gap: 5px; }
      .plot { border-radius: 11px; }
      .plot-label { display: none; }
      .plot-badge { top: 3px; right: 3px; width: 18px; height: 18px; font-size: 10px; border-radius: 6px; }
      .seed-map { min-height: 430px; }
      .map-pin { width: 64px; min-height: 78px; }
      .shop-grid { grid-template-columns: 1fr; }
      .mission-strip { grid-template-columns: 1fr; }
      .story-strip { grid-template-columns: 1fr; }
      .category-tabs { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .collection-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .item-card { grid-template-columns: 50px minmax(0,1fr) auto; }
      .inventory-summary { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .bottom-nav { bottom: 8px; width: calc(100% - 16px); border-radius: 19px; }
      .nav-btn { font-size: 9px; }
      .nav-btn span:first-child { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">GT</div>
        <div class="brand-copy">
          <strong>가든태그</strong>
          <small id="headerCode">지역을 여행하며 나만의 정원을 키우세요</small>
        </div>
      </div>
      <div class="top-actions">
        <div class="mode-pill" id="speedPill">테스트 속도</div>
        <div class="status-pill" id="authPill"><span class="status-dot"></span><span>미등록</span></div>

      { id:'shop-sunset', code:'GCT-003', name:'노을엽서점', summary:'여행의 한 장면을 고르는 엽서 가게', category:'문구', hours:'10:30–19:00', seedId:'marigold', status:'active', address:'부산 사하구 감내2로', instagram:'https://www.instagram.com/', mapQuery:'감천문화마을', mapX:67, mapY:69 },
      { id:'shop-dawn', code:'GCT-004', name:'새벽사진관', summary:'골목의 빛을 기록하는 작은 사진관', category:'사진', hours:'예약 운영', seedId:'morningglory', status:'active', address:'부산 사하구 감내2로', instagram:'https://www.instagram.com/', mapQuery:'감천문화마을', mapX:76, mapY:27 },

      { id:'shop-fish', code:'GCT-007', name:'물고기길 상점', summary:'감천의 물고기 표식을 담은 소품점', category:'소품', hours:'10:00–18:30', seedId:'camellia', status:'active', address:'부산 사하구 감내2로', instagram:'https://www.instagram.com/', mapQuery:'감천문화마을', mapX:42, mapY:82 }
    ];

    const keyDesigns = {
      GARDEN01: { designId:'basic', name:'기본형 정원키', seedId:'sunflower', theme:'basic', themeName:'기본 정원 테마', description:'가든태그를 처음 시작하는 초록 정원 분위기입니다.', colors:['#3f6547','#6f9274','#c79a45'] },
      GMCH2026: { designId:'gamcheon', name:'감천형 정원키', seedId:'gamcheonwind', theme:'gamcheon', themeName:'감천 골목 테마', description:'감천의 바다빛, 골목길, 따뜻한 벽색을 담은 테마입니다.', colors:['#356f78','#5e94a1','#d48a56'] },
      ARTST001: { designId:'artist', name:'작가형 정원키', seedId:'starflower', theme:'artist', themeName:'작가 작업실 테마', description:'작가형 정원키와 어울리는 보라빛 작업실 분위기입니다.', colors:['#6b4f7d','#9272a5','#d7b85e'] }
    };

    const unlockOrder = [
      6,7,8,11,12,13,16,17,18,
      2,22,
      10,14,5,9,
      1,3,21,23,
      0,4,20,24,15,19
    ];

    const defaultState = () => ({
      version: 1,
      registered: false,
      keyId: 'GT-0001',
      gardenId: 'GARDEN-DEMO-001',
      gardenName: '내 정원',
      pinHash: '',
      auth: { managed:false, failCount:0, lockUntil:0 },
      linkedDesigns: [],
      activeTheme: 'basic',
      inventory: {},
      fertilizers: { small:3, good:1 },
      plots: Array.from({length:25}, () => null),
      visits: [],
      dailyRewards: {},
      grantedRewards: {},
      collection: {},
      settings: { demoSpeed:true },
      adminUnlocked: false,
      logs: [],
      generatedKeys: [],
      shopStatuses: Object.fromEntries(shops.map(s => [s.id, s.status]))
    });

    let state = loadState();
    let activeTab = state.registered ? 'garden' : 'registration';
    let activeCollectionType = '기본';
    let renderTimer = null;

    const el = id => document.getElementById(id);
    const qs = (sel, root=document) => root.querySelector(sel);
    const qsa = (sel, root=document) => [...root.querySelectorAll(sel)];
    const now = () => Date.now();
    const todayKey = () => new Date().toISOString().slice(0,10);
    const escapeHtml = (value='') => String(value).replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
    const uid = prefix => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,7)}`;
    const hashPin = pin => btoa([...pin].map((ch,i)=>String.fromCharCode(ch.charCodeAt(0)+i+4)).join(''));
    const formatDate = ts => ts ? new Intl.DateTimeFormat('ko-KR',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).format(new Date(ts)) : '-';
    const formatDuration = ms => {
      if (ms <= 0) return '완료';
      const sec = Math.ceil(ms/1000);
      if (sec < 60) return `${sec}초`;
      const min = Math.ceil(sec/60);
      if (min < 60) return `${min}분`;
      const h = Math.floor(min/60), m = min%60;
      return `${h}시간${m ? ` ${m}분` : ''}`;
    };

    function loadState(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        const loaded={ ...defaultState(), ...parsed, activeTheme: parsed.activeTheme || 'basic', auth:{...defaultState().auth,...parsed.auth}, settings:{...defaultState().settings,...parsed.settings} };
        if(loaded.registered && (!loaded.linkedDesigns || !loaded.linkedDesigns.length)) loaded.linkedDesigns=['basic'];
        return loaded;
      } catch (err) {
        console.error(err);
        return defaultState();
      }
    }
    function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function logEvent(type, detail={}){
      state.logs.unshift({ id:uid('log'), type, detail, at:now() });
      state.logs = state.logs.slice(0,500);
      saveState();
    }
    function toast(message, kind='ok'){
      const node = document.createElement('div');
      node.className = `toast ${kind === 'error' ? 'error' : ''}`;
      node.textContent = message;
      el('toastWrap').appendChild(node);
      setTimeout(()=>node.remove(), 3200);
    }
    function openModal(title, html, onOpen){
      el('modalTitle').textContent = title;
      el('modalBody').innerHTML = html;
      el('modalBackdrop').classList.add('open');
      el('modalBackdrop').setAttribute('aria-hidden','false');
      if (onOpen) onOpen(el('modalBody'));
    }
    function closeModal(){
      el('modalBackdrop').classList.remove('open');
      el('modalBackdrop').setAttribute('aria-hidden','true');
      el('modalBody').innerHTML = '';
    }

    function addInventory(seedId, qty=1, source='보상'){
      const item = state.inventory[seedId] || { qty:0, firstAcquiredAt:now(), source };
      if (item.qty === 0 && !item.firstAcquiredAt) item.firstAcquiredAt = now();
      item.qty += qty;
      item.source = item.source || source;
      state.inventory[seedId] = item;
      if (!state.collection[seedId]) state.collection[seedId] = { status:'found', harvestCount:0, firstAcquiredAt:now(), firstCompletedAt:null, records:[] };
      else if (state.collection[seedId].status === 'unknown') state.collection[seedId].status = 'found';
      logEvent('seed_granted',{seedId,qty,source});
    }
    function totalVisitCount(){ return new Set(state.visits.map(v=>v.shopId)).size; }
    function unlockedCount(){
      const v = totalVisitCount();
      if (v >= 7) return 25;
      if (v >= 5) return 19;
      if (v >= 3) return 15;
      if (v >= 1) return 11;
      return 9;
    }
    function isPlotUnlocked(index){ return unlockOrder.slice(0, unlockedCount()).includes(index); }
    function nextUnlock(){
      const v = totalVisitCount();
      if (v < 1) return {visits:1, plots:11};
      if (v < 3) return {visits:3, plots:15};
      if (v < 5) return {visits:5, plots:19};
      if (v < 7) return {visits:7, plots:25};
      return null;
    }
    function stageDurationMs(seed){
      const total = seed.totalMinutes * 60 * 1000;
      return total / 4 / (state.settings.demoSpeed ? DEMO_SCALE : 1);
    }
    function updateGrowth(){
      let changed = false;
      state.plots.forEach(plot => {
        if (!plot || plot.status !== 'growing') return;
        if (now() >= plot.stageEndsAt) {
          if (plot.stage >= 4) plot.status = 'complete';
          else plot.status = 'needs_water';
          changed = true;
        }
      });
      if (changed) saveState();
      return changed;
    }
    function plantStatusLabel(plot){
      if (!plot) return '';
      if (plot.status === 'needs_water') return '물 필요';
      if (plot.status === 'complete') return '수확 가능';
      return ['','발아','새싹','성장 중','개화·결실'][plot.stage];
    }

    function drawPlant(canvas, seed, stage=4, status='growing', silhouette=false){
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const size = 11;
      canvas.width = size; canvas.height = size;
      ctx.clearRect(0,0,size,size);
      const px=(x,y,c)=>{ctx.fillStyle=c;ctx.fillRect(x,y,1,1)};
      const dark = silhouette ? '#858b83' : '#2f4d35';
      const leaf = silhouette ? '#969c94' : '#5f9258';
      const leaf2 = silhouette ? '#a6aaa3' : '#80ad67';
      const bloom = silhouette ? '#787d78' : seed.color;
      const accent = silhouette ? '#90958f' : seed.accent;
      const soil = silhouette ? '#aaa8a0' : '#8a6842';
      // 바닥 그림자
      [[4,9],[5,9],[6,9],[3,10],[4,10],[5,10],[6,10],[7,10]].forEach(([x,y])=>px(x,y,soil));
      if(stage === 1){
        [[5,7],[5,8]].forEach(([x,y])=>px(x,y,dark));
        [[4,6],[5,6],[6,6],[4,7],[6,7]].forEach(([x,y])=>px(x,y,leaf2));
      }
      if(stage >= 2){
        for(let y=5;y<=9;y++) px(5,y,dark);
        [[4,7],[3,6],[4,6],[6,8],[7,7],[6,7]].forEach(([x,y])=>px(x,y,leaf));
        if(stage === 2) [[4,4],[5,4],[6,4],[5,3]].forEach(([x,y])=>px(x,y,leaf2));
      }
      if(stage >= 3){
        for(let y=3;y<=9;y++) px(5,y,dark);
        [[4,5],[3,4],[4,4],[6,7],[7,6],[6,6],[4,8],[3,7]].forEach(([x,y])=>px(x,y,leaf));
        if(stage === 3) [[4,2],[5,2],[6,2],[4,3],[6,3],[5,1]].forEach(([x,y])=>px(x,y,bloom));
      }
      if(stage >= 4){
        const petals = [[5,0],[3,1],[4,1],[6,1],[7,1],[2,2],[3,2],[7,2],[8,2],[3,3],[4,3],[6,3],[7,3],[5,4]];
        petals.forEach(([x,y])=>px(x,y,bloom));
        [[4,2],[5,2],[6,2],[5,1],[5,3]].forEach(([x,y])=>px(x,y,accent));
        px(5,2, silhouette ? '#777' : '#775126');
      }
      if(status === 'needs_water'){
        px(9,1,'#5e91b8'); px(8,2,'#75acd1'); px(9,2,'#75acd1'); px(9,3,'#5e91b8');
      }
      if(status === 'complete'){
        px(1,1,'#c79a45'); px(1,3,'#c79a45'); px(9,4,'#c79a45');
      }
    }
    function hydrateCanvases(root=document){
      qsa('canvas[data-seed]',root).forEach(canvas => {
        const seed = seedMap[canvas.dataset.seed] || seedCatalog[0];
        drawPlant(canvas, seed, Number(canvas.dataset.stage||4), canvas.dataset.status||'growing', canvas.dataset.silhouette==='1');
      });
    }

    function applyTheme(){
      const theme=state.activeTheme || 'basic';
      document.body.classList.remove('theme-basic','theme-gamcheon','theme-artist');
      document.body.classList.add(`theme-${theme}`);

    function renderCurrent(){
      updateGrowth();

      el('registrationScreen').innerHTML = `
        <div class="hero">

          <h1>씨앗을 따라<br>감천 골목을 탐험해요.</h1>
          <p>실물 QR 정원키를 등록하고, 씨앗 지도를 보며 감천의 점포와 작가 공간을 방문하세요. 수집한 씨앗은 내 정원에서 자라고, 완성된 식물은 장소와 기록이 담긴 도감이 됩니다.</p>
        </div>
        <div class="registration-wrap">
          <div class="panel registration-card">
            <div class="section-head"><div><h2>정원키를 등록해주세요</h2><p>포장 안의 1회용 등록코드를 입력하면 나만의 정원이 열립니다. 1차 실증에서는 회원가입 없이 정원키와 PIN으로 시작합니다.</p></div></div>
            <div class="demo-start-card" style="margin-bottom:14px">
              <strong>시연용 빠른 시작</strong>
              <p class="helper" style="margin:0">기본형 정원키를 산 상황으로 바로 시작합니다.</p>

            </div>

                <input id="registrationCode" maxlength="8" autocomplete="off" placeholder="영문·숫자 8자리" value="GARDEN01" />
              </label>
              <div class="grid-2">
                <label class="field">6자리 PIN
                  <input id="pin" type="password" inputmode="numeric" maxlength="6" placeholder="숫자 6자리" value="123456" />
                </label>

                  <input id="pinConfirm" type="password" inputmode="numeric" maxlength="6" placeholder="한 번 더 입력" value="123456" />

              </div>
              <button class="btn" type="submit">내 정원 열기</button>
              <div class="helper">등록코드는 최초 1회만 사용할 수 있어요. 이 MVP에서는 아래 테스트 코드를 사용합니다.</div>
            </form>
          </div>
          <div class="panel registration-card stack">
            <div>
              <div class="section-head"><div><h3>바로 실행해보는 테스트 버전</h3><p>가든태그의 1차 실증 가능성을 검토하기 위한 로컬 MVP입니다.</p></div></div>
              <div class="demo-code">GARDEN01</div>
              <div class="helper" style="margin-top:8px">기본 PIN 예시: <strong>123456</strong></div>
            </div>
            <div class="seed-preview">
              <canvas class="pixel-canvas" data-seed="sunflower" data-stage="4"></canvas>
              <div><strong>최초 등록 보상</strong><div class="helper">민들레 씨앗 1개 + 기본형 정원키 전용 해바라기 씨앗 1개</div></div>
            </div>
            <div class="notice">실서비스에서는 등록코드·PIN·정원 데이터가 Firebase 같은 서버에 저장되어야 합니다. 현재 파일은 화면과 핵심 루프를 검증하는 로컬 MVP입니다.</div>
          </div>
        </div>`;
      hydrateCanvases(el('registrationScreen'));
      el('quickBasicStart').addEventListener('click',()=>{el('registrationCode').value='GARDEN01';el('pin').value='123456';el('pinConfirm').value='123456';el('registerForm').requestSubmit();});
      el('registerForm').addEventListener('submit', e => {
        e.preventDefault();
        const code = el('registrationCode').value.trim().toUpperCase();
        const pin = el('pin').value.trim();
        const confirm = el('pinConfirm').value.trim();
        if (!keyDesigns[code]) return toast('등록코드를 다시 확인해주세요.','error');
        if (!/^\d{6}$/.test(pin)) return toast('PIN은 숫자 6자리로 입력해주세요.','error');
        if (pin !== confirm) return toast('두 PIN이 서로 달라요.','error');
        state.registered = true;
        state.pinHash = hashPin(pin);
        state.auth.managed = true;
        state.linkedDesigns = [keyDesigns[code].designId];
        state.activeTheme = keyDesigns[code].theme;
        addInventory('dandelion',1,'최초 등록 보상');
        addInventory(keyDesigns[code].seedId,1,`${keyDesigns[code].name} 시작 보상`);
        logEvent('key_registered',{code,designId:keyDesigns[code].designId});
        saveState();
        toast('정원키 등록이 완료되었습니다.');
        setActiveTab('garden');
      });
    }

    function renderGarden(){
      const visits = totalVisitCount();
      const unlocked = unlockedCount();
      const ready = state.plots.filter(p=>p && p.status==='needs_water').length;
      const complete = state.plots.filter(p=>p && p.status==='complete').length;
      const next = nextUnlock();
      const plotsHtml = state.plots.map((plot,index) => {
        const unlockedPlot = isPlotUnlocked(index);
        if (!unlockedPlot) return `<button class="plot locked" data-plot="${index}"><span style="font-size:20px">🔒</span><span class="plot-label">잠긴 칸</span></button>`;
        if (!plot) return `<button class="plot empty" data-plot="${index}"><span style="font-size:24px;color:#8d846b">＋</span><span class="plot-label">씨앗 심기</span></button>`;
        const seed = seedMap[plot.seedId];
        const badge = plot.status==='needs_water' ? '💧' : plot.status==='complete' ? '✨' : '';
        return `<button class="plot ${plot.status==='needs_water'?'needs-water':''} ${plot.status==='complete'?'complete':''}" data-plot="${index}">
          ${badge ? `<span class="plot-badge">${badge}</span>`:''}
          <canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="${plot.stage}" data-status="${plot.status}"></canvas>
          <span class="plot-label">${escapeHtml(seed.name)} · ${plantStatusLabel(plot)}</span>
        </button>`;
      }).join('');
      el('gardenScreen').innerHTML = `
        <div class="section-head"><div><h2>${escapeHtml(state.gardenName)}</h2><p>빈 칸을 눌러 씨앗을 심고, 물이 필요할 때 다시 찾아와 주세요.</p></div><div class="button-row"><button class="btn secondary small" id="waterAll" ${!state.auth.managed || ready===0?'disabled':''}>💧 전체 물주기 ${ready?`(${ready})`:''}</button></div></div>
        ${!state.auth.managed ? '<div class="notice" style="margin-bottom:14px">현재 보기 모드입니다. 심기·물주기·수확은 우측 상단 자물쇠에서 PIN 인증 후 사용할 수 있습니다.</div>' : ''}
        <div class="garden-layout">
          <div class="garden-board-wrap"><div class="garden-board">${plotsHtml}</div></div>
          <div class="stack">
            <div class="panel section">
              <div class="section-head"><div><h3>정원 현황</h3><p>점포 방문이 쌓이면 바깥 칸이 열립니다.</p></div></div>
              <div class="garden-stats">
                <div class="stat"><strong>${unlocked}</strong><small>사용 가능 칸</small></div>
                <div class="stat"><strong>${visits}</strong><small>서로 다른 점포</small></div>
                <div class="stat"><strong>${complete}</strong><small>수확 대기</small></div>
              </div>
              ${next ? `<div style="margin-top:14px"><div class="helper">다음 해금: 점포 ${next.visits}곳 방문 → ${next.plots}칸</div><div class="progress" style="margin-top:7px"><span style="width:${Math.min(100,visits/next.visits*100)}%"></span></div></div>` : '<div class="notice green" style="margin-top:14px">정원의 25칸이 모두 열렸습니다.</div>'}
            </div>
            <div class="panel section">
              <div class="section-head"><div><h3>빠른 행동</h3><p>현재 정원의 상태에 맞는 행동입니다.</p></div></div>
              <div class="button-row">
                <button class="btn secondary small" data-go="inventory">보유 씨앗 보기</button>
                <button class="btn secondary small" data-go="explore">씨앗 찾으러 가기</button>
                <button class="btn secondary small" data-go="collection">도감 확인</button>
              </div>
            </div>
            <div class="panel section">
              <div class="section-head"><div><h3>성장 규칙</h3></div></div>
              <div class="helper">발아 → 물주기 → 새싹 → 물주기 → 성장 중 → 물주기 → 개화·결실 → 수확. 물을 주지 않아도 식물은 죽지 않고 성장만 멈춥니다.</div>
            </div>
          </div>
        </div>`;
      hydrateCanvases(el('gardenScreen'));
      qsa('[data-plot]',el('gardenScreen')).forEach(btn=>btn.addEventListener('click',()=>handlePlotClick(Number(btn.dataset.plot))));
      qsa('[data-go]',el('gardenScreen')).forEach(btn=>btn.addEventListener('click',()=>setActiveTab(btn.dataset.go)));
      el('waterAll').addEventListener('click', waterAll);
    }

    function handlePlotClick(index){
      if (!isPlotUnlocked(index)) {
        const next = nextUnlock();
        return openModal('잠긴 정원 칸', `<div class="empty-state"><div style="font-size:38px">🔒</div><strong>아직 열리지 않은 칸입니다.</strong><p>${next ? `감천의 서로 다른 점포 ${next.visits}곳을 방문하면 ${next.plots}칸까지 열립니다.` : '모든 칸이 열렸습니다.'}</p><button class="btn" data-modal-go="explore">점포 탐색하기</button></div>`, root=>{
          qs('[data-modal-go]',root)?.addEventListener('click',()=>{closeModal();setActiveTab('explore')});
        });
      }
      if (!state.auth.managed) return requestPin();
      const plot = state.plots[index];
      if (!plot) return openSeedPicker(index);
      return openPlantDetail(index);
    }

    function openSeedPicker(index){
      const available = seedCatalog.filter(seed => (state.inventory[seed.id]?.qty||0) > 0);
      const list = available.length ? available.map(seed=>`<button class="item-card" style="width:100%;text-align:left" data-pick-seed="${seed.id}">
        <canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas>
        <div><h4>${escapeHtml(seed.name)}</h4><p>${escapeHtml(seed.description)}</p><div class="chip-row"><span class="chip">${seed.type}</span><span class="chip">약 ${seed.totalMinutes}분</span></div></div><div class="qty">${state.inventory[seed.id].qty}</div>
      </button>`).join('') : '<div class="empty-state"><strong>심을 씨앗이 없습니다.</strong><p>점포를 탐색해 새로운 씨앗을 받아보세요.</p></div>';
      openModal('어떤 씨앗을 심을까요?', `<div class="stack">${list}</div>`, root=>{
        hydrateCanvases(root);
        qsa('[data-pick-seed]',root).forEach(btn=>btn.addEventListener('click',()=>openPlantRecordForm(index,btn.dataset.pickSeed)));
      });
    }

    function openPlantRecordForm(index,seedId){
      const seed = seedMap[seedId];
      openModal(`${seed.name} 심기`, `
        <div class="seed-preview"><canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas><div><strong>${escapeHtml(seed.name)}</strong><div class="helper">${escapeHtml(seed.source)} · ${seed.type} 씨앗</div></div></div>
        <form id="plantForm" class="form-grid" style="margin-top:16px">
          <label class="field">여행 기록 사진 1장 <span class="helper">선택 사항 · 자동 압축</span><input id="recordPhoto" type="file" accept="image/*" /></label>
          <label class="field">짧은 기록 <span class="helper"><span id="recordCount">0</span>/200자</span><textarea id="recordText" maxlength="200" placeholder="이 씨앗을 얻은 장소나 오늘의 기억을 남겨보세요."></textarea></label>
          <button class="btn" type="submit">이 칸에 심기</button>
        </form>`, root=>{
          hydrateCanvases(root);
          const text=qs('#recordText',root), count=qs('#recordCount',root);
          text.addEventListener('input',()=>count.textContent=text.value.length);
          qs('#plantForm',root).addEventListener('submit', async e=>{
            e.preventDefault();
            const file = qs('#recordPhoto',root).files[0];
            let photo = null;
            if (file) {
              try { photo = await compressImage(file,800,.72); }
              catch { return toast('사진을 처리하지 못했습니다. 다른 사진을 선택해주세요.','error'); }
            }
            plantSeed(index,seedId,text.value.trim(),photo);
          });
        });
    }

    function plantSeed(index,seedId,text,photo){
      const inv = state.inventory[seedId];
      if (!inv || inv.qty < 1) return toast('보유 씨앗이 부족합니다.','error');
      inv.qty -= 1;
      const seed = seedMap[seedId];
      state.plots[index] = {
        id:uid('plant'), seedId, stage:1, status:'growing', plantedAt:now(), stageEndsAt:now()+stageDurationMs(seed),
        record:{ text:text||'', photo:photo||null }
      };
      logEvent('plant_seed',{index,seedId});
      saveState();
      closeModal();
      toast(`${seed.name} 씨앗을 심었습니다.`);
      renderGarden();
    }

    function openPlantDetail(index){
      updateGrowth();
      const plot = state.plots[index];
      const seed = seedMap[plot.seedId];
      const remaining = plot.status==='growing' ? Math.max(0,plot.stageEndsAt-now()) : 0;
      const canFertilize = plot.status==='growing';
      openModal(seed.name, `
        <div style="display:grid;justify-items:center;gap:10px">
          <canvas class="pixel-canvas" style="width:150px;height:150px" data-seed="${seed.id}" data-stage="${plot.stage}" data-status="${plot.status}"></canvas>
          <div class="chip-row"><span class="chip">${plantStatusLabel(plot)}</span><span class="chip ${rarityClass(seed.rarity)}">${seed.rarity}</span></div>
          <div style="text-align:center"><strong>${['','발아','새싹','성장 중','개화·결실'][plot.stage]}</strong><div class="helper" style="margin-top:4px">${plot.status==='growing' ? `다음 상태까지 ${formatDuration(remaining)}` : plot.status==='needs_water' ? '물을 주면 다음 단계가 시작됩니다.' : '이제 수확해 도감에 남길 수 있습니다.'}</div></div>
        </div>
        ${plot.record?.text || plot.record?.photo ? `<div class="panel section" style="margin-top:16px;box-shadow:none"><strong>심을 때 남긴 기록</strong>${plot.record.photo?`<img class="record-thumb" src="${plot.record.photo}" alt="정원 기록" />`:''}${plot.record.text?`<p class="helper" style="font-size:13px;color:var(--ink)">${escapeHtml(plot.record.text)}</p>`:''}</div>`:''}
        <div class="button-row" style="margin-top:16px">
          ${plot.status==='needs_water'?'<button class="btn" id="waterOne">💧 물주기</button>':''}
          ${plot.status==='complete'?'<button class="btn" id="harvestOne">✨ 수확하기</button>':''}
          ${canFertilize?`<button class="btn secondary" id="smallFertilizer" ${state.fertilizers.small<1?'disabled':''}>작은 비료 10분 (${state.fertilizers.small})</button><button class="btn secondary" id="goodFertilizer" ${state.fertilizers.good<1?'disabled':''}>좋은 비료 30분 (${state.fertilizers.good})</button>`:''}
          <button class="btn ghost" id="removePlant">식물 제거</button>
        </div>`, root=>{
          hydrateCanvases(root);
          qs('#waterOne',root)?.addEventListener('click',()=>waterPlot(index));
          qs('#harvestOne',root)?.addEventListener('click',()=>harvestPlot(index));
          qs('#smallFertilizer',root)?.addEventListener('click',()=>useFertilizer(index,'small',10));
          qs('#goodFertilizer',root)?.addEventListener('click',()=>useFertilizer(index,'good',30));
          qs('#removePlant',root)?.addEventListener('click',()=>removePlant(index));
        });
    }

    function waterPlot(index, silent=false){
      const plot = state.plots[index];
      if (!plot || plot.status!=='needs_water') return;
      plot.stage += 1;
      plot.status = 'growing';
      plot.stageEndsAt = now()+stageDurationMs(seedMap[plot.seedId]);
      logEvent('water_plant',{index,seedId:plot.seedId,stage:plot.stage});
      saveState();
      if (!silent) { closeModal(); toast('물을 주었습니다. 다음 성장이 시작됩니다.'); renderGarden(); }
    }
    function waterAll(){
      let count=0;
      state.plots.forEach((p,i)=>{if(p?.status==='needs_water'){waterPlot(i,true);count++;}});
      if(count){saveState();toast(`${count}개의 식물에 물을 주었습니다.`);renderGarden();}
    }
    function useFertilizer(index,type,minutes){
      const plot=state.plots[index];
      if(!plot || plot.status!=='growing') return toast('지금은 비료를 사용할 수 없습니다.','error');
      if(state.fertilizers[type]<1) return toast('보유 비료가 없습니다.','error');
      state.fertilizers[type]-=1;
      const reduce = minutes*60*1000/(state.settings.demoSpeed?DEMO_SCALE:1);
      plot.stageEndsAt=Math.max(now()+400,plot.stageEndsAt-reduce);
      logEvent('fertilizer_used',{index,type,minutes}); saveState(); closeModal(); toast('성장 시간이 단축되었습니다.'); renderGarden();
    }
    function removePlant(index){
      if(!confirm('이 식물을 제거할까요? 사용한 씨앗은 돌아오지 않습니다.')) return;
      const plot=state.plots[index]; state.plots[index]=null; logEvent('plant_removed',{index,seedId:plot.seedId}); saveState(); closeModal(); renderGarden();
    }
    function harvestPlot(index){
      const plot=state.plots[index]; if(!plot || plot.status!=='complete') return;
      const seed=seedMap[plot.seedId];
      const entry=state.collection[seed.id]||{status:'found',harvestCount:0,firstAcquiredAt:plot.plantedAt,firstCompletedAt:null,records:[]};
      entry.status='complete'; entry.harvestCount=(entry.harvestCount||0)+1; entry.firstCompletedAt=entry.firstCompletedAt||now();
      if(plot.record?.text || plot.record?.photo) entry.records.unshift({id:uid('record'),...plot.record,plantedAt:plot.plantedAt,completedAt:now(),source:seed.source});
      state.collection[seed.id]=entry; state.plots[index]=null;
      logEvent('harvest',{index,seedId:seed.id}); saveState(); closeModal(); toast(`${seed.name}을 수확해 도감에 등록했습니다.`); renderGarden();
    }

    function renderInventory(){
      const ownedSeeds=seedCatalog.filter(s=>(state.inventory[s.id]?.qty||0)>0);
      const knownSeeds=seedCatalog.filter(s=>(state.inventory[s.id]?.qty||0)>0 || state.collection[s.id]);
      const totalQty=Object.values(state.inventory).reduce((sum,item)=>sum+(item.qty||0),0);
      const completedCount=Object.values(state.collection).filter(c=>c.status==='complete').length;
      const groupedTypes=['기본','점포','지역','한정'];
      const groupLabels={ '기본':'기본 씨앗', '점포':'점포 씨앗', '지역':'지역 씨앗', '한정':'미션·한정 씨앗' };
      const seedCard=seed=>{
        const inv=state.inventory[seed.id]||{qty:0};
        const collected=state.collection[seed.id];
        const empty=(inv.qty||0)===0;
        const statusText=empty ? (collected?.status==='complete'?'수확 기록':'발견') : `${inv.qty}개`;
        const shopButton=seed.type==='점포' ? `<button class="btn ghost small" data-seed-shops="${seed.id}" type="button">점포 정보</button>` : '';
        return `<div class="item-card ${empty?'empty-inventory':''}">
          <canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="${empty?2:4}"></canvas>
          <div><h4>${escapeHtml(seed.name)}</h4><p>${escapeHtml(seed.source)} · ${escapeHtml(seed.description)}</p><div class="chip-row"><span class="chip">${seed.type}</span><span class="chip ${rarityClass(seed.rarity)}">${seed.rarity}</span><span class="chip">${seed.totalMinutes}분</span></div></div>
          <div style="display:grid;gap:7px;justify-items:end"><div class="qty">${statusText}</div>${shopButton}</div>
        </div>`;
      };
      const groupedHtml=knownSeeds.length?groupedTypes.map(type=>{
        const groupItems=knownSeeds.filter(seed=>seed.type===type);
        if(!groupItems.length)return '';
        const ownedCount=groupItems.filter(seed=>(state.inventory[seed.id]?.qty||0)>0).length;
        return `<div class="inventory-group">
          <div class="inventory-group-title"><span>${groupLabels[type]}</span><span>${ownedCount}/${groupItems.length}종 보유</span></div>
          <div class="card-list">${groupItems.map(seedCard).join('')}</div>
        </div>`;
      }).join(''):'<div class="empty-state"><strong>보유 씨앗이 없습니다.</strong><p>점포 QR을 스캔해 씨앗을 모아보세요.</p></div>';
      el('inventoryScreen').innerHTML=`
        <div class="section-head"><div><h2>씨앗 인벤토리</h2><p>씨앗 유형은 획득 경로, 희귀도는 수집 가치를 뜻합니다.</p></div><button class="btn secondary small" data-go="explore">점포 탐색</button></div>
        <div class="inventory-summary">
          <div class="stat"><strong>${totalQty}</strong><small>심을 수 있는 씨앗</small></div>
          <div class="stat"><strong>${ownedSeeds.length}</strong><small>보유 종류</small></div>
          <div class="stat"><strong>${completedCount}</strong><small>도감 완성</small></div>
          <div class="stat"><strong>${state.fertilizers.small+state.fertilizers.good}</strong><small>보유 비료</small></div>
        </div>
        <div class="grid-2">
          <div class="panel section"><div class="section-head"><div><h3>씨앗 목록</h3><p>수량이 있는 씨앗은 정원의 빈 칸을 눌러 심을 수 있습니다.</p></div></div>${groupedHtml}</div>
          <div class="stack">
            <div class="panel section"><div class="section-head"><div><h3>비료</h3><p>성장 중인 단계의 시간을 줄입니다.</p></div></div>
              <div class="settings-row"><div><strong>작은 비료</strong><p>현재 단계 10분 단축</p></div><div class="qty">${state.fertilizers.small}</div></div>
              <div class="settings-row"><div><strong>좋은 비료</strong><p>현재 단계 30분 단축</p></div><div class="qty">${state.fertilizers.good}</div></div>
            </div>
            <div class="panel section"><div class="section-head"><div><h3>1차 MVP 씨앗</h3></div></div><div class="helper">기본 2종, 점포 5종, 감천 지역 1종, 3곳·5곳 한정 2종으로 총 10종입니다. 거래·선물·교배·랜덤 뽑기는 포함하지 않았습니다.</div></div>
          </div>
        </div>`;
      hydrateCanvases(el('inventoryScreen'));
      qs('[data-go]',el('inventoryScreen')).addEventListener('click',()=>setActiveTab('explore'));
      qsa('[data-seed-shops]',el('inventoryScreen')).forEach(button=>button.addEventListener('click',()=>openSeedShopDetail(button.dataset.seedShops)));
    }

    function renderExplore(){
      const unique=totalVisitCount();
      const regionGranted=state.grantedRewards.region_gamcheon;
      const reward3=state.grantedRewards.gamcheon_3;
      const reward5=state.grantedRewards.gamcheon_5;
      const sorted=[...shops].sort((a,b)=>{
        const aOwned=(state.collection[a.seedId]||state.inventory[a.seedId])?1:0;
        const bOwned=(state.collection[b.seedId]||state.inventory[b.seedId])?1:0;
        return aOwned-bOwned;
      });
      el('exploreScreen').innerHTML=`
        <div class="section-head"><div><h2>감천 씨앗 지도</h2><p>아직 얻지 못한 씨앗과 미션에 필요한 점포를 먼저 보여줍니다. 지도는 관광객에게 다음 방문 이유를 제안하는 화면입니다.</p></div></div>
        <div class="mission-strip" style="margin-bottom:14px">
          <div class="mission ${regionGranted?'done':''}"><strong>${regionGranted?'✓ ':''}지역 첫 방문</strong><span class="helper">감천 바람꽃 · ${regionGranted?'지급 완료':'첫 점포에서 지급'}</span></div>
          <div class="mission ${reward3?'done':''}"><strong>${reward3?'✓ ':''}서로 다른 3곳</strong><span class="helper">골목빛꽃 · ${Math.min(unique,3)}/3</span></div>
          <div class="mission ${reward5?'done':''}"><strong>${reward5?'✓ ':''}서로 다른 5곳</strong><span class="helper">바다별꽃 · ${Math.min(unique,5)}/5</span></div>
        </div>
        <div class="panel section" style="margin-bottom:14px">
          <div class="section-head"><div><h3>가상 감천 씨앗 지도</h3><p>씨앗 아이콘을 누르면 해당 점포와 받을 수 있는 씨앗 정보를 확인할 수 있습니다.</p></div></div>
          ${renderVirtualSeedMap(sorted)}
        </div>
        ${state.auth.managed?`<div class="panel section" style="margin-bottom:14px">
          <div class="section-head"><div><h3>매장 QR 보상 테스트</h3><p>실제 현장에서는 매장 내부 QR을 스캔합니다. 여기서는 운영 테스트용 점포 코드를 입력하거나 카드의 테스트 버튼을 누르세요.</p></div></div>
          <form id="scanForm" class="button-row"><input id="shopCode" style="flex:1;min-width:190px" placeholder="운영 테스트 코드 입력" /><button class="btn" type="submit">QR 보상 확인</button></form>
        </div>`:''}
        <div class="shop-grid">${sorted.map(shop=>shopCard(shop)).join('')}</div>`;
      hydrateCanvases(el('exploreScreen'));
      el('scanForm')?.addEventListener('submit',e=>{e.preventDefault();processShopCode(el('shopCode').value)});
      qsa('[data-map-shop]',el('exploreScreen')).forEach(b=>b.addEventListener('click',()=>openMapSeedDetail(b.dataset.mapShop)));
      qsa('[data-scan-shop]',el('exploreScreen')).forEach(b=>b.addEventListener('click',()=>processShopCode(b.dataset.scanShop)));
      qsa('[data-shop-detail]',el('exploreScreen')).forEach(b=>b.addEventListener('click',()=>openShopDetail(b.dataset.shopDetail)));
    }
    function renderVirtualSeedMap(items){
      return `<div class="seed-map" aria-label="가상 감천 씨앗 지도">
        <div class="map-label">감천 씨앗길</div>
        <span class="map-lane one"></span><span class="map-lane two"></span>
        ${items.map(shop=>{
          const status=state.shopStatuses[shop.id]||shop.status;
          const visited=state.visits.some(v=>v.shopId===shop.id);
          const seed=seedMap[shop.seedId];
          return `<button class="map-pin ${visited?'visited':''} ${status!=='active'?'paused':''}" style="left:${shop.mapX}%;top:${shop.mapY}%" data-map-shop="${shop.id}" type="button" title="${escapeHtml(shop.name)}">
            ${visited?'<span class="pin-check">✓</span>':''}
            <canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas>
            <strong>${escapeHtml(seed.name)}</strong>
            <small>${visited?'방문 완료':status==='active'?'받을 수 있음':'중지'}</small>
          </button>`;
        }).join('')}
      </div>`;
    }
    function shopCard(shop){
      const status=state.shopStatuses[shop.id]||shop.status;
      const visited=state.visits.some(v=>v.shopId===shop.id);
      const seed=seedMap[shop.seedId];
      return `<div class="shop-card ${status!=='active'?'paused':''}">
        <div class="shop-title"><div><h3>${escapeHtml(shop.name)}</h3><p>${escapeHtml(shop.category)} · ${escapeHtml(shop.hours)}</p></div><span class="chip">${status==='active'?'운영 중':'보상 중지'}</span></div>
        <p class="helper" style="margin:0">${escapeHtml(shop.summary)}</p>
        <div class="shop-seed"><canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas><div><strong>${escapeHtml(seed.name)}</strong><div class="helper">${visited?'방문 기록 있음':'아직 미방문'} · ${seed.rarity}</div></div></div>
        <div class="button-row">${state.auth.managed?`<button class="btn small" data-scan-shop="${shop.code}" ${status!=='active'?'disabled':''}>QR 스캔 테스트</button>`:''}<button class="btn ghost small" data-shop-detail="${shop.id}">상세 보기</button></div>
      </div>`;
    }
    function processShopCode(raw){
      if(!state.auth.managed) return requestPin();
      const code=String(raw||'').trim().toUpperCase();
      const shop=shops.find(s=>s.code===code);
      if(!shop) return toast('등록된 점포 QR 코드가 아닙니다.','error');
      if((state.shopStatuses[shop.id]||shop.status)!=='active') return toast('현재 보상이 중지된 점포입니다.','error');
      const day=todayKey();
      const dailyKey=`${shop.id}_${day}`;
      if(state.dailyRewards[dailyKey]) return toast('이 점포의 오늘 보상은 이미 받았습니다.','error');
      state.dailyRewards[dailyKey]=true;
      state.visits.push({id:uid('visit'),shopId:shop.id,at:now(),day});
      addInventory(shop.seedId,1,shop.name);
      const newly=[];
      if(!state.grantedRewards.region_gamcheon){state.grantedRewards.region_gamcheon=true;addInventory('gamcheonwind',1,'감천 지역 첫 방문');newly.push('감천 바람꽃');}
      const unique=totalVisitCount();
      if(unique>=3&&!state.grantedRewards.gamcheon_3){state.grantedRewards.gamcheon_3=true;addInventory('alleyglow',1,'감천 3곳 미션');newly.push('골목빛꽃');}
      if(unique>=5&&!state.grantedRewards.gamcheon_5){state.grantedRewards.gamcheon_5=true;addInventory('seastar',1,'감천 5곳 미션');newly.push('바다별꽃');}
      logEvent('shop_qr_reward',{shopId:shop.id,seedId:shop.seedId,bonus:newly}); saveState();
      toast(`${shop.name} 씨앗을 받았습니다.${newly.length?` 추가 보상: ${newly.join(', ')}`:''}`); renderExplore();
    }
    function openMapSeedDetail(shopId){
      const shop=shops.find(s=>s.id===shopId); const seed=seedMap[shop.seedId];
      const status=state.shopStatuses[shop.id]||shop.status;
      const visited=state.visits.some(v=>v.shopId===shop.id);
      openModal(seed.name,`<div class="stack">
        <div class="seed-preview"><canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas><div><strong>${escapeHtml(shop.name)}</strong><div class="helper">${visited?'이미 방문한 점포입니다.':'이 점포에서 씨앗을 받을 수 있습니다.'}</div></div></div>
        <div><span class="chip">${escapeHtml(shop.category)}</span><span class="chip ${rarityClass(seed.rarity)}">${escapeHtml(seed.rarity)}</span><h3 style="margin:10px 0 4px">${escapeHtml(shop.summary)}</h3><p class="helper">${escapeHtml(shop.address)} · ${escapeHtml(shop.hours)}</p></div>
        <div class="notice">${status==='active'?'현장에 도착해 점포 QR을 스캔하면 씨앗을 받을 수 있어요.':'현재 이 점포의 씨앗 보상은 중지되어 있습니다.'}</div>
        <div class="button-row"><a class="btn" style="text-decoration:none" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.mapQuery)}">지도 보기</a><button class="btn ghost" data-open-shop="${shop.id}" type="button">점포 상세</button></div>
      </div>`,root=>{
        hydrateCanvases(root);
        qs('[data-open-shop]',root)?.addEventListener('click',()=>openShopDetail(shop.id));
        qs('[data-scan-shop]',root)?.addEventListener('click',()=>{closeModal();processShopCode(shop.code);});
      });
    }
    function openShopDetail(shopId){
      const shop=shops.find(s=>s.id===shopId); const seed=seedMap[shop.seedId];
      openModal(shop.name,`<div class="stack">
        <div><span class="chip">${escapeHtml(shop.category)}</span><h3 style="margin:10px 0 4px">${escapeHtml(shop.summary)}</h3><p class="helper">${escapeHtml(shop.address)} · ${escapeHtml(shop.hours)}</p></div>
        <div class="seed-preview"><canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas><div><strong>제공 씨앗: ${escapeHtml(seed.name)}</strong><div class="helper">${escapeHtml(seed.description)}</div></div></div>
        <div class="notice">점포 QR은 실제 구매나 매출이 아니라 보상 참여 지표로 기록됩니다.</div>
        <div class="button-row"><a class="btn" style="text-decoration:none" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.mapQuery)}">외부 지도 길찾기</a><a class="btn secondary" style="text-decoration:none" target="_blank" rel="noopener" href="${shop.instagram}">공식 SNS</a></div>
      </div>`,root=>hydrateCanvases(root));
    }
    function shopsForSeed(seedId){ return shops.filter(shop=>shop.seedId===seedId); }
    function seedShopInfoHtml(seedId){
      const related=shopsForSeed(seedId);
      if(!related.length) return '';
      return `<div class="stack">
        ${related.map(shop=>`<div class="panel section" style="box-shadow:none">
          <div class="section-head"><div><h3>${escapeHtml(shop.name)}</h3><p>${escapeHtml(shop.summary)}</p></div><span class="chip">${escapeHtml(shop.category)}</span></div>
          <div class="settings-row"><div><strong>위치</strong><p>${escapeHtml(shop.address)}</p></div><span>${escapeHtml(shop.category)}</span></div>
          <div class="settings-row"><div><strong>운영 시간</strong><p>${escapeHtml(shop.hours)}</p></div><span>${(state.shopStatuses[shop.id]||shop.status)==='active'?'운영':'중지'}</span></div>
          <div class="button-row"><a class="btn small" style="text-decoration:none" target="_blank" rel="noopener" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(shop.mapQuery)}">지도 보기</a><button class="btn ghost small" data-open-shop="${shop.id}" type="button">점포 상세</button></div>
        </div>`).join('')}
      </div>`;
    }
    function openSeedShopDetail(seedId){
      const seed=seedMap[seedId];
      openModal(`${seed.name} 획득 점포`,`<div class="stack">
        <div class="seed-preview"><canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4"></canvas><div><strong>${escapeHtml(seed.name)}</strong><div class="helper">${escapeHtml(seed.description)}</div></div></div>

    function renderCollection(){
      const collectionCard=seed=>{
        const c=state.collection[seed.id];
        const status=c?.status||'unknown';
        const hidden=status==='unknown';
        const latest=c?.records?.[0];
        const related=shopsForSeed(seed.id);
        return `<button class="collection-card ${hidden?'unknown':''}" data-collection="${seed.id}" style="text-align:left;border:1px solid var(--line)">
          <canvas class="pixel-canvas" data-seed="${seed.id}" data-stage="4" data-silhouette="${hidden?'1':'0'}"></canvas>
          <h4>${hidden?'아직 만나지 못한 씨앗':escapeHtml(seed.name)}</h4>
          <p>${hidden?'점포 탐색에서 획득처를 확인하세요':status==='complete'?`완성 · 수확 ${c.harvestCount}회`:'발견 · 수확 전'}</p>
          ${related.length?`<p>${escapeHtml(related.map(shop=>shop.name).join(' · '))}</p>`:''}
          ${latest?.photo && state.auth.managed?`<img class="record-thumb" src="${latest.photo}" alt="정원 기록" />`:''}
        </button>`;
      };
      const groupTypes=['기본','점포','지역','한정'];
      const groupLabels={ '기본':'일반 씨앗', '점포':'점포 씨앗', '지역':'지역 씨앗', '한정':'미션·한정 씨앗' };
      if(!groupTypes.includes(activeCollectionType)) activeCollectionType='기본';
      const categoryTabs=groupTypes.map(type=>{
        const seeds=seedCatalog.filter(seed=>seed.type===type);
        const done=seeds.filter(seed=>state.collection[seed.id]?.status==='complete').length;
        const foundCount=seeds.filter(seed=>state.collection[seed.id]?.status==='found').length;
        return `<button class="category-tab ${activeCollectionType===type?'active':''}" data-collection-type="${type}" type="button">
          <strong>${groupLabels[type]}</strong>
          <span>완성 ${done} · 발견 ${foundCount} · 전체 ${seeds.length}</span>
        </button>`;
      }).join('');
      const activeSeeds=seedCatalog.filter(seed=>seed.type===activeCollectionType);
      const activeComplete=activeSeeds.filter(seed=>state.collection[seed.id]?.status==='complete').length;
      const activeFound=activeSeeds.filter(seed=>state.collection[seed.id]?.status==='found').length;
      const activeCards=`<div class="inventory-group">
          <div class="inventory-group-title"><span>${groupLabels[activeCollectionType]} 도감</span><span>완성 ${activeComplete} · 발견 ${activeFound} · 전체 ${activeSeeds.length}</span></div>
          <div class="collection-grid">${activeSeeds.map(collectionCard).join('')}</div>
        </div>`;
      const complete=Object.values(state.collection).filter(c=>c.status==='complete').length;
      const found=Object.values(state.collection).filter(c=>c.status==='found').length;
      el('collectionScreen').innerHTML=`
        <div class="section-head"><div><h2>나의 식물 도감</h2><p>씨앗을 얻은 장소, 수확 기록, 개인 여행 메모가 함께 쌓입니다. 개인 기록은 관리 모드에서만 보입니다.</p></div></div>
        <div class="garden-stats" style="margin-bottom:14px"><div class="stat"><strong>${complete}</strong><small>완성</small></div><div class="stat"><strong>${found}</strong><small>발견</small></div><div class="stat"><strong>${seedCatalog.length-complete-found}</strong><small>미발견</small></div></div>
        <div class="category-tabs">${categoryTabs}</div>
        ${activeCards}`;
      hydrateCanvases(el('collectionScreen'));
      qsa('[data-collection-type]',el('collectionScreen')).forEach(button=>button.addEventListener('click',()=>{activeCollectionType=button.dataset.collectionType;renderCollection();}));
      qsa('[data-collection]',el('collectionScreen')).forEach(b=>b.addEventListener('click',()=>openCollectionDetail(b.dataset.collection)));
    }
    function openCollectionDetail(seedId){
      const seed=seedMap[seedId], c=state.collection[seedId];
      const shopInfo=seedShopInfoHtml(seedId);
      if(!c) return openModal('미발견 씨앗',`<div class="stack"><div class="empty-state"><canvas class="pixel-canvas" style="width:120px;height:120px" data-seed="${seed.id}" data-stage="4" data-silhouette="1"></canvas><strong>아직 만나지 못한 씨앗입니다.</strong><p>${escapeHtml(seed.source)}에서 획득할 수 있습니다.</p></div>${shopInfo?`<h4>획득 가능한 점포</h4>${shopInfo}`:''}</div>`,root=>{hydrateCanvases(root);qsa('[data-open-shop]',root).forEach(button=>button.addEventListener('click',()=>openShopDetail(button.dataset.openShop)));});

      openModal(seed.name,`<div style="display:grid;justify-items:center"><canvas class="pixel-canvas" style="width:150px;height:150px" data-seed="${seed.id}" data-stage="4"></canvas><div class="chip-row"><span class="chip">${seed.type}</span><span class="chip ${rarityClass(seed.rarity)}">${seed.rarity}</span></div></div>
        <div class="story-strip">
          <div class="story-card"><strong>획득 장소</strong><p class="helper">${escapeHtml(seed.source)}</p></div>
          <div class="story-card"><strong>처음 만난 날</strong><p class="helper">${formatDate(c.firstAcquiredAt)}</p></div>
          <div class="story-card"><strong>수확 기록</strong><p class="helper">${c.harvestCount||0}회 · ${formatDate(c.firstCompletedAt)}</p></div>

        <h4>성장 기록</h4><div class="stack">${records}</div>`,root=>{
          hydrateCanvases(root);
          qsa('[data-open-shop]',root).forEach(button=>button.addEventListener('click',()=>openShopDetail(button.dataset.openShop)));
        });
    }

      state.linkedDesigns.push(design.designId); state.activeTheme=design.theme; addInventory(design.seedId,1,`${design.name} 연결 보상`); logEvent('key_linked',{code,designId:design.designId,theme:design.theme});saveState();toast(`${design.name}을 연결하고 테마를 적용했습니다.`);renderHome();renderChrome();
    }
    function applyDemoGamcheonKey(){
      applyDemoKey('GMCH2026');
    }
    function applyDemoArtistKey(){
      applyDemoKey('ARTST001');
    }
    function applyDemoKey(code){
      if(!state.auth.managed)return requestPin();
      const design=keyDesigns[code];
      const alreadyLinked=state.linkedDesigns.includes(design.designId);
      if(!alreadyLinked){
        state.linkedDesigns.push(design.designId);
        addInventory(design.seedId,1,`${design.name} 테스트 연결 보상`);
        logEvent('key_linked_demo',{code,designId:design.designId,theme:design.theme});
      }
      state.activeTheme=design.theme;
      saveState();
      renderHome();
      renderChrome();

    }
    function applyKeyTheme(designId){
      if(!state.auth.managed)return requestPin();
      const design=Object.values(keyDesigns).find(key=>key.designId===designId);
      if(!design || !state.linkedDesigns.includes(design.designId))return toast('연결된 정원키만 테마로 적용할 수 있습니다.','error');
      state.activeTheme=design.theme;
      logEvent('theme_applied',{designId:design.designId,theme:design.theme});
      saveState();
      renderHome();
      renderChrome();
      toast(`${design.themeName}를 적용했습니다.`);
    }

    function toggleSpeed(){
      const old=state.settings.demoSpeed; state.settings.demoSpeed=!old;
      // 진행 중인 타이머는 남은 비율을 보존
      state.plots.forEach(p=>{if(p?.status==='growing'){const seed=seedMap[p.seedId];const oldDur=seed.totalMinutes*60*1000/4/(old?DEMO_SCALE:1);const newDur=seed.totalMinutes*60*1000/4/(state.settings.demoSpeed?DEMO_SCALE:1);const ratio=Math.max(0,(p.stageEndsAt-now())/oldDur);p.stageEndsAt=now()+newDur*ratio;}});
      logEvent('speed_mode_changed',{demoSpeed:state.settings.demoSpeed});saveState();toast(state.settings.demoSpeed?'테스트 속도로 전환했습니다.':'실제 성장 시간으로 전환했습니다.');renderAdmin();renderChrome();
    }

    function downloadFile(name,content,type){const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);}

    function rarityClass(r){return r==='희귀'?'rare':r==='특별'?'special':r==='전설'?'legend':'';}
    function compressImage(file,maxSize=800,quality=.72){
      return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onerror=reject;reader.onload=()=>{const img=new Image();img.onerror=reject;img.onload=()=>{let w=img.width,h=img.height;if(Math.max(w,h)>maxSize){const s=maxSize/Math.max(w,h);w=Math.round(w*s);h=Math.round(h*s);}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',quality));};img.src=reader.result;};reader.readAsDataURL(file);});
    }
