<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 안심태그</title>
<style>
:root{--bg:#111;--card:#171717;--line:#7a6040;--gold:#e6c88f;--gold2:#c7a05d;--text:#f6ead4;--muted:#b7a88f}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#222 0,#111 42%,#0b0b0b 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
.wrap{max-width:520px;margin:0 auto;padding:28px 18px}
.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#181818,#101010);padding:26px 20px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.brand{text-align:center;margin-bottom:24px}.logo{font-family:serif;font-size:34px;letter-spacing:.18em;color:var(--gold)}.slogan{margin-top:8px;color:var(--muted);font-size:14px}
.main-title{text-align:center;font-size:24px;font-weight:800;line-height:1.35;margin:8px 0}.sub{text-align:center;color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:22px}
.btn,.call-btn{display:block;width:100%;margin-top:12px;padding:18px;border-radius:18px;text-decoration:none;text-align:center;color:#111;background:linear-gradient(135deg,#f0d9a4,#c79a4f);font-weight:800;border:0;font-size:16px;cursor:pointer}
.call-btn.secondary,.btn.sub{color:var(--gold);background:#111;border:1px solid var(--gold2)}
.section-title{display:flex;align-items:center;justify-content:center;gap:12px;color:var(--gold);margin:26px 0 14px;font-weight:800}
.section-title:before,.section-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line))}
.section-title:after{background:linear-gradient(90deg,var(--line),transparent)}
.info{border:1px solid rgba(230,200,143,.35);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.03)}
.row{display:grid;grid-template-columns:115px 1fr;gap:12px;padding:15px;border-bottom:1px solid rgba(230,200,143,.18)}
.row:last-child{border-bottom:0}.label{color:var(--gold);font-weight:700}.value{color:var(--text);line-height:1.55;white-space:pre-line}
.thanks{margin-top:18px;padding:18px;border:1px solid var(--line);border-radius:18px;text-align:center;color:var(--gold);font-size:18px;font-weight:800}.small{margin-top:8px;color:var(--muted);font-size:13px;font-weight:400}
.footer{text-align:center;margin-top:20px;color:var(--muted);font-size:12px;letter-spacing:.18em}.loading,.error{text-align:center;color:var(--muted);padding:70px 20px}
input,textarea,select{width:100%;margin:7px 0 13px;padding:14px;border-radius:14px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:15px}
textarea{min-height:86px;resize:vertical}label{display:block;color:var(--gold);font-size:13px;margin-top:6px}.edit-group{border:1px solid rgba(230,200,143,.25);border-radius:16px;padding:14px;margin-top:12px}
.hidden{display:none}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.lang-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:#111;color:var(--muted);font-size:13px;cursor:pointer}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(230,200,143,.1)}
</style>
</head>
<body>
<div class="wrap"><div id="app" class="card"><div class="loading">불러오는 중입니다...</div></div></div>
<script>
const API_URL='https://script.google.com/macros/s/AKfycbyhOt-UJ_lZ8Upyw9ZvGKCNT0B2BEM3asnwOuI9_q7GsHHCYglWkPYmgPoz7FvNcNua/exec';
const params=new URLSearchParams(location.search);
const CODE=params.get('code')||'CD-0001';
const MODE=params.get('mode')||'view';
let QR_DATA=null;
let currentLang=localStorage.getItem('saegim_lang')||'ko';
const app=document.getElementById('app');

// ── API ────────────────────────────────────────────────────
async function apiGet(action,extra={}){
  const url=API_URL+'?action='+action+'&code='+encodeURIComponent(CODE)+Object.entries(extra).map(([k,v])=>'&'+k+'='+encodeURIComponent(v)).join('');
  const r=await fetch(url);return r.json();
}
async function apiPost(payload){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  return r.json();
}

// ── 데이터 로드 ────────────────────────────────────────────
async function loadData(){
  try{
    const data=await apiGet('getQrData');
    QR_DATA=data;
    if(MODE==='edit'){renderPassword();return;}
    renderView(data);
  }catch(e){renderError('데이터를 불러오지 못했습니다.');}
}

// ── 공통 UI ───────────────────────────────────────────────
function brand(){
  return`<div class="brand"><div class="logo">SAEGIM</div><div class="slogan">기억을 새기다 · 마음을 잇다</div></div>`;
}
function infoRow(label,value){
  return`<div class="row"><div class="label">${esc(label)}</div><div class="value">${value&&String(value).includes('<a ')?value:esc(value)}</div></div>`;
}
function thanks(){
  return`<div class="thanks">도움을 주셔서 감사합니다.<div class="small">따뜻한 관심과 배려에 감사드립니다.</div></div>`;
}
function editBtn(){
  return`<a class="btn sub" href="?code=${encodeURIComponent(CODE)}&mode=edit">정보 수정하기</a>`;
}
function renderLinkButtons(links){
  if(!links||!links.length)return'<div class="sub">등록된 연결 항목이 없습니다.</div>';
  return links.map(l=>{
    if(!l||!l.url)return'';
    let href=l.url;
    if(l.type==='전화'&&!href.startsWith('tel:'))href='tel:'+href.replace(/[^0-9+]/g,'');
    return`<a class="call-btn" href="${esc(href)}">${esc(l.label||l.type||'연락하기')}</a>`;
  }).join('');
}

// ── 라우팅 ─────────────────────────────────────────────────
function renderView(data){
  if(data.status==='미등록'){renderInactive();return;}
  if(data.status==='판매완료'){renderRegister(data);return;}
  if(data.status==='중지'){renderStopped();return;}
  // 등록 안 된 CD 방어 처리
  if(!data.child_name&&!data.owner){renderRegister(data);return;}
  renderCare(data);
}

// ── CD 보기 화면 ───────────────────────────────────────────
function renderCare(data){
  app.innerHTML=`
    ${brand()}
    <div class="main-title">보호 중인 분을 발견하셨나요?</div>
    <div class="sub">아래 연결 항목으로 연락 부탁드립니다.</div>
    ${renderLinkButtons(data.links||[])}
    <div class="section-title">정보</div>
    <div class="info">
      ${infoRow('이름',data.child_name||data.owner||'-')}
      ${infoRow('보호자',data.guardian_name||'-')}
      ${infoRow('특이사항',data.child_note||'-')}
      ${infoRow('알레르기·질환',data.child_allergy||'-')}
      ${infoRow('혈액형',data.blood_type||'-')}
      ${infoRow('안내 메시지',data.child_message||'-')}
    </div>
    ${thanks()}
    ${editBtn()}
    <div class="footer">SAEGIM · ANSIM QR</div>`;
}

// ── 미등록 / 중지 ──────────────────────────────────────────
function renderInactive(){
  app.innerHTML=`
    ${brand()}
    <div class="main-title">아직 등록되지 않은 QR입니다</div>
    <div class="sub">제품 구매 또는 판매처 등록 후 사용할 수 있습니다.</div>
    <div class="footer">SAEGIM QR</div>`;
}
function renderStopped(){
  app.innerHTML=`
    ${brand()}
    <div class="main-title">사용이 중지된 QR입니다</div>
    <div class="sub">현재 이 QR은 비활성화 상태입니다.</div>
    <div class="footer">SAEGIM QR</div>`;
}

// ── 최초 등록 ──────────────────────────────────────────────
function renderRegister(data){
  const d=data||{};
  app.innerHTML=`
    ${brand()}
    <div class="main-title">최초 등록</div>
    <div class="sub">📦 안심태그(CD)<br>아래 정보를 입력하고 비밀번호를 설정해주세요.</div>
    <label>아이 이름</label>
    <input id="child_name" class="input" placeholder="아이 이름" value="${esc(d.child_name||'')}">
    <label>보호자 연락처</label>
    <input id="guardian_phone" class="input" placeholder="보호자 연락처" value="${esc(d.guardian_phone||'')}">
    <label>알레르기·질환 정보</label>
    <textarea id="child_allergy" class="input" placeholder="예)&#10;땅콩 알레르기&#10;간질&#10;자폐 스펙트럼&#10;천식">${esc(d.child_allergy||'')}</textarea>
    <label>혈액형</label>
    <select id="blood_type" class="input">
      <option value="">선택</option>
      ${['A','B','O','AB','RH-'].map(v=>`<option value="${v}" ${d.blood_type===v?'selected':''}>${v}형</option>`).join('')}
    </select>
    <label>특이사항</label>
    <textarea id="child_note" class="input" placeholder="예)&#10;말을 잘 하지 못함&#10;큰 소리에 민감함&#10;낯선 사람을 무서워함">${esc(d.child_note||'')}</textarea>
    <label>보호자 이름</label>
    <input id="guardian_name" class="input" placeholder="보호자 이름" value="${esc(d.guardian_name||'')}">
    <label>발견자에게 전달 메시지</label>
    <textarea id="child_message" class="input" placeholder="안녕하세요.&#10;보호 중인 아이입니다.&#10;QR을 스캔해 주셔서 감사합니다.&#10;아래 연락처로 연락 부탁드립니다.">${esc(d.child_message||'')}</textarea>
    <div id="linksEdit">${editLinks([{type:'전화',label:'',url:''}])}</div>
    <hr>
    <input id="new_password" class="input" type="password" placeholder="사용할 비밀번호 설정 (4자 이상)">
    <button class="btn" onclick="registerFirst()">등록 완료</button>`;
}

// ── 비밀번호 확인 & 수정 ───────────────────────────────────
function renderPassword(){
  app.innerHTML=`
    ${brand()}
    <div class="main-title">정보 수정하기</div>
    <div class="sub">등록된 비밀번호를 입력해주세요.</div>
    <input id="pw" type="password" placeholder="비밀번호">
    <button class="btn" onclick="checkPassword()">확인</button>
    <a class="btn sub" href="?code=${encodeURIComponent(CODE)}">돌아가기</a>`;
}
async function checkPassword(){
  const password=document.getElementById('pw').value.trim();
  if(!password){alert('비밀번호를 입력해주세요.');return;}
  const r=await apiGet('verifyPassword',{code:CODE,password});
  if(!r.success){alert(r.message||'비밀번호가 일치하지 않습니다.');return;}
  renderCdEditForm(password);
}
function renderCdEditForm(password){
  const d=QR_DATA;
  app.innerHTML=`
    ${brand()}
    <div class="main-title">정보 수정</div>
    <input id="password" type="hidden" value="${esc(password)}">
    <div class="section-title">기본 정보</div>
    <label>표시 이름</label><input id="owner" value="${esc(d.owner||'')}">
    <label>이름</label><input id="child_name" value="${esc(d.child_name||'')}">
    <label>보호자 연락처</label><input id="guardian_phone" value="${esc(d.guardian_phone||'')}">
    <label>알레르기·질환</label><textarea id="child_allergy" placeholder="예)&#10;땅콩 알레르기&#10;간질&#10;자폐 스펙트럼&#10;천식">${esc(d.child_allergy||'')}</textarea>
    <label>혈액형</label><select id="blood_type">
      <option value="">선택</option>
      ${['A','B','O','AB','RH-'].map(v=>`<option value="${v}" ${d.blood_type===v?'selected':''}>${v}형</option>`).join('')}
    </select>
    <label>특이사항</label><textarea id="child_note" placeholder="예)&#10;말을 잘 하지 못함&#10;큰 소리에 민감함&#10;낯선 사람을 무서워함">${esc(d.child_note||'')}</textarea>
    <label>보호자</label><input id="guardian_name" value="${esc(d.guardian_name||'')}">
    <label>안내 메시지</label><textarea id="child_message" placeholder="안녕하세요.&#10;보호 중인 아이입니다.">${esc(d.child_message||'')}</textarea>
    <div class="section-title">연결 항목</div>
    <div id="linksEdit">${editLinks(d.links||[])}</div>
    <button class="btn" onclick="saveEdit()">저장하기</button>
    <a class="btn sub" href="?code=${encodeURIComponent(CODE)}">취소</a>`;
}

// ── 연결 항목 편집 ─────────────────────────────────────────
const LINK_TYPES=['전화','카카오','인스타그램','이메일','홈페이지','지도','왓츠앱','라인','텔레그램','기타'];
function editLinks(links){
  let arr=(links||[]).filter(l=>l&&(l.label||l.url||l.type));
  if(!arr.length)arr=[{type:'전화',label:'',url:''}];
  arr=arr.slice(0,5);
  return`${arr.map((l,i)=>linkEditBox(l,i,arr.length)).join('')}
    ${arr.length<5?`<button class="btn sub" onclick="addLinkItem()">항목 추가</button>`:''}`;
}
function linkEditBox(l,i,total){
  return`
    <div class="edit-group link-edit">
      <label>종류</label>
      <select id="link${i}_type">${LINK_TYPES.map(t=>`<option value="${esc(t)}" ${String(l.type||'전화')===t?'selected':''}>${esc(t)}</option>`).join('')}</select>
      <label>버튼 이름</label>
      <input id="link${i}_label" value="${esc(l.label||'')}">
      <label>연결 주소</label>
      <input id="link${i}_url" value="${esc(String(l.url||'').replace(/^tel:/,''))}">
      ${total>1?`<button class="btn sub" onclick="removeLinkItem(${i})">항목 제거</button>`:''}
    </div>`;
}
function collectLinksRaw(){
  return Array.from(document.querySelectorAll('.link-edit')).map((g,i)=>({
    type:val('link'+i+'_type')||'전화',label:val('link'+i+'_label'),url:val('link'+i+'_url')
  }));
}
function collectLinks(){
  return collectLinksRaw().filter(l=>l.url).map(l=>{
    if(l.type==='지도'&&!l.url.startsWith('http'))
      return{...l,label:l.label||l.url,url:'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(l.url)};
    return l;
  }).slice(0,5);
}
function addLinkItem(){
  const links=collectLinksRaw();
  if(links.length>=5){alert('최대 5개까지 가능합니다.');return;}
  links.push({type:'전화',label:'',url:''});
  document.getElementById('linksEdit').innerHTML=editLinks(links);
}
function removeLinkItem(index){
  const links=collectLinksRaw();
  links.splice(index,1);
  document.getElementById('linksEdit').innerHTML=editLinks(links.length?links:[{type:'전화',label:'',url:''}]);
}

// ── 등록 & 저장 ────────────────────────────────────────────
async function registerFirst(){
  const pw=val('new_password');
  if(!pw||pw.length<4){alert('비밀번호를 4자 이상 입력해주세요.');return;}
  const links=collectLinks();
  const form={
    action:'registerSoldQr',code:CODE,password:pw,
    owner:val('owner'),links:JSON.stringify(links),
    child_name:val('child_name'),guardian_name:val('guardian_name'),
    guardian_phone:val('guardian_phone'),child_note:val('child_note'),
    child_allergy:val('child_allergy'),blood_type:val('blood_type'),
    child_message:val('child_message')
  };
  const r=await apiPost(form);
  if(!r.success){alert(r.message||'등록 실패');return;}
  alert('등록이 완료되었습니다!');
  location.href='?code='+encodeURIComponent(CODE);
}
async function saveEdit(){
  const links=collectLinks();
  const form={
    action:'updateCustomerData',code:CODE,password:val('password'),
    owner:val('owner'),links:JSON.stringify(links),
    child_name:val('child_name'),guardian_name:val('guardian_name'),
    guardian_phone:val('guardian_phone'),child_note:val('child_note'),
    child_allergy:val('child_allergy'),blood_type:val('blood_type'),
    child_message:val('child_message')
  };
  const r=await apiPost(form);
  if(!r.success){alert(r.message||'저장 실패');return;}
  alert('저장되었습니다.');
  location.href='?code='+encodeURIComponent(CODE);
}

// ── 유틸 ───────────────────────────────────────────────────
function val(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
function renderError(msg){app.innerHTML=`<div class="error">${esc(msg)}</div>`;}

loadData();
</script>
</body>
</html>
