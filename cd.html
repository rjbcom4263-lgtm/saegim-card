<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>새김 안심태그</title>
<style>
:root{--bg:#111;--card:#171717;--line:#7a6040;--gold:#e6c88f;--gold2:#c7a05d;--text:#f6ead4;--muted:#b7a88f}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(circle at top,#222 0,#111 42%,#0b0b0b 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif}
.wrap{max-width:520px;margin:0 auto;padding:28px 18px}
.card{border:1px solid var(--line);border-radius:28px;background:linear-gradient(180deg,#181818,#101010);padding:26px 20px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.brand{text-align:center;margin-bottom:24px}.logo{font-family:serif;font-size:34px;letter-spacing:.18em;color:var(--gold)}.slogan{margin-top:8px;color:var(--muted);font-size:14px}
.main-title{text-align:center;font-size:24px;font-weight:800;line-height:1.35;margin:8px 0}.sub{text-align:center;color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:22px}
.btn,.call-btn{display:block;width:100%;margin-top:12px;padding:18px;border-radius:18px;text-decoration:none;text-align:center;color:#111;background:linear-gradient(135deg,#f0d9a4,#c79a4f);font-weight:800;border:0;font-size:16px;cursor:pointer}
.call-btn.secondary,.btn.sub{color:var(--gold);background:#111;border:1px solid var(--gold2)}
.section-title{display:flex;align-items:center;justify-content:center;gap:12px;color:var(--gold);margin:26px 0 14px;font-weight:800}
.section-title:before,.section-title:after{content:"";height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line))}
.section-title:after{background:linear-gradient(90deg,var(--line),transparent)}
.info{border:1px solid rgba(230,200,143,.35);border-radius:18px;overflow:hidden;background:rgba(255,255,255,.03)}
.row{display:grid;grid-template-columns:115px 1fr;gap:12px;padding:15px;border-bottom:1px solid rgba(230,200,143,.18)}
.row:last-child{border-bottom:0}.label{color:var(--gold);font-weight:700}.value{color:var(--text);line-height:1.55;white-space:pre-line}
.thanks{margin-top:18px;padding:18px;border:1px solid var(--line);border-radius:18px;text-align:center;color:var(--gold);font-size:18px;font-weight:800}.small{margin-top:8px;color:var(--muted);font-size:13px;font-weight:400}
.footer{text-align:center;margin-top:20px;color:var(--muted);font-size:12px;letter-spacing:.18em}.loading,.error{text-align:center;color:var(--muted);padding:70px 20px}
input,textarea,select{width:100%;margin:7px 0 13px;padding:14px;border-radius:14px;border:1px solid var(--line);background:#0d0d0d;color:var(--text);font-size:15px}
textarea{min-height:86px;resize:vertical}label{display:block;color:var(--gold);font-size:13px;margin-top:6px}.edit-group{border:1px solid rgba(230,200,143,.25);border-radius:16px;padding:14px;margin-top:12px}
.hidden{display:none}
.lang-bar{display:flex;gap:8px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.lang-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:#111;color:var(--muted);font-size:13px;cursor:pointer}
.lang-btn.active{border-color:var(--gold);color:var(--gold);background:rgba(230,200,143,.1)}
.pw-wrap{position:relative;display:block}
.pw-wrap input{padding-right:50px}
.pw-eye{position:absolute;right:0;top:0;bottom:0;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0 14px;width:auto;display:flex;align-items:center}
.pw-eye:hover{color:var(--gold)}
.btn-link{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;text-decoration:underline;padding:4px 0}
</style>
</head>
<body>
<div class="wrap"><div id="app" class="card"><div class="loading">불러오는 중입니다...</div></div></div>
<script type="module">
import { initializeApp }       from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

// ── Firebase 설정 ──────────────────────────────────────────
const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyA8uBfMGkg9gLiHiqnFh_Klmd0etvk0qQg',
  authDomain:        'saegim-memory.firebaseapp.com',
  projectId:         'saegim-memory',
  storageBucket:     'saegim-memory.firebasestorage.app',
  messagingSenderId: '888229102391',
  appId:             '1:888229102391:web:f4fe41ece07ddacd2a10b2'
};

// ── 고객용 Apps Script (쓰기 전용: 등록/수정/비밀번호 확인) ──
const API_URL = 'https://script.google.com/macros/s/AKfycbzmxP024M5-wG66TaziiiNsgVRpnAcFlEv5eZ96V2kb9py996dD_UUM-PQKItoZ58TA/exec';

const params = new URLSearchParams(location.search);
const CODE   = (params.get('code') || '').trim().toUpperCase();
const MODE   = params.get('mode') || 'view';
let QR_DATA  = null;
const app    = document.getElementById('app');

const fbApp = initializeApp(FIREBASE_CONFIG);
const db    = getFirestore(fbApp);

// ── API 쓰기 헬퍼 (POST only) ─────────────────────────────
async function apiGet(action, extra = {}) {
  const url = API_URL + '?action=' + action + '&code=' + encodeURIComponent(CODE) +
    Object.entries(extra).map(([k, v]) => '&' + k + '=' + encodeURIComponent(v)).join('');
  const r = await fetch(url);
  return r.json();
}
async function apiPost(payload) {
  const r = await fetch(API_URL, {
    method:   'POST',
    headers:  {'Content-Type': 'text/plain'},
    body:     JSON.stringify(payload),
    redirect: 'follow'
  });
  return r.json();
}

// ── Firestore 직접 조회 ────────────────────────────────────
async function loadData() {
  if (!CODE) {
    renderError('QR 코드 정보가 없습니다.\n올바른 QR을 스캔해주세요.');
    return;
  }
  try {
    const snap = await getDoc(doc(db, 'qr_cards', CODE));

    if (!snap.exists()) {
      renderError('등록되지 않은 QR 코드입니다. (' + CODE + ')');
      return;
    }

    const d = snap.data();

    // link1~5 개별 필드 → links 배열 재구성
    const links = [];
    for (let i = 1; i <= 5; i++) {
      const url = d['link' + i + '_url'];
      if (url) links.push({
        type:  d['link' + i + '_type']  || '',
        label: d['link' + i + '_label'] || '',
        url:   url
      });
    }
    d.links = links;
    QR_DATA = d;

    if (MODE === 'edit') { renderPassword(); return; }
    renderView(d);
    recordScanCount(CODE);

  } catch(e) {
    renderError('데이터를 불러오지 못했습니다: ' + e.message);
  }
}

async function recordScanCount(code) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ action: 'recordScan', code: code }),
      redirect: 'follow'
    });
  } catch (e) {
    console.warn('scan count 기록 실패:', e);
  }
}

// ── 공통 UI ───────────────────────────────────────────────
function brand() {
  return '<div class="brand"><div class="logo">SAEGIM</div><div class="slogan">기억을 새기다 · 마음을 잇다</div></div>';
}
function infoRow(label, value) {
  return '<div class="row"><div class="label">' + esc(label) + '</div><div class="value">' +
    (value && String(value).includes('<a ') ? value : esc(value)) + '</div></div>';
}
function thanks() {
  return '<div class="thanks">도움을 주셔서 감사합니다.<div class="small">따뜻한 관심과 배려에 감사드립니다.</div></div>';
}
function editBtn() {
  return '<a class="btn sub" href="?code=' + encodeURIComponent(CODE) + '&mode=edit">정보 수정하기</a>';
}
function sanitizeLink(type, url) {
  if (!url) return '';
  var u = String(url).trim();
  // javascript: 차단
  if (/^javascript:/i.test(u)) return '';
  if (type === '전화') {
    var digits = u.replace(/[^0-9+]/g, '');
    // 한국 번호: 9~10자리면 앞에 0 추가 (Sheets 숫자 변환 보정)
    if (/^\d{9,10}$/.test(digits)) digits = '0' + digits;
    return digits ? 'tel:' + digits : '';
  }
  if (type === '이메일') {
    return u.startsWith('mailto:') ? u : 'mailto:' + u;
  }
  // 웹 링크: http(s) 없으면 자동 추가
  if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
  return u;
}
function renderLinkButtons(links) {
  if (!links || !links.length) return '<div class="sub">등록된 연결 항목이 없습니다.</div>';
  var btns = links.map(function(l) {
    if (!l || !l.url) return '';
    var href = sanitizeLink(l.type, l.url);
    if (!href) return '';
    var isPhone  = l.type === '전화';
    var isEmail  = l.type === '이메일';
    var target   = (isPhone || isEmail) ? '' : ' target="_blank" rel="noopener noreferrer"';
    return '<a class="call-btn" href="' + esc(href) + '"' + target + '>' +
      esc(l.label || l.type || '연락하기') + '</a>';
  }).join('');
  return btns || '<div class="sub">등록된 연결 항목이 없습니다.</div>';
}

// ── 라우팅 ─────────────────────────────────────────────────
function renderView(data) {
  if (data._debug) console.warn('🔍 DEBUG getQrData:', data._debug);
  if (data.status === '미등록')  { renderInactive(); return; }
  if (data.status === '판매완료') { renderRegister(data); return; }
  if (data.status === '중지')    { renderStopped(); return; }
  if (!data.child_name && !data.owner) { renderRegister(data); return; }
  renderCare(data);
}

// ── CD 보기 화면 ───────────────────────────────────────────
function renderCare(data) {
  app.innerHTML =
    brand() +
    renderLinkButtons(data.links || []) +
    '<div class="section-title">정보</div>' +
    '<div class="info">' +
      infoRow('이름',       data.child_name   || data.owner || '-') +
      infoRow('보호자',     data.guardian_name || '-') +
      infoRow('특이사항',   data.child_note    || '-') +
      infoRow('알레르기·질환', data.child_allergy || '-') +
      infoRow('혈액형',     data.blood_type    || '-') +
      infoRow('안내 메시지', data.child_message || '-') +
    '</div>' +
    thanks() +
    editBtn() +
    '<div class="footer">SAEGIM · ANSIM QR</div>';
}

// ── 미등록 / 중지 ──────────────────────────────────────────
function renderInactive() {
  app.innerHTML =
    brand() +
    '<div class="main-title">아직 등록되지 않은 QR입니다</div>' +
    '<div class="sub">제품 구매 또는 판매처 등록 후 사용할 수 있습니다.</div>' +
    '<div class="footer">SAEGIM QR</div>';
}
function renderStopped() {
  app.innerHTML =
    brand() +
    '<div class="main-title">사용이 중지된 QR입니다</div>' +
    '<div class="sub">현재 이 QR은 비활성화 상태입니다.</div>' +
    '<div class="footer">SAEGIM QR</div>';
}

// ── 최초 등록 ──────────────────────────────────────────────
function renderRegister(data) {
  var d = data || {};
  app.innerHTML =
    brand() +
    '<div class="main-title">최초 등록</div>' +
    '<div class="sub">📦 안심태그(CD)<br>아래 정보를 입력하고 비밀번호를 설정해주세요.</div>' +
    '<label>대상자 이름</label>' +
    '<input id="child_name" class="input" placeholder="대상자 이름" value="' + esc(d.child_name || '') + '">' +
    '<label>보호자 연락처</label>' +
    '<input id="guardian_phone" class="input" placeholder="보호자 연락처" value="' + esc(d.guardian_phone || '') + '">' +
    '<label>알레르기·질환 정보</label>' +
    '<textarea id="child_allergy" class="input" placeholder="예)&#10;땅콩 알레르기&#10;간질&#10;자폐 스펙트럼&#10;천식">' + esc(d.child_allergy || '') + '</textarea>' +
    '<label>혈액형</label>' +
    '<select id="blood_type" class="input">' +
      '<option value="">선택</option>' +
      ['A','B','O','AB','RH-'].map(function(v) { return '<option value="' + v + '"' + (d.blood_type === v ? ' selected' : '') + '>' + v + '형</option>'; }).join('') +
    '</select>' +
    '<label>특이사항</label>' +
    '<textarea id="child_note" class="input" placeholder="예)&#10;말을 잘 하지 못함&#10;큰 소리에 민감함&#10;낯선 사람을 무서워함">' + esc(d.child_note || '') + '</textarea>' +
    '<label>보호자 이름</label>' +
    '<input id="guardian_name" class="input" placeholder="보호자 이름" value="' + esc(d.guardian_name || '') + '">' +
    '<label>발견자에게 전달 메시지</label>' +
    '<textarea id="child_message" class="input" placeholder="안녕하세요.&#10;보호 중인 대상자입니다.&#10;QR을 스캔해 주셔서 감사합니다.&#10;아래 연락처로 연락 부탁드립니다.">' + esc(d.child_message || '') + '</textarea>' +
    '<div id="linksEdit">' + editLinks([{type:'전화',label:'',url:''}]) + '</div>' +
    '<hr>' +
    '<label>비밀번호 찾기용 이메일 <span style="color:var(--muted);font-weight:400">(선택 · 분실 시 사용)</span></label>' +
    '<input id="owner_email" type="email" placeholder="이메일 주소">' +
    '<label>비밀번호 설정</label>' +
    '<div class="pw-wrap"><input id="new_password" type="password" placeholder="비밀번호 (4자 이상)"><button type="button" class="pw-eye" onclick="togglePw(\'new_password\')">👁</button></div>' +
    '<button class="btn" onclick="registerFirst()">등록 완료</button>';
}

// ── 비밀번호 확인 & 수정 ───────────────────────────────────
window.renderPassword = function renderPassword() {
  app.innerHTML =
    brand() +
    '<div class="main-title">정보 수정하기</div>' +
    '<div class="sub">등록된 비밀번호를 입력해주세요.</div>' +
    '<div class="pw-wrap"><input id="pw" type="password" placeholder="비밀번호"><button type="button" class="pw-eye" onclick="togglePw(\'pw\')">👁</button></div>' +
    '<button class="btn" onclick="checkPassword()">확인</button>' +
    '<div style="text-align:center;margin-top:8px"><button type="button" class="btn-link" onclick="renderForgotPassword()">비밀번호를 잊으셨나요?</button></div>' +
    '<a class="btn sub" href="?code=' + encodeURIComponent(CODE) + '">돌아가기</a>';
}

window.checkPassword = async function() {
  var password = document.getElementById('pw').value.trim();
  if (!password) { alert('비밀번호를 입력해주세요.'); return; }
  var btn = document.querySelector('#app .btn');
  setLoading(btn, true, '확인 중...');
  try {
    var r = await apiGet('verifyPassword', {code: CODE, password: password});
    if (!r.success) { alert(r.message || '비밀번호가 일치하지 않습니다.'); setLoading(btn, false); return; }
    if (r.owner_email) QR_DATA.owner_email = r.owner_email;
    renderCdEditForm(password);
  } catch(e) { alert('오류: ' + e.message); setLoading(btn, false); }
};

function renderCdEditForm(password) {
  var d = QR_DATA;
  app.innerHTML =
    brand() +
    '<div class="main-title">정보 수정</div>' +
    '<input id="password" type="hidden" value="' + esc(password) + '">' +
    '<div class="section-title">기본 정보</div>' +
    '<label>표시 이름</label><input id="owner" value="' + esc(d.owner || '') + '">' +
    '<label>이름</label><input id="child_name" value="' + esc(d.child_name || '') + '">' +
    '<label>보호자 연락처</label><input id="guardian_phone" value="' + esc(fixPhone(String(d.guardian_phone || ''))) + '">' +
    '<label>알레르기·질환</label><textarea id="child_allergy" placeholder="예)&#10;땅콩 알레르기&#10;간질&#10;자폐 스펙트럼&#10;천식">' + esc(d.child_allergy || '') + '</textarea>' +
    '<label>혈액형</label><select id="blood_type">' +
      '<option value="">선택</option>' +
      ['A','B','O','AB','RH-'].map(function(v) { return '<option value="' + v + '"' + (d.blood_type === v ? ' selected' : '') + '>' + v + '형</option>'; }).join('') +
    '</select>' +
    '<label>특이사항</label><textarea id="child_note" placeholder="예)&#10;말을 잘 하지 못함&#10;큰 소리에 민감함&#10;낯선 사람을 무서워함">' + esc(d.child_note || '') + '</textarea>' +
    '<label>보호자</label><input id="guardian_name" value="' + esc(d.guardian_name || '') + '">' +
    '<label>안내 메시지</label><textarea id="child_message" placeholder="안녕하세요.&#10;보호 중인 대상자입니다.">' + esc(d.child_message || '') + '</textarea>' +
    '<label>비밀번호 찾기용 이메일</label><input id="owner_email" type="email" placeholder="이메일 주소" value="' + esc(d.owner_email || '') + '">' +
    '<div class="section-title">연결 항목</div>' +
    '<div id="linksEdit">' + editLinks(d.links || []) + '</div>' +
    '<button class="btn" onclick="saveEdit()">저장하기</button>' +
    '<a class="btn sub" href="?code=' + encodeURIComponent(CODE) + '">취소</a>' +
    '<div class="section-title" style="margin-top:28px">비밀번호 변경</div>' +
    '<div class="pw-wrap"><input id="new_pw1" type="password" placeholder="새 비밀번호 (4자 이상)"><button type="button" class="pw-eye" onclick="togglePw(\'new_pw1\')">👁</button></div>' +
    '<div class="pw-wrap"><input id="new_pw2" type="password" placeholder="새 비밀번호 확인"><button type="button" class="pw-eye" onclick="togglePw(\'new_pw2\')">👁</button></div>' +
    '<button class="btn sub" onclick="changePassword()" style="margin-top:8px">비밀번호 변경</button>';
}

window.changePassword = async function() {
  var pw1 = (document.getElementById('new_pw1') || {}).value || '';
  var pw2 = (document.getElementById('new_pw2') || {}).value || '';
  if (!pw1 || pw1.length < 4) { alert('새 비밀번호를 4자 이상 입력해주세요.'); return; }
  if (pw1 !== pw2) { alert('비밀번호가 일치하지 않습니다.'); return; }
  var currentPw = val('password');
  var btn = document.querySelector('#app .btn.sub[onclick="changePassword()"]');
  setLoading(btn, true, '변경 중...');
  try {
    var r = await apiPost({ action: 'changePassword', code: CODE, password: currentPw, new_password: pw1 });
    if (!r.success) { alert(r.message || '변경 실패'); setLoading(btn, false); return; }
    alert('비밀번호가 변경되었습니다.');
    location.href = '?code=' + encodeURIComponent(CODE);
  } catch(e) { alert('오류: ' + e.message); setLoading(btn, false); }
};

// ── 연결 항목 편집 ─────────────────────────────────────────
var LINK_TYPES = ['전화','카카오','인스타그램','이메일','홈페이지','지도','왓츠앱','라인','텔레그램','기타'];

function editLinks(links) {
  var arr = (links || []).filter(function(l) { return l && (l.label || l.url || l.type); });
  if (!arr.length) arr = [{type:'전화', label:'', url:''}];
  arr = arr.slice(0, 5);
  return arr.map(function(l, i) { return linkEditBox(l, i, arr.length); }).join('') +
    (arr.length < 5 ? '<button class="btn sub" onclick="addLinkItem()">항목 추가</button>' : '');
}

function linkEditBox(l, i, total) {
  return '<div class="edit-group link-edit">' +
    '<label>종류</label>' +
    '<select id="link' + i + '_type">' +
      LINK_TYPES.map(function(t) { return '<option value="' + esc(t) + '"' + (String(l.type || '전화') === t ? ' selected' : '') + '>' + esc(t) + '</option>'; }).join('') +
    '</select>' +
    '<label>버튼 이름</label>' +
    '<input id="link' + i + '_label" value="' + esc(l.label || '') + '">' +
    '<label>연결 주소</label>' +
    '<input id="link' + i + '_url" value="' + esc(fixPhone(String(l.url || '').replace(/^tel:/, ''))) + '">' +
    (total > 1 ? '<button class="btn sub" onclick="removeLinkItem(' + i + ')">항목 제거</button>' : '') +
    '</div>';
}

function collectLinksRaw() {
  return Array.from(document.querySelectorAll('.link-edit')).map(function(g, i) {
    return { type: val('link' + i + '_type') || '전화', label: val('link' + i + '_label'), url: val('link' + i + '_url') };
  });
}
function collectLinks() {
  return collectLinksRaw().filter(function(l) { return l.url && !/^javascript:/i.test(l.url); }).map(function(l) {
    if (l.type === '지도' && !l.url.startsWith('http'))
      return Object.assign({}, l, {label: l.label || l.url, url: 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(l.url)});
    return l;
  }).slice(0, 5);
}

window.addLinkItem = function() {
  var links = collectLinksRaw();
  if (links.length >= 5) { alert('최대 5개까지 가능합니다.'); return; }
  links.push({type: '전화', label: '', url: ''});
  document.getElementById('linksEdit').innerHTML = editLinks(links);
};
window.removeLinkItem = function(index) {
  var links = collectLinksRaw();
  links.splice(index, 1);
  document.getElementById('linksEdit').innerHTML = editLinks(links.length ? links : [{type: '전화', label: '', url: ''}]);
};

// ── 등록 & 저장 ────────────────────────────────────────────
window.registerFirst = async function() {
  if (!val('child_name')) { alert('대상자 이름을 입력해주세요.'); return; }
  var pw = val('new_password');
  if (!pw || pw.length < 4) { alert('비밀번호를 4자 이상 입력해주세요.'); return; }
  var btn = document.querySelector('#app .btn[onclick="registerFirst()"]');
  setLoading(btn, true, '등록 중...');
  try {
    var links = collectLinks();
    var phone = val('guardian_phone');
    if (!links.length && phone) {
      links = [{ type: '전화', label: '보호자에게 전화', url: phone }];
    }
    if (!links.length) { setLoading(btn, false); alert('연락처 링크를 하나 이상 입력해주세요.'); return; }
    var form = {
      action: 'registerSoldQr', code: CODE, password: pw,
      owner: val('owner'), links: JSON.stringify(links),
      child_name: val('child_name'), guardian_name: val('guardian_name'),
      guardian_phone: val('guardian_phone'), child_note: val('child_note'),
      child_allergy: val('child_allergy'), blood_type: val('blood_type'),
      child_message: val('child_message'), owner_email: val('owner_email')
    };
    var r = await apiPost(form);
    if (!r.success) { alert(r.message || '등록 실패'); setLoading(btn, false); return; }
    location.href = '?code=' + encodeURIComponent(CODE);
  } catch(e) { alert('오류: ' + e.message); setLoading(btn, false); }
};

window.saveEdit = async function() {
  var btn = document.querySelector('#app .btn[onclick="saveEdit()"]');
  setLoading(btn, true, '저장 중...');
  try {
    var links = collectLinks();
    var form = {
      action: 'updateCustomerData', code: CODE, password: val('password'),
      owner: val('owner'), links: JSON.stringify(links),
      child_name: val('child_name'), guardian_name: val('guardian_name'),
      guardian_phone: val('guardian_phone'), child_note: val('child_note'),
      child_allergy: val('child_allergy'), blood_type: val('blood_type'),
      child_message: val('child_message'), owner_email: val('owner_email')
    };
    var r = await apiPost(form);
    if (!r.success) { alert(r.message || '저장 실패'); setLoading(btn, false); return; }
    location.href = '?code=' + encodeURIComponent(CODE);
  } catch(e) { alert('오류: ' + e.message); setLoading(btn, false); }
};

// ── 유틸 ───────────────────────────────────────────────────
window.togglePw = function(id) {
  var el = document.getElementById(id);
  if (!el) return;
  el.type = el.type === 'password' ? 'text' : 'password';
};

function maskEmail(email) {
  if (!email) return '';
  var p = email.split('@');
  if (p.length !== 2) return '***';
  var local = p[0];
  var masked = local.length > 2 ? local[0] + '***' + local[local.length-1] : local[0] + '***';
  return masked + '@' + p[1];
}

window.renderForgotPassword = async function renderForgotPassword() {
  // 먼저 로딩 화면 표시
  app.innerHTML = brand() + '<div class="main-title">비밀번호 찾기</div><div class="sub">이메일 확인 중...</div>';
  // QR_DATA에 이메일이 없으면 API에서 직접 가져옴 (Firestore 독립)
  var regEmail = QR_DATA && QR_DATA.owner_email;
  if (!regEmail) {
    try {
      var hint = await apiGet('getOwnerEmailHint', { code: CODE });
      if (hint.success && hint.has_email) regEmail = hint.email_masked;
    } catch(e) {}
  }
  if (regEmail) {
    var displayEmail = regEmail.indexOf('***') !== -1 ? regEmail : maskEmail(regEmail);
    app.innerHTML =
      brand() +
      '<div class="main-title">비밀번호 찾기</div>' +
      '<div class="sub" style="margin-bottom:8px">아래 이메일로 비밀번호를 전송합니다.</div>' +
      '<div style="text-align:center;font-size:18px;font-weight:800;color:var(--gold);margin:16px 0">' + esc(displayEmail) + '</div>' +
      '<button class="btn" onclick="sendPasswordReset()">비밀번호 전송</button>' +
      '<button class="btn sub" onclick="renderPassword()">돌아가기</button>';
  } else {
    app.innerHTML =
      brand() +
      '<div class="main-title">비밀번호 찾기</div>' +
      '<div class="sub">등록하신 이메일로 비밀번호를 보내드립니다.</div>' +
      '<input id="reset_email" type="email" placeholder="등록 이메일 주소">' +
      '<button class="btn" onclick="sendPasswordReset()">비밀번호 전송</button>' +
      '<button class="btn sub" onclick="renderPassword()">돌아가기</button>';
  }
}

window.sendPasswordReset = async function() {
  // QR_DATA에 실제 이메일이 있으면 사용, 없으면 사용자 입력 사용
  var email = (QR_DATA && QR_DATA.owner_email) || val('reset_email');
  if (!email) { alert('이메일 주소를 입력해주세요.'); return; }
  var btn = document.querySelector('#app .btn[onclick="sendPasswordReset()"]');
  setLoading(btn, true, '전송 중...');
  try {
    // email이 마스킹된 힌트라면 빈 문자열로 보내 서버가 자동으로 찾도록
    var sendEmail = (email.indexOf('***') !== -1) ? '' : email;
    var r = await apiPost({ action: 'resetPasswordByEmail', code: CODE, email: sendEmail });
    if (!r.success) { alert(r.message || '전송 실패'); setLoading(btn, false); return; }
    alert('등록된 이메일로 비밀번호를 보냈습니다.\n메일함을 확인해주세요.');
    renderPassword();
  } catch(e) { alert('오류: ' + e.message); setLoading(btn, false); }
};

function fixPhone(s) {
  // 9~10자리 숫자면 앞에 0 추가 (Sheets 숫자 변환 보정)
  return /^\d{9,10}$/.test(s) ? '0' + s : s;
}

function setLoading(btnEl, loading, loadingText) {
  if (!btnEl) return;
  if (loading) {
    btnEl.disabled = true;
    btnEl._origText = btnEl.textContent;
    btnEl.textContent = loadingText || '처리 중...';
    btnEl.style.opacity = '0.6';
  } else {
    btnEl.disabled = false;
    btnEl.textContent = btnEl._origText || btnEl.textContent;
    btnEl.style.opacity = '';
  }
}
function val(id) { var el = document.getElementById(id); return el ? el.value.trim() : ''; }
function esc(s) { var d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }
function renderError(msg) { app.innerHTML = '<div class="error">' + esc(msg) + '</div>'; }

loadData();
</script>
